<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小菜鸟 - 游戏详情</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="game.css">
</head>
<body style="opacity:0;transition:opacity 0.15s">
  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="logo">
      <img src="assets/logo.jpg" alt="小菜鸟" />
      <span>小菜鸟</span>
    </a>
    <div class="nav-links" id="navLinks"></div>
  </nav>

  <!-- 游戏详情 - 宽屏左右分栏 -->
  <div class="game-layout">
    <!-- 左侧：游戏区域 -->
    <div class="game-left">
      <div class="game-play-area">
        <div class="play-frame" id="gameFrame">
          <div class="placeholder" id="gamePlaceholder">
            <div class="icon">🎮</div>
            <p>点击下方按钮开始游戏</p>
          </div>
        </div>
        <div class="game-controls">
          <button class="btn btn-primary play-btn" id="startGameBtn">▶️ 开始游戏</button>
        </div>
      </div>
    </div>

    <!-- 右侧：游戏信息 + 评论 -->
    <div class="game-right">
      <!-- 游戏信息卡片 -->
      <div class="game-info-card">
        <h1 id="gameName">加载中...</h1>
        <div class="game-meta" id="gameMeta">
          <span>🏷️ --</span>
          <span>👤 --</span>
          <span>⭐ --</span>
          <span>🎮 -- 人玩过</span>
        </div>
        <p class="game-desc" id="gameDesc">游戏描述加载中...</p>
        <div class="coin-tip">🪙 每玩 5 分钟消耗 1 金币</div>
      </div>

      <!-- 评论区 -->
      <div class="comments-section">
        <h3>💬 玩家点评</h3>
        <div class="comment-form">
          <!-- 星级选择 -->
          <div class="star-rating" id="starRating">
            <span class="star-label">给个评分：</span>
            <span class="star" data-val="1" onclick="selectStar(1)">★</span>
            <span class="star" data-val="2" onclick="selectStar(2)">★</span>
            <span class="star" data-val="3" onclick="selectStar(3)">★</span>
            <span class="star" data-val="4" onclick="selectStar(4)">★</span>
            <span class="star" data-val="5" onclick="selectStar(5)">★</span>
            <span class="star-hint" id="starHint">点击打分</span>
          </div>
          <input type="text" id="commentInput" placeholder="说说你的游戏体验...">
          <button id="commentBtn" onclick="submitComment()">发表</button>
        </div>
        <ul class="comment-list" id="commentList">
          <li class="loading-tip">加载评论中...</li>
        </ul>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2026 小菜鸟 - 专为小朋友打造的游戏乐园 🐣</p>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script>
    // ===== 游戏详情页逻辑 =====
    var gameId = new URLSearchParams(window.location.search).get('id');
    var gameData = null;

    document.addEventListener('DOMContentLoaded', async function() {
      // 游戏详情页需要登录才能查看
      var loggedIn = await requireLogin('game.html' + (gameId ? '?id=' + gameId : ''));
      if (!loggedIn) return;

      if (gameId) {
        loadGameDetail();
        loadComments();
      } else {
        document.getElementById('gameName').textContent = '游戏不存在';
      }
    });

    async function loadGameDetail() {
      var sb = getSupabase();
      if (!sb) return;

      var result = await sb.from('games').select('*').eq('id', gameId).single();
      if (!result.data) {
        document.getElementById('gameName').textContent = '游戏不存在';
        return;
      }

      gameData = result.data;
      document.title = (gameData.title || gameData.name) + ' - 小菜鸟';
      document.getElementById('gameName').textContent = gameData.title || gameData.name;
      document.getElementById('gameDesc').textContent = gameData.description || '暂无描述';

      // 获取作者名
      var authorName = '未知';
      if (gameData.author_id) {
        var profileResult = await sb.from('profiles').select('username').eq('id', gameData.author_id).single();
        if (profileResult.data) authorName = profileResult.data.username;
      }

      document.getElementById('gameMeta').innerHTML =
        '<span>🏷️ ' + (gameData.category || '其他') + '</span>' +
        '<span>👤 ' + authorName + '</span>' +
        '<span>⭐ ' + (gameData.rating || '0') + ' 分</span>' +
        '<span>🎮 ' + (gameData.play_count || 0) + ' 人玩过</span>';
    }

    // 每5分钟扣1金币的计时器
    var coinTimer = null;
    var COIN_INTERVAL = 5 * 60 * 1000; // 5分钟
    var COIN_COST = 1;

    // 显示悬浮提示
    function showToast(msg, duration) {
      var existing = document.getElementById('coinToast');
      if (existing) existing.remove();
      var toast = document.createElement('div');
      toast.id = 'coinToast';
      toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:9999;pointer-events:none;transition:opacity 0.3s;';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(function() { toast.style.opacity = '0'; setTimeout(function() { toast.remove(); }, 300); }, duration || 3000);
    }

    function startCoinTimer(userId) {
      if (coinTimer) clearInterval(coinTimer);
      var elapsed = 0;
      coinTimer = setInterval(async function() {
        elapsed += 30000;
        var sb = getSupabase();
        var profileResult = await sb.from('profiles').select('coins').eq('id', userId).single();
        var currentCoins = (profileResult.data && profileResult.data.coins) || 0;

        if (elapsed % COIN_INTERVAL === 0) {
          // 到了扣费时间
          if (currentCoins < COIN_COST) {
            // 金币不足，暂停游戏
            clearInterval(coinTimer);
            coinTimer = null;
            var frame = document.getElementById('gameFrame');
            frame.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;">' +
              '<div style="font-size:48px;">🪙</div>' +
              '<div style="font-size:18px;font-weight:700;color:#333;">金币不足，游戏已暂停</div>' +
              '<div style="font-size:14px;color:#888;">请充值金币后继续游玩</div>' +
              '<a href="profile.html" style="background:#ff6b35;color:#fff;padding:10px 24px;border-radius:20px;text-decoration:none;font-weight:700;">去充值</a>' +
              '</div>';
            return;
          }
          // 扣除金币
          await sb.from('profiles').update({ coins: currentCoins - COIN_COST }).eq('id', userId);
          var remaining = currentCoins - COIN_COST;
          if (remaining <= 2) {
            showToast('⚠️ 已扣除 1 金币，剩余 ' + remaining + ' 枚，即将不足！', 4000);
          } else {
            showToast('🪙 已扣除 1 金币，剩余 ' + remaining + ' 枚', 3000);
          }
        } else if (elapsed % COIN_INTERVAL === COIN_INTERVAL - 30000) {
          // 距离下次扣费还有30秒，提前提醒
          if (currentCoins <= COIN_COST) {
            showToast('⚠️ 30秒后将扣除 1 金币，当前仅剩 ' + currentCoins + ' 枚！', 4000);
          }
        }
      }, 30000); // 每30秒检查一次
    }

    // 开始游戏
    document.getElementById('startGameBtn').addEventListener('click', async function() {
      var user = await getCurrentUser();
      if (!user) {
        requireLogin('game.html' + (gameId ? '?id=' + gameId : ''));
        return;
      }
      if (!gameData || (!gameData.file_path && !gameData.file_url)) {
        alert('游戏文件不存在');
        return;
      }

      var sb = getSupabase();

      // 检查金币是否足够（至少1枚才能开始）
      var profileResult = await sb.from('profiles').select('coins,role').eq('id', user.id).single();
      var profile = profileResult.data;
      var currentCoins = (profile && profile.coins) || 0;
      var isAdmin = profile && profile.role === 'admin';

      if (!isAdmin && currentCoins < COIN_COST) {
        var frame = document.getElementById('gameFrame');
        frame.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;">' +
          '<div style="font-size:48px;">🪙</div>' +
          '<div style="font-size:18px;font-weight:700;color:#333;">金币不足</div>' +
          '<div style="font-size:14px;color:#888;">需要至少 1 枚金币才能开始游戏</div>' +
          '<div style="font-size:14px;color:#888;">当前金币：' + currentCoins + ' 🪙</div>' +
          '<a href="profile.html" style="background:#ff6b35;color:#fff;padding:10px 24px;border-radius:20px;text-decoration:none;font-weight:700;">去充值</a>' +
          '</div>';
        return;
      }

      // 获取游戏文件 URL
      var gameUrl;
      if (gameData.file_url) {
        gameUrl = gameData.file_url;
      } else {
        var urlResult = sb.storage.from('games').getPublicUrl(gameData.file_path + '/index.html');
        gameUrl = urlResult.data.publicUrl;
      }

      // 加载游戏
      var frame = document.getElementById('gameFrame');
      frame.innerHTML = '<iframe src="' + gameUrl + '" style="width:100%;height:100%;border:none;border-radius:var(--radius-lg);"></iframe>';

      // 增加游玩次数
      sb.from('games').update({ play_count: (gameData.play_count || 0) + 1 }).eq('id', gameId);

      // 启动金币计时器（admin免费）
      if (!isAdmin) {
        startCoinTimer(user.id);
      }
    });

    // 加载评论
    async function loadComments() {
      var sb = getSupabase();
      if (!sb) return;

      var result = await sb.from('reviews').select('*').eq('game_id', gameId).order('created_at', { ascending: false });
      var list = document.getElementById('commentList');

      if (!result.data || result.data.length === 0) {
        list.innerHTML = '<li class="loading-tip">还没有评论，快来第一个点评吧！</li>';
        return;
      }

      var html = '';
      for (var i = 0; i < result.data.length; i++) {
        var review = result.data[i];
        // 获取评论者用户名
        var profileResult = await sb.from('profiles').select('username').eq('id', review.user_id).single();
        var reviewerName = profileResult.data ? profileResult.data.username : '匿名';
        var stars = '';
        for (var s = 1; s <= 5; s++) { stars += s <= review.rating ? '★' : '☆'; }
        html += '<li class="comment-item">' +
          '<div class="comment-avatar">🐣</div>' +
          '<div class="comment-body">' +
            '<div class="comment-name">' + reviewerName + ' <span style="color:#f59e0b;font-size:13px;">' + stars + '</span></div>' +
            '<div class="comment-text">' + review.content + '</div>' +
          '</div>' +
        '</li>';
      }
      list.innerHTML = html;
    }

    // 星级选择
    var selectedRating = 0;
    var starLabels = ['', '很差', '一般', '还行', '好玩', '超棒！'];

    function selectStar(val) {
      selectedRating = val;
      var stars = document.querySelectorAll('.star');
      stars.forEach(function(s, i) {
        s.classList.toggle('active', i < val);
      });
      document.getElementById('starHint').textContent = starLabels[val];
    }

    function hoverStar(val) {
      var stars = document.querySelectorAll('.star');
      stars.forEach(function(s, i) {
        s.style.color = i < val ? '#f59e0b' : '#ddd';
      });
    }

    function unhoverStar() {
      var stars = document.querySelectorAll('.star');
      stars.forEach(function(s, i) {
        s.style.color = i < selectedRating ? '#f59e0b' : '#ddd';
      });
    }

    // 发表评论
    async function submitComment() {
      var user = await getCurrentUser();
      if (!user) {
        requireLogin('game.html' + (gameId ? '?id=' + gameId : ''));
        return;
      }
      var input = document.getElementById('commentInput');
      var text = input.value.trim();
      if (!text) { alert('请写点评价内容哦！'); return; }
      if (selectedRating === 0) { alert('请先给游戏打个分！'); return; }

      var sb = getSupabase();

      // 检查是否已经评价过
      var existing = await sb.from('reviews').select('id').eq('game_id', gameId).eq('user_id', user.id).single();
      if (existing.data) {
        // 已有评价，更新
        var result = await sb.from('reviews').update({ content: text, rating: selectedRating }).eq('game_id', gameId).eq('user_id', user.id);
        if (result.error) { alert('更新失败：' + result.error.message); return; }
      } else {
        // 新增评价
        var result = await sb.from('reviews').insert({ game_id: gameId, user_id: user.id, content: text, rating: selectedRating });
        if (result.error) { alert('评价失败：' + result.error.message); return; }
      }

      input.value = '';
      selectedRating = 0;
      document.querySelectorAll('.star').forEach(function(s) { s.classList.remove('active'); });
      document.getElementById('starHint').textContent = '点击打分';

      // 重新计算平均分并更新games表
      var allReviews = await sb.from('reviews').select('rating').eq('game_id', gameId);
      if (allReviews.data && allReviews.data.length > 0) {
        var avg = allReviews.data.reduce(function(sum, r) { return sum + r.rating; }, 0) / allReviews.data.length;
        avg = Math.round(avg * 10) / 10;
        await sb.from('games').update({ rating: avg }).eq('id', gameId);
        // 更新页面显示的评分
        var ratingEl = document.querySelector('.game-meta span:last-child');
        if (ratingEl) ratingEl.textContent = '⭐ ' + avg + ' 分';
      }

      loadComments();
    }
  </script>
</body>
</html>
