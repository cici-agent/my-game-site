<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小菜鸟 - 游戏详情</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="game.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="logo">
      <img src="assets/logo.jpg" alt="小菜鸟" />
      <span>小菜鸟</span>
    </a>
    <div class="nav-links" id="navLinks"></div>
  </nav>

  <!-- 游戏信息 -->
  <div class="game-detail">
    <div class="game-hero">
      <div class="hero-cover">🚀</div>
      <div class="hero-info">
        <h1>太空冒险</h1>
        <div class="hero-meta">
          <span>🏷️ 射击</span>
          <span>👤 小明同学</span>
          <span>⭐ 4.8 分</span>
          <span>🎮 1,234 人玩过</span>
        </div>
      </div>
    </div>

    <!-- 游戏运行区域 -->
    <div class="game-play-area">
      <div class="play-frame">
        <div class="placeholder">
          <div class="icon">🎮</div>
          <p>点击下方按钮开始游戏</p>
        </div>
      </div>
      <div class="coin-tip">🪙 每玩 5 分钟消耗 1 金币</div>
      <br><br>
      <button class="btn btn-primary play-btn" id="startGameBtn">▶️ 开始游戏</button>
    </div>

    <!-- 用户点评区 -->
    <div class="comments-section">
      <h3>💬 玩家点评</h3>
      <div class="comment-form">
        <input type="text" id="commentInput" placeholder="说说你的游戏体验...">
        <button id="commentBtn">发表</button>
      </div>
      <ul class="comment-list">
        <li class="comment-item">
          <div class="comment-avatar">🦊</div>
          <div class="comment-body">
            <div class="comment-name">小狐狸</div>
            <div class="comment-text">超好玩！我已经通关3次了 😄</div>
          </div>
        </li>
        <li class="comment-item">
          <div class="comment-avatar">🐰</div>
          <div class="comment-body">
            <div class="comment-name">兔兔</div>
            <div class="comment-text">画面好漂亮，音乐也很好听！</div>
          </div>
        </li>
        <li class="comment-item">
          <div class="comment-avatar">🐻</div>
          <div class="comment-body">
            <div class="comment-name">小熊</div>
            <div class="comment-text">第三关好难啊，有人能帮帮我吗？</div>
          </div>
        </li>
      </ul>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2026 小菜鸟 - 专为小朋友打造的游戏乐园 🐣</p>
    <div class="footer-links">
      <a href="index.html">首页</a>
      <a href="login.html">登录</a>
      <a href="#">关于我们</a>
      <a href="#">联系我们</a>
    </div>
  </footer>

  <script src="auth.js"></script>
  <script>
    // 开始游戏按钮
    document.getElementById('startGameBtn').addEventListener('click', function() {
      if (!Auth.isLoggedIn()) {
        alert('请先登录才能玩游戏哦！');
        window.location.href = 'login.html';
        return;
      }
      alert('游戏加载中...（功能开发中）');
    });

    // 发表评论
    document.getElementById('commentBtn').addEventListener('click', function() {
      const input = document.getElementById('commentInput');
      const text = input.value.trim();
      if (!text) return;
      if (!Auth.isLoggedIn()) {
        alert('请先登录才能评论哦！');
        return;
      }
      const user = Auth.getCurrentUser();
      const list = document.querySelector('.comment-list');
      const li = document.createElement('li');
      li.className = 'comment-item';
      li.innerHTML = `
        <div class="comment-avatar">${user.avatar || '🐣'}</div>
        <div class="comment-body">
          <div class="comment-name">${user.username}</div>
          <div class="comment-text">${text}</div>
        </div>
      `;
      list.insertBefore(li, list.firstChild);
      input.value = '';
    });
  </script>
</body>
</html>
