<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小菜鸟 - 游戏详情</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="game.css">
  <style>
    /* ===== iframe 全屏游戏区域 ===== */
    .game-iframe-wrapper {
      position: relative;
      width: 100%;
      background: #111;
      border-radius: 16px;
      overflow: hidden;
      min-height: 480px;
      display: flex;
      flex-direction: column;
    }
    .game-iframe-topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: rgba(0,0,0,0.75);
      z-index: 10;
      flex-shrink: 0;
    }
    .game-iframe-topbar .back-btn {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .game-iframe-topbar .back-btn:hover {
      background: rgba(255,255,255,0.28);
    }
    .game-iframe-topbar .game-title-bar {
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .game-iframe-topbar .fullscreen-btn {
      background: rgba(255,140,0,0.7);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .game-iframe-topbar .fullscreen-btn:hover {
      background: rgba(255,140,0,1);
    }
    #gameIframe {
      width: 100%;
      flex: 1;
      border: none;
      min-height: calc(100vh - 112px);
      background: #111;
      display: block;
    }

    /* iPad CSS 模拟全屏 */
    .css-fullscreen {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 9999 !important;
      background: #000 !important;
    }
    .css-fullscreen #gameIframe {
      width: 100vw !important;
      height: 100vh !important;
      min-height: 100vh !important;
    }
    body.has-fullscreen .navbar,
    body.has-fullscreen .game-info,
    body.has-fullscreen .game-meta,
    body.has-fullscreen footer {
      display: none !important;
    }

    /* 金币悬浮提示 */
    #coinToast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      z-index: 9999;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    /* 评论区横排 */
    .comment-form {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }
    .star-rating {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .star-label {
      font-size: 0.9rem;
      color: #666;
      white-space: nowrap;
    }
    .star {
      font-size: 1.5rem;
      color: #ddd;
      cursor: pointer;
      transition: color 0.15s;
      line-height: 1;
    }
    .star.active, .star:hover {
      color: #ffc107;
    }
    .star-hint {
      font-size: 0.8rem;
      color: #aaa;
      white-space: nowrap;
    }
    #commentInput {
      flex: 1;
      min-width: 120px;
      padding: 8px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      font-family: inherit;
    }
    #commentInput:focus {
      border-color: #ff8c00;
    }
    #commentBtn {
      background: linear-gradient(135deg, #ff8c00, #ffc107);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 8px 18px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.15s;
    }
    #commentBtn:hover {
      transform: translateY(-1px);
    }
    .comment-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .comment-list li {
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.93rem;
      color: #444;
    }
    .comment-list li:last-child {
      border-bottom: none;
    }
    .comment-stars {
      color: #ffc107;
      font-size: 0.9rem;
      margin-right: 6px;
    }
    .comment-author {
      font-weight: 700;
      color: #ff8c00;
      margin-right: 6px;
    }
    .loading-tip {
      color: #aaa;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="logo">
      <img src="assets/logo.jpg" alt="小菜鸟" />
      <span>小菜鸟</span>
    </a>
    <div class="nav-links" id="navLinks"></div>
  </nav>

  <!-- 游戏详情 - 宽屏左右分栏 -->
  <div class="game-layout">
    <!-- 左侧：游戏区域 -->
    <div class="game-left">
      <div class="game-play-area">

        <!-- iframe 模式（Supabase Storage 游戏） -->
        <div class="game-iframe-wrapper" id="iframeWrapper" style="display:none">
          <div class="game-iframe-topbar">
            <a href="index.html" class="back-btn">← 返回</a>
            <span class="game-title-bar" id="iframeGameTitle">游戏加载中...</span>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全屏</button>
          </div>
          <iframe id="gameIframe" sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-popups" allowfullscreen></iframe>
        </div>

        <!-- 传统模式（站内游戏，点击跳转） -->
        <div class="play-frame" id="gameFrame" style="display:none">
          <div class="placeholder" id="gamePlaceholder">
            <div class="icon">🎮</div>
            <p>点击下方按钮开始游戏</p>
          </div>
        </div>

        <!-- 加载中占位 -->
        <div class="play-frame" id="loadingFrame">
          <div class="placeholder">
            <div class="icon">⏳</div>
            <p>游戏信息加载中...</p>
          </div>
        </div>

        <!-- 传统模式开始按钮 -->
        <div class="game-controls" id="gameControls" style="display:none">
          <button class="btn btn-primary play-btn" id="startGameBtn" onclick="startGame()">▶️ 开始游戏</button>
        </div>
      </div>
    </div>

    <!-- 右侧：游戏信息 + 评论 -->
    <div class="game-right">
      <!-- 游戏信息卡片 -->
      <div class="game-info-card">
        <h1 id="gameName">加载中...</h1>
        <div class="game-meta" id="gameMeta">
          <span>🏷️ --</span>
          <span>👤 --</span>
          <span>⭐ --</span>
          <span>🎮 -- 人玩过</span>
        </div>
        <p class="game-desc" id="gameDesc">游戏描述加载中...</p>
        <div class="coin-tip">🪙 每玩 5 分钟消耗 1 金币</div>
      </div>

      <!-- 评论区 -->
      <div class="comments-section">
        <h3>💬 玩家点评</h3>
        <div class="comment-form">
          <!-- 星级选择 -->
          <div class="star-rating" id="starRating">
            <span class="star-label">评分：</span>
            <span class="star" data-val="1" onclick="selectStar(1)">★</span>
            <span class="star" data-val="2" onclick="selectStar(2)">★</span>
            <span class="star" data-val="3" onclick="selectStar(3)">★</span>
            <span class="star" data-val="4" onclick="selectStar(4)">★</span>
            <span class="star" data-val="5" onclick="selectStar(5)">★</span>
            <span class="star-hint" id="starHint">点击打分</span>
          </div>
          <input type="text" id="commentInput" placeholder="说说你的游戏体验...">
          <button id="commentBtn" onclick="submitComment()">发表</button>
        </div>
        <ul class="comment-list" id="commentList">
          <li class="loading-tip">加载评论中...</li>
        </ul>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2026 小菜鸟 - 专为小朋友打造的游戏乐园 🐣</p>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script>
    // ===== 游戏详情页逻辑 =====
    var gameId = new URLSearchParams(window.location.search).get('id');
    var gameData = null;
    var isIframeMode = false; // true = Supabase Storage 游戏，false = 站内跳转游戏

    document.addEventListener('DOMContentLoaded', async function() {
      var loggedIn = await requireLogin('game.html' + (gameId ? '?id=' + gameId : ''));
      if (!loggedIn) return;

      if (gameId) {
        await loadGameDetail();
        loadComments();
      } else {
        document.getElementById('gameName').textContent = '游戏不存在';
        document.getElementById('loadingFrame').style.display = 'none';
      }
    });

    // ===== 判断是否是 Supabase Storage URL =====
    function isStorageUrl(url) {
      return url && url.indexOf('supabase.co/storage') !== -1;
    }

    // ===== 加载游戏详情 =====
    async function loadGameDetail() {
      var sb = getSupabase();
      if (!sb) return;

      var isPreview = new URLSearchParams(window.location.search).get('preview') === '1';

      var result = await sb.from('games').select('*').eq('id', gameId).single();
      if (!result.data) {
        document.getElementById('gameName').textContent = '游戏不存在';
        document.getElementById('loadingFrame').style.display = 'none';
        return;
      }

      // 非上线游戏：只有 admin 预览模式可访问
      if (result.data.status !== 'online' && isPreview) {
        var user = await getCurrentUser();
        var profileResult = user ? await sb.from('profiles').select('role').eq('id', user.id).single() : null;
        var isAdmin = profileResult && profileResult.data && profileResult.data.role === 'admin';
        if (!isAdmin) {
          document.getElementById('gameName').textContent = '游戏审核中，暂不开放';
          document.getElementById('loadingFrame').style.display = 'none';
          return;
        }
        // admin 预览模式：顶部加提示条
        var bar = document.createElement('div');
        bar.style.cssText = 'background:#f59e0b;color:#fff;text-align:center;padding:8px;font-size:14px;font-weight:700;';
        bar.textContent = '⚠️ 管理员预览模式 — 此游戏待审核，玩家不可见';
        document.body.insertBefore(bar, document.body.firstChild);
      } else if (result.data.status !== 'online' && !isPreview) {
        document.getElementById('gameName').textContent = '游戏审核中，暂不开放';
        document.getElementById('loadingFrame').style.display = 'none';
        return;
      }

      gameData = result.data;
      var gameName = gameData.name || gameData.title || '未命名游戏';
      document.title = gameName + ' - 小菜鸟';
      document.getElementById('gameName').textContent = gameName;
      document.getElementById('gameDesc').textContent = gameData.description || '暂无描述';

      // 获取作者名
      var authorName = '未知';
      if (gameData.author_id) {
        var profileResult = await sb.from('profiles').select('username').eq('id', gameData.author_id).single();
        if (profileResult.data) authorName = profileResult.data.username;
      }

      // 查真实玩过人数
      var playsResult = await sb.from('game_plays').select('id', { count: 'exact', head: true }).eq('game_id', gameId);
      var realPlayCount = playsResult.count || 0;

      document.getElementById('gameMeta').innerHTML =
        '<span>🏷️ ' + (gameData.category || '其他') + '</span>' +
        '<span>👤 ' + authorName + '</span>' +
        '<span>⭐ ' + (gameData.rating || '0') + ' 分</span>' +
        '<span>🎮 ' + realPlayCount + ' 人玩过</span>';

      // 隐藏加载占位
      document.getElementById('loadingFrame').style.display = 'none';

      // 判断游戏类型
      var fileUrl = gameData.file_url || '';
      if (isStorageUrl(fileUrl)) {
        // === iframe 模式：Supabase Storage 游戏 ===
        isIframeMode = true;
        document.getElementById('iframeWrapper').style.display = 'flex';
        document.getElementById('iframeGameTitle').textContent = gameName;
        // 检查金币后加载 iframe
        await checkAndStartIframe(fileUrl);
      } else {
        // === 传统模式：站内游戏，点击按钮跳转 ===
        isIframeMode = false;
        document.getElementById('gameFrame').style.display = 'block';
        document.getElementById('gameControls').style.display = 'block';
      }
    }

    // ===== iframe 模式：检查金币并加载 =====
    async function checkAndStartIframe(fileUrl) {
      var user = await getCurrentUser();
      if (!user) return;

      var sb = getSupabase();
      var profileResult = await sb.from('profiles').select('coins, role').eq('id', user.id).single();
      var coins = (profileResult.data && profileResult.data.coins) || 0;
      var isAdmin = profileResult.data && profileResult.data.role === 'admin';

      if (!isAdmin && coins < 1) {
        // 金币不足，显示提示
        document.getElementById('iframeWrapper').innerHTML =
          '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;color:#fff;gap:16px;padding:30px;">' +
          '<div style="font-size:3rem">🪙</div>' +
          '<div style="font-size:1.2rem;font-weight:700;">金币不足，无法游玩</div>' +
          '<div style="font-size:0.95rem;color:#ccc;">你的金币余额：' + coins + ' 枚</div>' +
          '<div style="font-size:0.9rem;color:#aaa;">请联系管理员充值金币</div>' +
          '<a href="index.html" style="background:#ff8c00;color:#fff;padding:10px 24px;border-radius:12px;text-decoration:none;font-weight:700;">返回首页</a>' +
          '</div>';
        return;
      }

      // 加载 iframe
      document.getElementById('gameIframe').src = '';
      // 用fetch+srcdoc绕过Content-Type问题
      try {
        var resp = await fetch(fileUrl);
        var html = await resp.text();
        document.getElementById('gameIframe').srcdoc = html;
      } catch(e) {
        document.getElementById('gameIframe').src = fileUrl;
      }

      // 记录玩过
      recordPlay(user.id);

      // 启动金币计时器（admin 免费）
      if (!isAdmin) {
        startCoinTimer(user.id);
      }
    }

    // ===== 传统模式：点击开始游戏 =====
    async function startGame() {
      var user = await getCurrentUser();
      if (!user) { requireLogin('game.html?id=' + gameId); return; }

      var sb = getSupabase();
      var profileResult = await sb.from('profiles').select('coins, role').eq('id', user.id).single();
      var coins = (profileResult.data && profileResult.data.coins) || 0;
      var isAdmin = profileResult.data && profileResult.data.role === 'admin';

      if (!isAdmin && coins < 1) {
        alert('🪙 金币不足！你的金币余额：' + coins + ' 枚，请联系管理员充值。');
        return;
      }

      // 记录玩过
      recordPlay(user.id);

      // 站内游戏：扣1金币后跳转，并用localStorage记录开始时间，回来时继续扣
      var sb2 = getSupabase();
      var deductResult = await sb2.from('profiles').update({ coins: coins - 1 }).eq('id', user.id);
      if (deductResult.error) {
        alert('扣费失败，请重试');
        return;
      }
      // 记录游戏开始时间到localStorage，供返回后继续扣费
      localStorage.setItem('activeGame', JSON.stringify({
        gameId: gameId,
        userId: user.id,
        startTime: Date.now(),
        lastDeduct: Date.now()
      }));

      // 跳转到游戏
      if (gameData && gameData.file_url) {
        window.location.href = gameData.file_url;
      }
    }

    // 页面加载时检查是否从站内游戏返回，继续扣费
    (function checkReturnFromGame() {
      var active = localStorage.getItem('activeGame');
      if (!active) return;
      try {
        var info = JSON.parse(active);
        // 如果回到的是同一个游戏页面，继续扣费
        if (info.gameId === new URLSearchParams(window.location.search).get('id')) {
          var elapsed = Math.floor((Date.now() - info.lastDeduct) / (60 * 1000));
          if (elapsed >= 1) {
            // 有欠费，页面加载后扣
            document.addEventListener('DOMContentLoaded', async function() {
              var user = await getCurrentUser();
              if (!user || user.id !== info.userId) { localStorage.removeItem('activeGame'); return; }
              var sb = getSupabase();
              var pr = await sb.from('profiles').select('coins,role').eq('id', user.id).single();
              var coins = (pr.data && pr.data.coins) || 0;
              var isAdmin = pr.data && pr.data.role === 'admin';
              if (!isAdmin) {
                var cost = Math.min(elapsed, coins);
                if (cost > 0) {
                  await sb.from('profiles').update({ coins: coins - cost }).eq('id', user.id);
                  showToast('🪙 扣除 ' + cost + ' 金币（游戏时长）');
                }
                if (coins - cost <= 0) {
                  showToast('⚠️ 金币已耗尽！');
                }
              }
              localStorage.removeItem('activeGame');
            });
          } else {
            localStorage.removeItem('activeGame');
          }
        }
      } catch(e) { localStorage.removeItem('activeGame'); }
    })();

    // ===== 记录玩过（去重） =====
    async function recordPlay(userId) {
      var sb = getSupabase();
      var existing = await sb.from('game_plays').select('id').eq('game_id', gameId).eq('user_id', userId).maybeSingle();
      if (!existing.data) {
        await sb.from('game_plays').insert({ game_id: gameId, user_id: userId });
      }
    }

    // ===== 金币计时器 =====
    var coinTimer = null;
    var COIN_INTERVAL = 1 * 60 * 1000; // 1分钟
    var COIN_COST = 1;
    var warnedOnce = false;

    function startCoinTimer(userId) {
      if (coinTimer) clearInterval(coinTimer);
      warnedOnce = false;
      var elapsed = 0;

      coinTimer = setInterval(async function() {
        elapsed += 30000;
        var sb = getSupabase();
        var profileResult = await sb.from('profiles').select('coins').eq('id', userId).single();
        var currentCoins = (profileResult.data && profileResult.data.coins) || 0;

        // 提前预警：距下次扣费30秒且只剩1枚
        var timeToNext = COIN_INTERVAL - (elapsed % COIN_INTERVAL);
        if (timeToNext <= 30000 && currentCoins <= 1 && !warnedOnce) {
          warnedOnce = true;
          showToast('⚠️ 金币即将耗尽！还剩 ' + currentCoins + ' 枚，30秒后将暂停游戏', 5000);
        }

        if (elapsed % COIN_INTERVAL === 0) {
          warnedOnce = false;
          if (currentCoins < COIN_COST) {
            // 金币耗尽，暂停
            clearInterval(coinTimer);
            showToast('🪙 金币耗尽，游戏已暂停！请联系管理员充值', 8000);
            if (isIframeMode) {
              document.getElementById('gameIframe').src = 'about:blank';
            }
            return;
          }
          // 扣金币
          var newCoins = currentCoins - COIN_COST;
          await sb.from('profiles').update({ coins: newCoins }).eq('id', userId);

          // 给游戏作者 +0.5 金币（非自己玩自己的游戏）
          if (gameData && gameData.author_id && gameData.author_id !== userId) {
            var authorRes = await sb.from('profiles').select('coins').eq('id', gameData.author_id).single();
            var authorCoins = (authorRes.data && authorRes.data.coins) || 0;
            // 用整数存储，0.5金币累计，每2次+1（用小数×10存储避免浮点）
            // 简化方案：直接存浮点，每次+0.5
            await sb.from('profiles').update({ coins: authorCoins + 0.5 }).eq('id', gameData.author_id);
          }

          if (newCoins <= 2) {
            showToast('🪙 金币余额不足！还剩 ' + newCoins + ' 枚，请注意', 4000);
          } else {
            showToast('🪙 扣除 1 金币，剩余 ' + newCoins + ' 枚', 3000);
          }
        }
      }, 30000);
    }

    // ===== 全屏切换 =====
    function toggleFullscreen() {
      var wrapper = document.getElementById('iframeWrapper') || document.getElementById('gameIframe').parentElement;
      var iframe = document.getElementById('gameIframe');
      var isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

      if (isSafari || isIOS) {
        // Safari/iPad：CSS 模拟全屏
        if (wrapper.classList.contains('css-fullscreen')) {
          wrapper.classList.remove('css-fullscreen');
          document.body.classList.remove('has-fullscreen');
          var fab = document.getElementById('fullscreen-exit-fab');
          if (fab) fab.style.display = 'none';
        } else {
          wrapper.classList.add('css-fullscreen');
          document.body.classList.add('has-fullscreen');
          var fab = document.getElementById('fullscreen-exit-fab');
          if (!fab) {
            fab = document.createElement('button');
            fab.id = 'fullscreen-exit-fab';
            fab.textContent = '✕ 退出全屏';
            fab.style.cssText = 'position:fixed;top:12px;right:12px;z-index:99999;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:20px;padding:8px 16px;font-size:14px;cursor:pointer;';
            fab.onclick = toggleFullscreen;
            document.body.appendChild(fab);
          }
          fab.style.display = 'block';
        }
        return;
      }

      // 其他浏览器：原生全屏
      if (!document.fullscreenElement) {
        iframe.requestFullscreen && iframe.requestFullscreen();
      } else {
        document.exitFullscreen && document.exitFullscreen();
      }
    }

    // 全屏变化时显示/隐藏悬浮退出按钮
    document.addEventListener('fullscreenchange', function() {
      var fab = document.getElementById('fullscreen-exit-fab');
      if (document.fullscreenElement) {
        if (!fab) {
          fab = document.createElement('button');
          fab.id = 'fullscreen-exit-fab';
          fab.textContent = '✕';
          fab.title = '退出全屏';
          fab.style.cssText = 'position:fixed;top:12px;right:12px;z-index:99999;background:rgba(0,0,0,0.55);color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.4);';
          fab.onclick = function() { document.exitFullscreen && document.exitFullscreen(); };
          document.body.appendChild(fab);
        }
        fab.style.display = 'flex';
        fab.style.alignItems = 'center';
        fab.style.justifyContent = 'center';
      } else {
        if (fab) fab.style.display = 'none';
      }
    });

    // ===== 悬浮提示 =====
    function showToast(msg, duration) {
      var existing = document.getElementById('coinToast');
      if (existing) existing.remove();
      var toast = document.createElement('div');
      toast.id = 'coinToast';
      toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:9999;pointer-events:none;transition:opacity 0.3s;';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(function() {
        toast.style.opacity = '0';
        setTimeout(function() { toast.remove(); }, 300);
      }, duration || 3000);
    }

    // ===== 评论系统 =====
    var selectedRating = 0;

    function selectStar(val) {
      selectedRating = val;
      var hints = ['', '很差', '一般', '还行', '好玩', '超棒！'];
      document.getElementById('starHint').textContent = hints[val] || '';
      document.querySelectorAll('.star').forEach(function(s) {
        s.classList.toggle('active', parseInt(s.dataset.val) <= val);
      });
    }

    async function loadComments() {
      var sb = getSupabase();
      if (!sb) return;

      var result = await sb.from('reviews')
        .select('*, profiles(username)')
        .eq('game_id', gameId)
        .order('created_at', { ascending: false })
        .limit(30);

      var list = document.getElementById('commentList');
      if (!result.data || result.data.length === 0) {
        list.innerHTML = '<li class="loading-tip">还没有评论，来第一个评价吧！</li>';
        return;
      }

      list.innerHTML = result.data.map(function(r) {
        var stars = '';
        for (var i = 1; i <= 5; i++) stars += (i <= r.rating ? '★' : '☆');
        var username = (r.profiles && r.profiles.username) ? r.profiles.username : '匿名';
        return '<li><span class="comment-author">' + username + '</span>' +
               '<span class="comment-stars">' + stars + '</span>' +
               '<span>' + (r.content || '') + '</span></li>';
      }).join('');
    }

    async function submitComment() {
      var user = await getCurrentUser();
      if (!user) { alert('请先登录再评价'); return; }

      var text = document.getElementById('commentInput').value.trim();
      if (!selectedRating) { alert('请先选择星级评分'); return; }
      if (!text) { alert('请填写评价内容'); return; }

      var sb = getSupabase();

      // 检查是否已评价过
      var existing = await sb.from('reviews').select('id').eq('game_id', gameId).eq('user_id', user.id).maybeSingle();

      if (existing.data) {
        // 更新评价
        var result = await sb.from('reviews').update({ content: text, rating: selectedRating }).eq('game_id', gameId).eq('user_id', user.id);
        if (result.error) { alert('更新失败：' + result.error.message); return; }
      } else {
        // 新增评价
        var result = await sb.from('reviews').insert({ game_id: gameId, user_id: user.id, content: text, rating: selectedRating });
        if (result.error) { alert('评价失败：' + result.error.message); return; }
      }

      document.getElementById('commentInput').value = '';
      selectedRating = 0;
      document.querySelectorAll('.star').forEach(function(s) { s.classList.remove('active'); });
      document.getElementById('starHint').textContent = '点击打分';

      // 重新计算平均分并更新 games 表
      var allReviews = await sb.from('reviews').select('rating').eq('game_id', gameId);
      if (allReviews.data && allReviews.data.length > 0) {
        var avg = allReviews.data.reduce(function(sum, r) { return sum + r.rating; }, 0) / allReviews.data.length;
        avg = Math.round(avg * 10) / 10;
        await sb.from('games').update({ rating: avg }).eq('id', gameId);
        // 更新页面显示
        var metaEl = document.getElementById('gameMeta');
        if (metaEl) {
          var spans = metaEl.querySelectorAll('span');
          if (spans[2]) spans[2].textContent = '⭐ ' + avg + ' 分';
        }
      }

      loadComments();
    }
  </script>
</body>
</html>
