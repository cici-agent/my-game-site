<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小菜鸟 - 游戏详情</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="game.css">
</head>
<body style="opacity:0;transition:opacity 0.15s">
  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="logo">
      <img src="assets/logo.jpg" alt="小菜鸟" />
      <span>小菜鸟</span>
    </a>
    <div class="nav-links" id="navLinks"></div>
  </nav>

  <!-- 游戏详情 - 宽屏左右分栏 -->
  <div class="game-layout">
    <!-- 左侧：游戏区域 -->
    <div class="game-left">
      <div class="game-play-area">
        <div class="play-frame" id="gameFrame">
          <div class="placeholder" id="gamePlaceholder">
            <div class="icon">🎮</div>
            <p>点击下方按钮开始游戏</p>
          </div>
        </div>
        <div class="game-controls">
          <button class="btn btn-primary play-btn" id="startGameBtn">▶️ 开始游戏</button>
        </div>
      </div>
    </div>

    <!-- 右侧：游戏信息 + 评论 -->
    <div class="game-right">
      <!-- 游戏信息卡片 -->
      <div class="game-info-card">
        <h1 id="gameName">加载中...</h1>
        <div class="game-meta" id="gameMeta">
          <span>🏷️ --</span>
          <span>👤 --</span>
          <span>⭐ --</span>
          <span>🎮 -- 人玩过</span>
        </div>
        <p class="game-desc" id="gameDesc">游戏描述加载中...</p>
        <div class="coin-tip">🪙 每玩 5 分钟消耗 1 金币</div>
      </div>

      <!-- 评论区 -->
      <div class="comments-section">
        <h3>💬 玩家点评</h3>
        <div class="comment-form">
          <input type="text" id="commentInput" placeholder="说说你的游戏体验...">
          <button id="commentBtn" onclick="submitComment()">发表</button>
        </div>
        <ul class="comment-list" id="commentList">
          <li class="loading-tip">加载评论中...</li>
        </ul>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2026 小菜鸟 - 专为小朋友打造的游戏乐园 🐣</p>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script>
    // ===== 游戏详情页逻辑 =====
    var gameId = new URLSearchParams(window.location.search).get('id');
    var gameData = null;

    document.addEventListener('DOMContentLoaded', async function() {
      // 游戏详情页需要登录才能查看
      var loggedIn = await requireLogin('game.html' + (gameId ? '?id=' + gameId : ''));
      if (!loggedIn) return;

      if (gameId) {
        loadGameDetail();
        loadComments();
      } else {
        document.getElementById('gameName').textContent = '游戏不存在';
      }
    });

    async function loadGameDetail() {
      var sb = getSupabase();
      if (!sb) return;

      var result = await sb.from('games').select('*').eq('id', gameId).single();
      if (!result.data) {
        document.getElementById('gameName').textContent = '游戏不存在';
        return;
      }

      gameData = result.data;
      document.title = (gameData.title || gameData.name) + ' - 小菜鸟';
      document.getElementById('gameName').textContent = gameData.title || gameData.name;
      document.getElementById('gameDesc').textContent = gameData.description || '暂无描述';

      // 获取作者名
      var authorName = '未知';
      if (gameData.author_id) {
        var profileResult = await sb.from('profiles').select('username').eq('id', gameData.author_id).single();
        if (profileResult.data) authorName = profileResult.data.username;
      }

      document.getElementById('gameMeta').innerHTML =
        '<span>🏷️ ' + (gameData.category || '其他') + '</span>' +
        '<span>👤 ' + authorName + '</span>' +
        '<span>⭐ ' + (gameData.rating || '0') + ' 分</span>' +
        '<span>🎮 ' + (gameData.play_count || 0) + ' 人玩过</span>';
    }

    // 开始游戏 - 从 Supabase Storage 加载
    document.getElementById('startGameBtn').addEventListener('click', async function() {
      var user = await getCurrentUser();
      if (!user) {
        requireLogin('game.html' + (gameId ? '?id=' + gameId : ''));
        return;
      }
      if (!gameData || (!gameData.file_path && !gameData.file_url)) {
        alert('游戏文件不存在');
        return;
      }

      // 获取游戏文件的 URL（优先 file_url，否则从 Storage 加载）
      var gameUrl;
      if (gameData.file_url) {
        gameUrl = gameData.file_url;
      } else {
        var sb = getSupabase();
        var urlResult = sb.storage.from('games').getPublicUrl(gameData.file_path + '/index.html');
        gameUrl = urlResult.data.publicUrl;
      }

      // 用 iframe 加载游戏
      var frame = document.getElementById('gameFrame');
      frame.innerHTML = '<iframe src="' + gameUrl + '" style="width:100%;height:100%;border:none;border-radius:var(--radius-lg);"></iframe>';

      // 增加游玩次数
      sb.from('games').update({ play_count: (gameData.play_count || 0) + 1 }).eq('id', gameId);
    });

    // 加载评论
    async function loadComments() {
      var sb = getSupabase();
      if (!sb) return;

      var result = await sb.from('reviews').select('*').eq('game_id', gameId).order('created_at', { ascending: false });
      var list = document.getElementById('commentList');

      if (!result.data || result.data.length === 0) {
        list.innerHTML = '<li class="loading-tip">还没有评论，快来第一个点评吧！</li>';
        return;
      }

      var html = '';
      for (var i = 0; i < result.data.length; i++) {
        var review = result.data[i];
        // 获取评论者用户名
        var profileResult = await sb.from('profiles').select('username').eq('id', review.user_id).single();
        var reviewerName = profileResult.data ? profileResult.data.username : '匿名';
        html += '<li class="comment-item">' +
          '<div class="comment-avatar">🐣</div>' +
          '<div class="comment-body">' +
            '<div class="comment-name">' + reviewerName + '</div>' +
            '<div class="comment-text">' + review.content + '</div>' +
          '</div>' +
        '</li>';
      }
      list.innerHTML = html;
    }

    // 发表评论
    async function submitComment() {
      var user = await getCurrentUser();
      if (!user) {
        requireLogin('game.html' + (gameId ? '?id=' + gameId : ''));
        return;
      }
      var input = document.getElementById('commentInput');
      var text = input.value.trim();
      if (!text) return;

      var sb = getSupabase();
      var result = await sb.from('reviews').insert({
        game_id: gameId,
        user_id: user.id,
        content: text,
        rating: 5
      });

      if (result.error) {
        alert('评论失败：' + result.error.message);
        return;
      }

      input.value = '';
      loadComments();
    }
  </script>
</body>
</html>
