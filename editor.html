<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 游戏工坊 - 小菜鸟</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      background: var(--bg-main);
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    /* ===== 顶部导航 ===== */
    .editor-nav {
      height: 56px;
      background: white;
      border-bottom: 2px solid #f0f0f0;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 14px;
      z-index: 100;
    }
    .editor-nav .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      font-weight: 800;
      color: var(--primary);
      font-size: 16px;
    }
    .editor-nav .logo img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
    }
    .editor-nav .nav-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-dark);
      margin-left: 8px;
      padding-left: 14px;
      border-left: 2px solid #e8e8e8;
    }
    .editor-nav .nav-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nav-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-btn-back {
      background: #f5f5f5;
      color: #666;
    }
    .nav-btn-back:hover { background: #eee; }

    /* ===== 主体布局 ===== */
    .editor-main {
      display: flex;
      height: calc(100vh - 56px);
      overflow: hidden;
    }

    /* ===== 左侧对话区 ===== */
    .chat-panel {
      width: 40%;
      min-width: 340px;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      background: white;
      border-right: 2px solid #f0f0f0;
    }

    /* ===== 内部状态小指示器（弱化显示） ===== */
    .status-bar {
      padding: 8px 18px;
      background: #fafafa;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-bar .status-label {
      font-size: 11px;
      color: #bbb;
      margin-right: 4px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e5e7eb;
      transition: all 0.4s;
      position: relative;
    }
    .status-dot.collected {
      background: linear-gradient(135deg, #86efac, #34d399);
      box-shadow: 0 0 6px rgba(52, 211, 153, 0.4);
    }
    .status-dot.active {
      background: linear-gradient(135deg, var(--primary), #ff8c5a);
      box-shadow: 0 0 8px rgba(255, 107, 53, 0.4);
      animation: pulse-dot 1.5s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }
    .status-dot[title]:hover::after {
      content: attr(title);
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 10px;
      white-space: nowrap;
      z-index: 10;
    }
    .status-phase {
      margin-left: auto;
      font-size: 11px;
      color: #ccc;
      font-weight: 500;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 对话气泡 */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 92%;
      animation: msg-in 0.3s ease-out;
    }
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg.user-msg {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .msg-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .msg.ai-msg .msg-avatar {
      background: linear-gradient(135deg, #fff3e0, #ffe0b2);
      border: 2px solid #ffcc80;
    }
    .msg.user-msg .msg-avatar {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      font-size: 14px;
    }
    .msg-body {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.7;
      word-break: break-word;
    }
    .msg.ai-msg .msg-body {
      background: #f8f9fa;
      color: var(--text-dark);
      border-bottom-left-radius: 6px;
      border: 1.5px solid #f0f0f0;
    }
    .msg.user-msg .msg-body {
      background: linear-gradient(135deg, var(--primary), #ff8c5a);
      color: white;
      border-bottom-right-radius: 6px;
      box-shadow: 0 3px 12px rgba(255, 107, 53, 0.3);
    }

    /* 游戏生成成功的特殊气泡 */
    .game-card-bubble {
      background: linear-gradient(135deg, #f0fdf4, #ecfdf5) !important;
      border: 1.5px solid #86efac !important;
    }
    .game-card-bubble .gc-title {
      font-weight: 800;
      font-size: 15px;
      color: #166534;
      margin-bottom: 6px;
    }
    .game-card-bubble .gc-desc {
      font-size: 13px;
      color: #555;
      margin-bottom: 8px;
    }
    .game-card-bubble .gc-tag {
      display: inline-block;
      padding: 3px 10px;
      background: #dcfce7;
      color: #166534;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
    }

    /* 确认卡片样式 */
    .confirm-card {
      background: linear-gradient(135deg, #eff6ff, #dbeafe) !important;
      border: 1.5px solid #93c5fd !important;
      padding: 16px !important;
    }
    .confirm-card .cc-header {
      font-weight: 800;
      font-size: 15px;
      color: #1e40af;
      margin-bottom: 12px;
    }
    .confirm-card .cc-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 13px;
      color: #333;
    }
    .confirm-card .cc-icon {
      font-size: 14px;
      flex-shrink: 0;
    }

    /* Loading 动画 */
    .loading-text {
      color: #999;
      font-size: 13px;
    }
    .loading-text::after {
      content: '';
      animation: dots 1.5s steps(3, end) infinite;
    }
    @keyframes dots {
      0% { content: ''; }
      33% { content: '.'; }
      66% { content: '..'; }
      100% { content: '...'; }
    }
    .bird-fly {
      display: inline-block;
      animation: bird-bounce 0.8s ease-in-out infinite;
      margin-right: 6px;
    }
    @keyframes bird-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    /* 输入区 */
    .chat-input-area {
      padding: 14px 16px;
      background: white;
      border-top: 2px solid #f0f0f0;
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }
    .chat-input-wrap {
      flex: 1;
      background: #f5f5f5;
      border-radius: 20px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
    }
    .chat-input-wrap textarea {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.5;
      font-family: inherit;
    }
    .input-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .voice-btn {
      background: #f5f5f5;
      color: #666;
    }
    .voice-btn:hover { background: #eee; }
    .voice-btn.recording {
      background: #fee2e2;
      color: #dc2626;
      animation: pulse-rec 1s ease-in-out infinite;
    }
    @keyframes pulse-rec {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    .send-btn {
      background: linear-gradient(135deg, var(--primary), #ff8c5a);
      color: white;
      box-shadow: 0 3px 10px rgba(255, 107, 53, 0.3);
    }
    .send-btn:hover { transform: scale(1.05); }
    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* ===== 右侧预览区 ===== */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, #fafafa, #f5f5f5);
      position: relative;
      overflow: hidden;
    }

    /* 预览顶栏 */
    .preview-topbar {
      padding: 14px 24px;
      background: white;
      border-bottom: 2px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 54px;
    }
    .preview-game-title {
      font-size: 16px;
      font-weight: 800;
      color: var(--text-dark);
    }
    .preview-game-tag {
      padding: 4px 12px;
      background: linear-gradient(135deg, #fff3e0, #ffe0b2);
      color: #e65100;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
      display: none;
    }
    .preview-topbar .spacer { flex: 1; }
    .btn-publish {
      padding: 10px 22px;
      background: linear-gradient(135deg, #10b981, #34d399);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
      transition: all 0.2s;
      display: none;
    }
    .btn-publish:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(16, 185, 129, 0.4); }
    .btn-publish.show { display: inline-flex; align-items: center; gap: 6px; }
    .btn-modify {
      padding: 8px 16px;
      background: #f5f5f5;
      color: #666;
      border: none;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: none;
    }
    .btn-modify.show { display: inline-block; }
    .btn-modify:hover { background: #eee; }

    /* 预览内容 */
    .preview-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    /* 占位引导 */
    .preview-empty {
      text-align: center;
      color: #bbb;
      padding: 40px;
    }
    .preview-empty .big-icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .preview-empty h3 {
      font-size: 18px;
      color: #888;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .preview-empty p {
      font-size: 14px;
      color: #aaa;
      line-height: 1.8;
    }

    /* iframe 预览 */
    .preview-iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
      background: white;
      display: none;
    }
    .preview-iframe.show {
      display: block;
      animation: slide-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes slide-in {
      from { opacity: 0; transform: scale(0.92) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ===== 发布确认弹窗 ===== */
    .publish-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .publish-modal.show { display: flex; }
    .publish-modal-box {
      background: white;
      border-radius: 24px;
      padding: 32px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: modal-in 0.3s ease-out;
    }
    @keyframes modal-in {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .publish-modal-box h3 {
      font-size: 20px;
      margin-bottom: 20px;
      color: var(--text-dark);
    }
    .pub-field {
      margin-bottom: 14px;
    }
    .pub-field label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #555;
      margin-bottom: 6px;
    }
    .pub-field input, .pub-field select {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
    }
    .pub-field input:focus, .pub-field select:focus {
      border-color: var(--primary);
    }
    .pub-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .pub-actions button {
      flex: 1;
      padding: 12px;
      border-radius: 14px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .pub-btn-cancel {
      background: #f5f5f5;
      color: #666;
    }
    .pub-btn-confirm {
      background: linear-gradient(135deg, #10b981, #34d399);
      color: white;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }
    .pub-btn-confirm:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ===== 响应式 ===== */
    @media (max-width: 768px) {
      .editor-main {
        flex-direction: column;
      }
      .chat-panel {
        width: 100%;
        min-width: unset;
        max-width: unset;
        height: 55vh;
      }
      .preview-panel {
        height: 45vh;
      }
      .preview-topbar {
        padding: 10px 16px;
      }
      .status-bar {
        padding: 6px 12px;
      }
    }
  </style>
</head>
<body style="opacity:0;transition:opacity 0.15s">
  <!-- 顶部导航 -->
  <nav class="editor-nav">
    <a href="index.html" class="logo">
      <img src="assets/logo.jpg" alt="小菜鸟" />
      <span>小菜鸟</span>
    </a>
    <span class="nav-title">🎮 AI 游戏工坊</span>
    <div class="nav-right">
      <button class="nav-btn nav-btn-back" onclick="location.href='index.html'">← 返回首页</button>
    </div>
  </nav>

  <!-- 主体 -->
  <div class="editor-main">
    <!-- 左侧对话 -->
    <div class="chat-panel">
      <!-- 内部状态指示器（弱化） -->
      <div class="status-bar" id="statusBar">
        <span class="status-label">💡</span>
        <span class="status-dot" data-el="goal" title="目标"></span>
        <span class="status-dot" data-el="rule" title="规则"></span>
        <span class="status-dot" data-el="challenge" title="挑战"></span>
        <span class="status-dot" data-el="reward" title="奖励"></span>
        <span class="status-dot" data-el="world" title="世界观"></span>
        <span class="status-phase" id="statusPhase">聊天中...</span>
      </div>

      <div class="chat-messages" id="chatMessages">
        <!-- AI 初始引导 - 自然开场 -->
        <div class="msg ai-msg">
          <div class="msg-avatar">🐤</div>
          <div class="msg-body">
            嘿！👋 欢迎来到游戏工坊！<br><br>
            我是小菜鸟，你的<strong>游戏创意伙伴</strong> 🐤✨<br><br>
            今天咱们一起做一个属于你的游戏！<br><br>
            <strong>你想做什么游戏？脑子里有什么想法？</strong><br><br>
            <span style="color:#999;font-size:13px">随便说！比如「我想做一个打怪兽的游戏」「我想做一个跑酷游戏」，或者只是一个模糊的感觉也行～</span><br><br>
            <span style="color:#bbb;font-size:12px">💡 打字或者点🎤语音都行</span>
          </div>
        </div>
      </div>

      <!-- 输入区 -->
      <div class="chat-input-area">
        <div class="chat-input-wrap">
          <textarea id="chatInput" rows="1" placeholder="说说你的想法..." disabled></textarea>
        </div>
        <button class="input-btn voice-btn" id="voiceBtn" title="语音输入">🎤</button>
        <button class="input-btn send-btn" id="sendBtn" title="发送" disabled>➤</button>
      </div>
    </div>

    <!-- 右侧预览 -->
    <div class="preview-panel">
      <div class="preview-topbar">
        <span class="preview-game-title" id="previewTitle">游戏预览</span>
        <span class="preview-game-tag" id="previewTag"></span>
        <div class="spacer"></div>
        <button class="btn-modify" id="btnModify">✏️ 继续修改</button>
        <button class="btn-publish" id="btnPublish">🚀 发布给大家玩！</button>
      </div>
      <div class="preview-body">
        <div class="preview-empty" id="previewEmpty">
          <div class="big-icon">🎮</div>
          <h3>你的游戏将在这里出现</h3>
          <p>跟我聊聊你想做什么游戏<br>聊完我就帮你做出来！</p>
        </div>
        <iframe class="preview-iframe" id="previewIframe"></iframe>
      </div>
    </div>
  </div>

  <!-- 发布确认弹窗 -->
  <div class="publish-modal" id="publishModal">
    <div class="publish-modal-box">
      <h3>🚀 发布游戏到小菜鸟</h3>
      <div class="pub-field">
        <label>游戏名称</label>
        <input type="text" id="pubTitle" maxlength="20">
      </div>
      <div class="pub-field">
        <label>游戏简介</label>
        <input type="text" id="pubDesc" maxlength="100">
      </div>
      <div class="pub-field">
        <label>游戏分类</label>
        <select id="pubCategory">
          <option value="action">⚡ 动作</option>
          <option value="puzzle">🧩 益智</option>
          <option value="casual">🎪 休闲</option>
          <option value="racing">🏎️ 竞速</option>
          <option value="learning">📚 学习</option>
        </select>
      </div>
      <div class="pub-actions">
        <button class="pub-btn-cancel" id="pubCancelBtn">取消</button>
        <button class="pub-btn-confirm" id="pubConfirmBtn">确认发布</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script>
  (function() {
    'use strict';

    // ===== DOM 引用 =====
    var chatMessages = document.getElementById('chatMessages');
    var chatInput = document.getElementById('chatInput');
    var sendBtn = document.getElementById('sendBtn');
    var voiceBtn = document.getElementById('voiceBtn');
    var previewIframe = document.getElementById('previewIframe');
    var previewEmpty = document.getElementById('previewEmpty');
    var previewTitle = document.getElementById('previewTitle');
    var previewTag = document.getElementById('previewTag');
    var btnPublish = document.getElementById('btnPublish');
    var btnModify = document.getElementById('btnModify');
    var publishModal = document.getElementById('publishModal');
    var statusPhase = document.getElementById('statusPhase');

    // ===== 状态 =====
    var conversationHistory = []; // 完整对话历史 [{role, content}, ...]
    var currentGameData = null;   // {title, description, category, cover_prompt, html}
    var isGenerating = false;
    var currentUser = null;

    // ===== 内部要素追踪（对孩子不可见） =====
    var elements = {
      goal: false,
      rule: false,
      challenge: false,
      reward: false,
      world: false
    };
    var designConfirmed = false;
    var gameGenerated = false;

    // ===== 迭代模式状态 =====
    var iterationMode = false;       // 是否处于迭代已发布游戏模式
    var iterationGameId = null;      // 正在迭代的游戏 id
    var userGamesCache = null;       // 缓存用户游戏列表

    var FUNC_URL = SUPABASE_URL + '/functions/v1/ai-game-generator';

    var CATEGORY_MAP = {
      action: '动作', puzzle: '益智', casual: '休闲',
      racing: '竞速', learning: '学习'
    };

    // ===== System Prompt - 自然对话式 =====
    var SYSTEM_PROMPT = '你是「小菜鸟」——一个超级有趣的游戏创意伙伴 🐤。你在帮一个小学生把脑子里的想法变成真正能玩的游戏。\n\n' +
      '【你的性格】\n' +
      '- 你像一个特别好玩的朋友，不是老师，不是机器人\n' +
      '- 说话简短、活泼，多用 emoji，偶尔开个小玩笑\n' +
      '- 对孩子的每个想法都表示真心的兴奋（"哇塞！""这也太酷了吧！""我已经能想象出来了！"）\n' +

    // ===== 更新状态指示器 =====
    function updateStatusDots() {
      var dots = document.querySelectorAll('.status-dot');
      var allDone = true;
      dots.forEach(function(dot) {
        var el = dot.getAttribute('data-el');
        if (elements[el]) {
          dot.className = 'status-dot collected';
        } else {
          dot.className = 'status-dot';
          allDone = false;
        }
      });

      // 更新阶段文字
      if (gameGenerated) {
        statusPhase.textContent = '试玩中 🎮';
      } else if (designConfirmed) {
        statusPhase.textContent = '生成中...';
      } else if (allDone) {
        statusPhase.textContent = '确认设计 ✨';
      } else {
        var count = Object.values(elements).filter(Boolean).length;
        if (count === 0) {
          statusPhase.textContent = '聊天中...';
        } else {
          statusPhase.textContent = '聊得不错 ' + '⭐'.repeat(count);
        }
      }
    }

    // ===== 解析 AI 回复中的状态标记 =====
    function parseStateMarkers(content) {
      var stateMatch = content.match(/\[STATE:([^\]]+)\]/);
      if (stateMatch) {
        var pairs = stateMatch[1].split(',');
        pairs.forEach(function(pair) {
          var kv = pair.trim().split('=');
          if (kv.length === 2) {
            var key = kv[0].trim();
            var val = kv[1].trim();
            if (key in elements) {
              elements[key] = (val === '1');
            }
            if (key === 'phase') {
              if (val === 'confirmed') {
                designConfirmed = true;
              }
            }
          }
        });
        updateStatusDots();
      }

      // 清理标记
      return content
        .replace(/\[STATE:[^\]]+\]/g, '')
        .trim();
    }

    // ===== 检测迭代意图 =====
    function detectIterationIntent(text) {
      var patterns = [
        /改.{0,4}(我的|我做的|我之前做的).{0,10}游戏/,
        /更新.{0,4}(我的|我做的).{0,10}游戏/,
        /修改.{0,4}(我的|我做的|我之前做的).{0,10}游戏/,
        /让.{0,4}(我的|我做的).{0,10}游戏.{0,10}变/,
        /我想改.{0,10}游戏/,
        /帮我改.{0,10}游戏/,
        /我之前做的游戏/,
        /我发布的游戏/,
        /我的游戏.{0,6}(改|修改|更新|升级|变)/
      ];
      return patterns.some(function(p) { return p.test(text); });
    }

    // ===== 获取用户已发布游戏 =====
    async function fetchUserGames() {
      if (!currentUser) return [];
      try {
        var sb = getSupabase();
        var res = await sb.from('games')
          .select('id,title,file_url,description')
          .eq('author_id', currentUser.id)
          .order('created_at', { ascending: false });

        return res.data || [];

    // ===== 获取游戏 HTML 内容 =====
    async function fetchGameHtml(fileUrl) {
      if (!fileUrl) return '';
      try {
        var resp = await fetch(fileUrl + '?t=' + Date.now());
        if (!resp.ok) return '';
        return await resp.text();
      } catch(e) { return ''; }
    }

    // ===== 更新已发布游戏 =====
    async function doUpdateGame(gameId, newHtml, newTitle, newDesc) {
      var sb = getSupabase();
      var sessionResult = await sb.auth.getSession();
      if (!sessionResult.data.session) throw new Error('请先登录');
      currentUser = sessionResult.data.session.user;

      // 找到原游戏记录
      var gameRes = await sb.from('games').select('id,file_url,title').eq('id', gameId).eq('author_id', currentUser.id).single();
      if (gameRes.error || !gameRes.data) throw new Error('找不到这个游戏，或者你没有权限修改它');

      var oldFileUrl = gameRes.data.file_url;
      // 从 file_url 提取 storage 路径
      // file_url 格式: https://xxx.supabase.co/storage/v1/object/public/games/userId/filename.html
      var storagePathMatch = oldFileUrl && oldFileUrl.match(/\/storage\/v1\/object\/public\/games\/(.+)$/);
      var storagePath;

      if (storagePathMatch) {
        storagePath = storagePathMatch[1];
        // 用 upsert 覆盖原文件
        var uploadRes = await sb.storage.from('games').upload(storagePath, new Blob([newHtml], { type: 'text/html' }), {
          contentType: 'text/html',
          upsert: true
        });
        if (uploadRes.error) throw uploadRes.error;
      } else {
        // 原路径无法解析，上传新文件
        storagePath = currentUser.id + '/game_' + Date.now() + '_' + Math.random().toString(36).slice(2,8) + '.html';
        var uploadRes2 = await sb.storage.from('games').upload(storagePath, new Blob([newHtml], { type: 'text/html' }), {
          contentType: 'text/html',
          upsert: false
        });
        if (uploadRes2.error) throw uploadRes2.error;
      }

      // 获取新的公开 URL（加时间戳防缓存）
      var urlRes = sb.storage.from('games').getPublicUrl(storagePath);
      var newFileUrl = urlRes.data.publicUrl;

      // 更新 games 表
      var updateData = { file_url: newFileUrl };
      if (newTitle) updateData.title = newTitle;
      if (newDesc) updateData.description = newDesc;
      var updateRes = await sb.from('games').update(updateData).eq('id', gameId).eq('author_id', currentUser.id);
      if (updateRes.error) throw updateRes.error;

      // 清除缓存
      userGamesCache = null;

      return { gameId: gameId, fileUrl: newFileUrl, title: newTitle || gameRes.data.title };
    }

    // ===== 发送消息 =====
    async function sendMessage() {

      // 显示用户气泡
      appendBubble(escapeHtml(text), 'user-msg');
      chatInput.value = '';

      // 存入历史
      conversationHistory.push({ role: 'user', content: text });

      // 检测迭代意图（未进入迭代模式时）
      if (!iterationMode && detectIterationIntent(text)) {
        iterationMode = true;
        isGenerating = true;
        sendBtn.disabled = true;
        chatInput.disabled = true;
        var loadingEl = appendBubble('<span class="bird-fly">🐤</span><span class="loading-text">正在查找你的游戏...</span>', 'ai-msg', true);
        try {

            if (s0.data && s0.data.session) currentUser = s0.data.session.user;
          }
          var games = await fetchUserGames();
          userGamesCache = games;

          // 为每个游戏加载 HTML
          var gamesWithHtml = [];
          for (var i = 0; i < games.length; i++) {
            var g = games[i];
            var html = await fetchGameHtml(g.file_url);
            gamesWithHtml.push({ id: g.id, title: g.title, description: g.description, html: html });
          }

          // 注入游戏列表到对话历史（作为 system 消息）
          var injection = '[GAMES_LIST:' + JSON.stringify({ games: gamesWithHtml }) + ']';
          conversationHistory.push({ role: 'system', content: injection });

          if (loadingEl && loadingEl.parentNode) loadingEl.remove();
        } catch(e) {
          if (loadingEl && loadingEl.parentNode) loadingEl.remove();
          iterationMode = false;
        }
        isGenerating = false;
        sendBtn.disabled = false;
        chatInput.disabled = false;
      }

      // 调用 AI
      callAI();
    }

    // ===== 解析游戏 JSON =====
    function tryParseGame(content) {
      if (!content) return null;
      var trimmed = content.trim();

      // 清理可能的状态标记
      trimmed = trimmed.replace(/\[STATE:[^\]]+\]/g, '').trim();

      // 直接尝试解析
      if (trimmed.startsWith('{')) {
        try {
          var d = JSON.parse(trimmed);
          if (d.html && d.title) return d;
        } catch(e) {}
      }

      // 尝试从 markdown 代码块中提取
      var cm = trimmed.match(/```(?:json)?\s*([\s\S]*?)```/);
      if (cm) {
        try {
          var d = JSON.parse(cm[1]);
          if (d.html && d.title) return d;
        } catch(e) {}
      }

      // 尝试从内容中找到 JSON 对象（generate 或 update）
      var jsonMatch = trimmed.match(/\{[\s\S]*"action"\s*:\s*"(?:generate|update)"[\s\S]*\}/);
      if (jsonMatch) {
        try {
          var d = JSON.parse(jsonMatch[0]);
          if (d.html && d.title) return d;
        } catch(e) {}
      }

      return null;
    }

    }

    function appendBubble(html, type, isLoading, extraClass) {

      var avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = type === 'ai-msg' ? '🐤' : '😊';

      var body = document.createElement('div');
      body.className = 'msg-body' + (extraClass ? ' ' + extraClass : '');
      body.innerHTML = html;

      wrapper.appendChild(avatar);
      wrapper.appendChild(body);
      chatMessages.appendChild(wrapper);

      // 滚动到底部
      chatMessages.scrollTop = chatMessages.scrollHeight;

      return wrapper;

    function initSpeech() {
      var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return;

      recognition = new SpeechRecognition();
      recognition.lang = 'zh-CN';
      recognition.interimResults = true;
      recognition.continuous = false;

      recognition.onresult = function(e) {
        var transcript = '';
        for (var i = e.resultIndex; i < e.results.length; i++) {
          transcript += e.results[i][0].transcript;
        }
        chatInput.value = transcript;
        autoResize();
      };

      recognition.onend = function() {
        isRecording = false;
        voiceBtn.classList.remove('recording');
        voiceBtn.textContent = '🎤';
        chatInput.placeholder = '说说你的想法...';
        if (chatInput.value.trim()) {
          sendBtn.disabled = false;
        }
      };

      recognition.onerror = function(e) {
        isRecording = false;
        voiceBtn.classList.remove('recording');
        voiceBtn.textContent = '🎤';
        chatInput.placeholder = '说说你的想法...';
        if (e.error === 'not-allowed') {
          alert('请允许浏览器使用麦克风权限 🎤');
        }
      };
    }
    initSpeech();

    function toggleVoice() {
      if (!recognition) {
        alert('请使用 Chrome 浏览器以支持语音输入 🎤');
        return;
      }
      if (isRecording) {
        recognition.stop();
      } else {
        isRecording = true;
        voiceBtn.classList.add('recording');
        voiceBtn.textContent = '⏹';
        chatInput.value = '';
        chatInput.placeholder = '正在听你说...';
        try {
          recognition.start();
        } catch(e) {
          isRecording = false;
          voiceBtn.classList.remove('recording');
          voiceBtn.textContent = '🎤';
        }
      }
    }

    // ===== 输入框自动高度 =====
    function autoResize() {
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
    }

    // ===== 继续修改 =====
    function focusChat() {
      chatInput.focus();
      chatInput.placeholder = '告诉我想改什么...';
    }

    // ===== 发布相关 =====
    function showPublishModal() {
      if (!currentGameData) return;
      document.getElementById('pubTitle').value = currentGameData.title || '';
      document.getElementById('pubDesc').value = currentGameData.description || '';
      if (currentGameData.category) {
        document.getElementById('pubCategory').value = currentGameData.category;
      }
      publishModal.classList.add('show');
    }

    function hidePublishModal() {
      publishModal.classList.remove('show');
    }

    async function doPublish() {
      var btn = document.getElementById('pubConfirmBtn');
      btn.disabled = true;
      btn.textContent = '发布中...';

      try {
        var sb = getSupabase();
        var sessionResult = await sb.auth.getSession();
        if (!sessionResult.data.session) {
          throw new Error('请先登录');
        }
        currentUser = sessionResult.data.session.user;

        var title = document.getElementById('pubTitle').value.trim() || currentGameData.title;
        var desc = document.getElementById('pubDesc').value.trim() || currentGameData.description;
        var category = document.getElementById('pubCategory').value;

        // 上传 HTML 到 Storage
        var fileName = 'game_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8) + '.html';
        var filePath = currentUser.id + '/' + fileName;

        var uploadRes = await sb.storage.from('games').upload(filePath, new Blob([currentGameData.html], { type: 'text/html' }), {
          contentType: 'text/html',
          upsert: false
        });
        if (uploadRes.error) throw uploadRes.error;

        // 获取公开 URL
        var urlRes = sb.storage.from('games').getPublicUrl(filePath);
        var publicUrl = urlRes.data.publicUrl;

        // 插入 games 表
        var insertRes = await sb.from('games').insert({
          title: title,
          description: desc,
          category: category,
          game_url: publicUrl,
          author_id: currentUser.id,
          status: 'pending',
          cover_prompt: currentGameData.cover_prompt || ''
        });
        if (insertRes.error) throw insertRes.error;

        hidePublishModal();
        alert('🎉 发布成功！\n管理员审核通过后即可上线，累计 3 位小朋友进入游戏后自动获得 +5 金币奖励！');
        window.location.href = 'profile.html';

      } catch (err) {
        alert('❌ ' + (err.message || '发布失败'));
        btn.disabled = false;
        btn.textContent = '确认发布';
      }
    }

    // ===== 等待认证就绪 =====
    function waitForAuth() {
      chatInput.disabled = false;
      sendBtn.disabled = false;
      // 尝试获取用户信息
      try {
        var sb = getSupabase();
        sb.auth.getSession().then(function(res) {
          if (res.data && res.data.session) {
            currentUser = res.data.session.user;
          }
        });
      } catch(e) {}
    }

    // 延迟启用输入（等 auth.js 加载完）
    setTimeout(waitForAuth, 500);

    // ===== 事件绑定 =====
    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('input', function() {
      autoResize();
      sendBtn.disabled = !chatInput.value.trim();
    });
    chatInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    voiceBtn.addEventListener('click', toggleVoice);
    btnModify.addEventListener('click', focusChat);
    btnPublish.addEventListener('click', showPublishModal);
    document.getElementById('pubCancelBtn').addEventListener('click', hidePublishModal);
    document.getElementById('pubConfirmBtn').addEventListener('click', doPublish);
    publishModal.addEventListener('click', function(e) {
      if (e.target === publishModal) hidePublishModal();
    });

    // 初始化状态指示器
    updateStatusDots();

  })();
  </script>
</body>
</html>
