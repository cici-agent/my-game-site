<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小菜鸟 - 游戏编辑器</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="editor.css">
</head>
<body style="opacity:0;transition:opacity 0.15s">
  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="logo">
      <img src="assets/logo.jpg" alt="小菜鸟" />
      <span>小菜鸟</span>
    </a>
    <div class="nav-links" id="navLinks"></div>
  </nav>

  <!-- 编辑器主体 -->
  <div class="editor-page">
    <!-- 左侧 AI 对话区 -->
    <div class="editor-chat">
      <div class="chat-header">
        🤖 AI 游戏助手
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="chat-bubble ai">
          你好呀！我是你的 AI 游戏助手 🎮<br><br>
          告诉我你想做什么样的游戏，我来帮你实现！<br><br>
          比如：<br>
          • "我想做一个跑酷游戏"<br>
          • "帮我做一个打地鼠"<br>
          • "我要一个太空射击游戏"
        </div>
      </div>
      <div class="chat-input">
        <button class="voice-btn" id="voiceBtn" title="语音输入">🎤</button>
        <input type="text" id="chatInput" placeholder="描述你想做的游戏...">
        <button class="send-btn" id="sendBtn" title="发送">➤</button>
      </div>
    </div>

    <!-- 右侧游戏预览区 -->
    <div class="editor-preview">
      <div class="preview-header">
        <h3>🖥️ 游戏预览</h3>
        <button class="btn btn-primary publish-btn" id="publishBtn">🚀 发布游戏</button>
      </div>
      <div class="preview-frame">
        <div class="preview-placeholder">
          <div class="icon">🎨</div>
          <p>你的游戏将在这里预览</p>
          <p class="hint">在左边告诉 AI 你想做什么游戏吧！</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script>
    // 检查登录状态 - 未登录跳转到登录页，登录后自动跳回
    document.addEventListener('DOMContentLoaded', async function() {
      var loggedIn = await requireLogin('editor.html');
      if (!loggedIn) return;
    });

    var chatMessages = document.getElementById('chatMessages');
    var chatInput = document.getElementById('chatInput');
    var sendBtn = document.getElementById('sendBtn');
    var voiceBtn = document.getElementById('voiceBtn');
    var publishBtn = document.getElementById('publishBtn');

    // 添加消息气泡
    function addMessage(text, type) {
      var bubble = document.createElement('div');
      bubble.className = 'chat-bubble ' + type;
      bubble.innerHTML = text;
      chatMessages.appendChild(bubble);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // 发送消息
    function sendMessage() {
      var text = chatInput.value.trim();
      if (!text) return;
      
      addMessage(text, 'user');
      chatInput.value = '';

      // 模拟 AI 回复
      setTimeout(function() {
        addMessage('收到！我正在帮你构思这个游戏... 🤔<br><br>（AI 游戏生成功能开发中，敬请期待！）', 'ai');
      }, 1000);
    }

    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });

    // 语音按钮
    voiceBtn.addEventListener('click', function() {
      alert('语音输入功能开发中，敬请期待！🎤');
    });

    // 发布按钮
    publishBtn.addEventListener('click', function() {
      alert('游戏发布功能开发中，敬请期待！🚀');
    });
  </script>
</body>
</html>
