<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 游戏工坊 - 小菜鸟</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      background: var(--bg-main);
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    /* ===== 顶部导航 ===== */
    .editor-nav {
      height: 56px;
      background: white;
      border-bottom: 2px solid #f0f0f0;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 14px;
      z-index: 100;
    }
    .editor-nav .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      font-weight: 800;
      color: var(--primary);
      font-size: 16px;
    }
    .editor-nav .logo img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
    }
    .editor-nav .nav-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-dark);
      margin-left: 8px;
      padding-left: 14px;
      border-left: 2px solid #e8e8e8;
    }
    .editor-nav .nav-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nav-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-btn-back {
      background: #f5f5f5;
      color: #666;
    }
    .nav-btn-back:hover { background: #eee; }

    /* ===== 主体布局 ===== */
    .editor-main {
      display: flex;
      height: calc(100vh - 56px);
      overflow: hidden;
    }

    /* ===== 左侧对话区 (40%) ===== */
    .chat-panel {
      width: 40%;
      min-width: 340px;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      background: white;
      border-right: 2px solid #f0f0f0;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 对话气泡 */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 92%;
      animation: msg-in 0.3s ease-out;
    }
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg.user-msg {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .msg-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .msg.ai-msg .msg-avatar {
      background: linear-gradient(135deg, #fff3e0, #ffe0b2);
      border: 2px solid #ffcc80;
    }
    .msg.user-msg .msg-avatar {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      font-size: 14px;
    }
    .msg-body {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.7;
      word-break: break-word;
    }
    .msg.ai-msg .msg-body {
      background: #f8f9fa;
      color: var(--text-dark);
      border-bottom-left-radius: 6px;
      border: 1.5px solid #f0f0f0;
    }
    .msg.user-msg .msg-body {
      background: linear-gradient(135deg, var(--primary), #ff8c5a);
      color: white;
      border-bottom-right-radius: 6px;
      box-shadow: 0 3px 12px rgba(255, 107, 53, 0.3);
    }

    /* 游戏生成成功的特殊气泡 */
    .game-card-bubble {
      background: linear-gradient(135deg, #f0fdf4, #ecfdf5) !important;
      border: 1.5px solid #86efac !important;
    }
    .game-card-bubble .gc-title {
      font-weight: 800;
      font-size: 15px;
      color: #166534;
      margin-bottom: 6px;
    }
    .game-card-bubble .gc-desc {
      font-size: 13px;
      color: #555;
      margin-bottom: 8px;
    }
    .game-card-bubble .gc-tag {
      display: inline-block;
      padding: 3px 10px;
      background: #dcfce7;
      color: #166534;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
    }

    /* Loading 动画 - 小鸟飞翔 */
    .msg-loading .msg-body {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .bird-fly {
      display: inline-block;
      animation: bird-bounce 0.6s ease-in-out infinite alternate;
      font-size: 20px;
    }
    @keyframes bird-bounce {
      from { transform: translateY(0) rotate(-5deg); }
      to { transform: translateY(-6px) rotate(5deg); }
    }
    .loading-text {
      color: #888;
      font-size: 13px;
    }
    .loading-text::after {
      content: '';
      animation: ldots 1.5s infinite;
    }
    @keyframes ldots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }

    /* ===== 输入区 ===== */
    .chat-input-area {
      padding: 14px 16px;
      border-top: 2px solid #f0f0f0;
      background: white;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .chat-input-wrap {
      flex: 1;
      position: relative;
    }
    .chat-input-wrap textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2.5px solid #e8e8e8;
      border-radius: 20px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .chat-input-wrap textarea:focus {
      border-color: var(--primary);
    }
    .chat-input-wrap textarea::placeholder {
      color: #bbb;
    }
    .input-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .voice-btn {
      background: linear-gradient(135deg, #a855f7, #c084fc);
      color: white;
      box-shadow: 0 3px 10px rgba(168, 85, 247, 0.3);
    }
    .voice-btn:hover { transform: scale(1.1); }
    .voice-btn.recording {
      background: #ff4757;
      animation: pulse-rec 1s infinite;
    }
    @keyframes pulse-rec {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.5); }
      50% { box-shadow: 0 0 0 10px rgba(255, 71, 87, 0); }
    }
    .send-btn {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      box-shadow: 0 3px 10px var(--primary-glow);
    }
    .send-btn:hover { transform: scale(1.1); }
    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* ===== 右侧预览区 (60%) ===== */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, #fafafa, #f5f5f5);
      position: relative;
      overflow: hidden;
    }

    /* 预览顶栏 */
    .preview-topbar {
      padding: 14px 24px;
      background: white;
      border-bottom: 2px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 54px;
    }
    .preview-game-title {
      font-size: 16px;
      font-weight: 800;
      color: var(--text-dark);
    }
    .preview-game-tag {
      padding: 4px 12px;
      background: linear-gradient(135deg, #fff3e0, #ffe0b2);
      color: #e65100;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
      display: none;
    }
    .preview-topbar .spacer { flex: 1; }
    .btn-publish {
      padding: 10px 22px;
      background: linear-gradient(135deg, #10b981, #34d399);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
      transition: all 0.2s;
      display: none;
    }
    .btn-publish:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(16, 185, 129, 0.4); }
    .btn-publish.show { display: inline-flex; align-items: center; gap: 6px; }
    .btn-modify {
      padding: 8px 16px;
      background: #f5f5f5;
      color: #666;
      border: none;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: none;
    }
    .btn-modify.show { display: inline-block; }
    .btn-modify:hover { background: #eee; }

    /* 预览内容 */
    .preview-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    /* 占位引导 */
    .preview-empty {
      text-align: center;
      color: #bbb;
      padding: 40px;
    }
    .preview-empty .big-icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .preview-empty h3 {
      font-size: 18px;
      color: #888;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .preview-empty p {
      font-size: 14px;
      color: #aaa;
      line-height: 1.8;
    }

    /* iframe 预览 */
    .preview-iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
      background: white;
      display: none;
    }
    .preview-iframe.show {
      display: block;
      animation: slide-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes slide-in {
      from { opacity: 0; transform: scale(0.92) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ===== 发布确认弹窗 ===== */
    .publish-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .publish-modal.show { display: flex; }
    .publish-modal-box {
      background: white;
      border-radius: 24px;
      padding: 32px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: modal-in 0.3s ease-out;
    }
    @keyframes modal-in {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .publish-modal-box h3 {
      font-size: 20px;
      margin-bottom: 20px;
      color: var(--text-dark);
    }
    .pub-field {
      margin-bottom: 14px;
    }
    .pub-field label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #555;
      margin-bottom: 6px;
    }
    .pub-field input, .pub-field select {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
    }
    .pub-field input:focus, .pub-field select:focus {
      border-color: var(--primary);
    }
    .pub-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .pub-actions button {
      flex: 1;
      padding: 12px;
      border-radius: 14px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .pub-btn-cancel {
      background: #f5f5f5;
      color: #666;
    }
    .pub-btn-confirm {
      background: linear-gradient(135deg, #10b981, #34d399);
      color: white;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }
    .pub-btn-confirm:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ===== 响应式 ===== */
    @media (max-width: 768px) {
      .editor-main {
        flex-direction: column;
      }
      .chat-panel {
        width: 100%;
        min-width: unset;
        max-width: unset;
        height: 55vh;
      }
      .preview-panel {
        height: 45vh;
      }
      .preview-topbar {
        padding: 10px 16px;
      }
    }
  </style>
</head>
<body style="opacity:0;transition:opacity 0.15s">
  <!-- 顶部导航 -->
  <nav class="editor-nav">
    <a href="index.html" class="logo">
      <img src="assets/logo.jpg" alt="小菜鸟" />
      <span>小菜鸟</span>
    </a>
    <span class="nav-title">🎮 AI 游戏工坊</span>
    <div class="nav-right">
      <button class="nav-btn nav-btn-back" onclick="location.href='index.html'">← 返回首页</button>
    </div>
  </nav>

  <!-- 主体 -->
  <div class="editor-main">
    <!-- 左侧对话 -->
    <div class="chat-panel">
      <div class="chat-messages" id="chatMessages">
        <!-- AI 初始引导 -->
        <div class="msg ai-msg">
          <div class="msg-avatar">🐤</div>
          <div class="msg-body">
            嗨！欢迎来到 AI 游戏工坊！我是小菜鸟 🐤<br><br>
            今天我来当你的<strong>游戏产品经理导师</strong>，帮你把脑子里的想法变成一个真正能玩的游戏！✨<br><br>
            先告诉我——<strong>你为什么想做一个游戏呀？</strong><br><br>
            <span style="color:#888;font-size:13px">比如：<br>
            🎯 玩过一个游戏觉得不够好，想自己做个更好的<br>
            💡 脑子里突然冒出一个超酷的想法<br>
            🎁 想给朋友做一个生日礼物游戏<br><br>
            当然你也可以说别的原因！</span><br><br>
            <span style="color:#aaa;font-size:12px">💡 可以打字，也可以点麦克风用语音告诉我</span>
          </div>
        </div>
      </div>

      <!-- 输入区 -->
      <div class="chat-input-area">
        <div class="chat-input-wrap">
          <textarea id="chatInput" rows="1" placeholder="说说你的想法..." disabled></textarea>
        </div>
        <button class="input-btn voice-btn" id="voiceBtn" title="语音输入">🎤</button>
        <button class="input-btn send-btn" id="sendBtn" title="发送" disabled>➤</button>
      </div>
    </div>

    <!-- 右侧预览 -->
    <div class="preview-panel">
      <div class="preview-topbar">
        <span class="preview-game-title" id="previewTitle">游戏预览</span>
        <span class="preview-game-tag" id="previewTag"></span>
        <div class="spacer"></div>
        <button class="btn-modify" id="btnModify">✏️ 继续修改</button>
        <button class="btn-publish" id="btnPublish">🚀 满意，发布！</button>
      </div>
      <div class="preview-body">
        <div class="preview-empty" id="previewEmpty">
          <div class="big-icon">🎮</div>
          <h3>你的游戏将在这里预览</h3>
          <p>在左边告诉 AI 你想做什么游戏<br>生成后可以直接试玩！</p>
        </div>
        <iframe class="preview-iframe" id="previewIframe"></iframe>
      </div>
    </div>
  </div>

  <!-- 发布确认弹窗 -->
  <div class="publish-modal" id="publishModal">
    <div class="publish-modal-box">
      <h3>🚀 发布游戏到小菜鸟</h3>
      <div class="pub-field">
        <label>游戏名称</label>
        <input type="text" id="pubTitle" maxlength="20">
      </div>
      <div class="pub-field">
        <label>游戏简介</label>
        <input type="text" id="pubDesc" maxlength="100">
      </div>
      <div class="pub-field">
        <label>游戏分类</label>
        <select id="pubCategory">
          <option value="action">⚡ 动作</option>
          <option value="puzzle">🧩 益智</option>
          <option value="casual">🎪 休闲</option>
          <option value="racing">🏎️ 竞速</option>
          <option value="learning">📚 学习</option>
        </select>
      </div>
      <div class="pub-actions">
        <button class="pub-btn-cancel" id="pubCancelBtn">取消</button>
        <button class="pub-btn-confirm" id="pubConfirmBtn">确认发布</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script>
  (function() {
    'use strict';

    // ===== DOM 引用 =====
    var chatMessages = document.getElementById('chatMessages');
    var chatInput = document.getElementById('chatInput');
    var sendBtn = document.getElementById('sendBtn');
    var voiceBtn = document.getElementById('voiceBtn');
    var previewIframe = document.getElementById('previewIframe');
    var previewEmpty = document.getElementById('previewEmpty');
    var previewTitle = document.getElementById('previewTitle');
    var previewTag = document.getElementById('previewTag');
    var btnPublish = document.getElementById('btnPublish');
    var btnModify = document.getElementById('btnModify');
    var publishModal = document.getElementById('publishModal');

    // ===== 状态 =====
    var conversationHistory = []; // 完整对话历史 [{role, content}, ...]
    var currentGameData = null;   // {title, description, category, cover_prompt, html}
    var isGenerating = false;
    var currentUser = null;

    var FUNC_URL = SUPABASE_URL + '/functions/v1/ai-game-generator';

    var CATEGORY_MAP = {
      action: '动作', puzzle: '益智', casual: '休闲',
      racing: '竞速', learning: '学习'
    };

    // ===== System Prompt =====
    var SYSTEM_PROMPT = '你是小菜鸟平台的「游戏产品经理导师」，你的任务是像一个好奇的朋友一样，引导小朋友一步步把脑子里的想法变成一个真正能玩的游戏。\n\n' +
      '【你的性格】\n' +
      '- 语气像一个超级好奇的朋友，不是接单工具\n' +
      '- 用小学生能听懂的简单语言，多用 emoji\n' +
      '- 每次只问一个问题，等孩子回答后再问下一个\n' +
      '- 每个问题后给 2-3 个选项作为启发，但鼓励孩子说出自己的想法\n' +
      '- 对孩子的每个回答先表示肯定和好奇，再引导下一步\n\n' +
      '【六步引导流程】\n' +
      '第一步 - 发现灵感 💡：问"你为什么想做这个游戏？是因为玩过什么好玩的？还是脑子里突然冒出一个酷想法？"\n' +
      '第二步 - 定义玩家 👥：问"你想让谁来玩这个游戏？比如你的同学？弟弟妹妹？还是全世界的小朋友？"\n' +
      '第三步 - 设计游戏结构 🏗️：这一步最重要，每次只问一个子问题（按顺序）：\n' +
      '  a) 目标：玩家要完成什么任务才算赢？\n' +
      '  b) 规则：有什么限制或约束让游戏不会太简单？\n' +
      '  c) 挑战：什么东西会越来越难？\n' +
      '  d) 奖励：玩家做得好会得到什么奖励？\n' +
      '  e) 世界观：游戏发生在什么样的世界里？\n' +
      '第四步 - 生成原型 🎮：复述孩子说的所有内容，让孩子确认"我理解得对不对？"，确认后生成游戏\n' +
      '第五步 - 收集反馈 🔄：游戏生成后问"试玩了吗？哪里最好玩？哪里想改？"\n' +
      '第六步 - 发布看数据 📊：鼓励发布，告诉孩子可以看别人怎么评价\n\n' +
      '【重要规则】\n' +
      '- 必须至少走完前三步（灵感+玩家+游戏结构至少2个子问题）才能生成游戏\n' +
      '- 第四步生成前，必须先复述一遍孩子的想法让孩子确认\n' +
      '- 如果孩子说"快点生成"或"直接做吧"，可以跳过剩余子问题，但仍要复述确认\n' +
      '- 如果孩子的回答很短或不确定，用选项启发而不是催促\n\n' +
      '【生成阶段】\n' +
      '当孩子确认你的复述正确后，输出如下JSON（不要有任何其他文字，不要markdown代码块）：\n' +
      '{\n' +
      '  "action": "generate",\n' +
      '  "title": "游戏名称（2-8个字，吸引小学生）",\n' +
      '  "description": "游戏简介（30-60字，说明玩法和特色）",\n' +
      '  "category": "action或puzzle或casual或racing或learning",\n' +
      '  "cover_prompt": "封面图描述（画面内容、色调、风格，50字以内）",\n' +
      '  "html": "完整单文件HTML5游戏代码"\n' +
      '}\n\n' +
      '【修改阶段（第五步）】\n' +
      '用户试玩后要求修改时，先问清楚想改什么，然后输出同样格式的JSON，html字段输出完整修改后的代码。\n\n' +
      '【游戏代码要求】\n' +
      '- 完整单文件HTML，包含所有CSS和JS，不依赖外部资源\n' +
      '- 必须包含：开始界面（显示游戏名和开始按钮）、游戏主体、结束界面（显示得分和重玩按钮）\n' +
      '- 支持手机触摸操作\n' +
      '- 画面色彩鲜艳好看，适合小学生审美\n' +
      '- 游戏要有趣、完整、有挑战性\n' +
      '- 只返回JSON，不要任何解释';

    // ===== 初始化 =====
    async function init() {
      document.body.style.opacity = '1';
      if (typeof updateNavbar === 'function') {
        try { updateNavbar(); } catch(e) {}
      }

      var user = await getCurrentUser();
      if (!user) {
        window.location.href = 'login.html?redirect=editor.html';
        return;
      }
      currentUser = user;
      chatInput.disabled = false;
      sendBtn.disabled = false;
      chatInput.focus();
    }
    init();

    // ===== 发送消息 =====
    function sendMessage() {
      var text = chatInput.value.trim();
      if (!text || isGenerating) return;

      // 显示用户气泡
      appendBubble(escapeHtml(text), 'user-msg');
      chatInput.value = '';
      autoResize();

      // 存入历史
      conversationHistory.push({ role: 'user', content: text });

      // 调用 AI
      callAI();
    }

    // ===== 调用 AI =====
    async function callAI() {
      isGenerating = true;
      sendBtn.disabled = true;
      chatInput.disabled = true;

      // 显示 loading 气泡
      var loadingEl = appendBubble(
        '<span class="bird-fly">🐤</span><span class="loading-text">小菜鸟正在思考</span>',
        'ai-msg', true
      );

      try {
        // 拼装 messages：system + 最近10条历史
        var recentHistory = conversationHistory.slice(-10);
        var messages = [
          { role: 'system', content: SYSTEM_PROMPT }
        ].concat(recentHistory);

        // 获取 token
        var sb = getSupabase();
        var sessionResult = await sb.auth.getSession();
        var token = '';
        if (sessionResult && sessionResult.data && sessionResult.data.session) {
          token = sessionResult.data.session.access_token;
        }

        var resp = await fetch(FUNC_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token,
            'apikey': SUPABASE_ANON_KEY
          },
          body: JSON.stringify({ messages: messages })
        });

        if (!resp.ok) {
          var errBody = {};
          try { errBody = await resp.json(); } catch(e) {}
          throw new Error(errBody.error || 'AI 服务暂时不可用（' + resp.status + '）');
        }

        var data = await resp.json();
        var content = data.content || '';

        // 移除 loading
        if (loadingEl && loadingEl.parentNode) loadingEl.remove();

        // 尝试解析为游戏 JSON
        var gameData = tryParseGame(content);

        if (gameData && gameData.action === 'generate' && gameData.html) {
          // === 游戏生成成功 ===
          currentGameData = gameData;

          // 存原始 JSON 到历史（让 AI 下轮能看到完整游戏信息）
          conversationHistory.push({ role: 'assistant', content: content });

          // 显示友好气泡
          var cardHtml = '✅ 游戏已生成！<br><br>' +
            '<div class="gc-title">' + escapeHtml(gameData.title) + '</div>' +
            '<div class="gc-desc">' + escapeHtml(gameData.description) + '</div>' +
            '<span class="gc-tag">' + (CATEGORY_MAP[gameData.category] || '休闲') + '</span>' +
            '<br><br><span style="color:#999;font-size:12px">👉 右侧可试玩！满意就点「发布」<br>想改就继续说，比如"加个排行榜"</span>';
          appendBubble(cardHtml, 'ai-msg', false, 'game-card-bubble');

          // 渲染预览
          showPreview(gameData);
        } else {
          // === 普通对话回复 ===
          conversationHistory.push({ role: 'assistant', content: content });
          appendBubble(escapeHtml(content), 'ai-msg');
        }
      } catch (err) {
        if (loadingEl && loadingEl.parentNode) loadingEl.remove();
        appendBubble('❌ ' + escapeHtml(err.message || '生成失败，请稍后重试'), 'ai-msg');
        // 失败时移除最后的用户消息
        conversationHistory.pop();
      } finally {
        isGenerating = false;
        sendBtn.disabled = false;
        chatInput.disabled = false;
        chatInput.focus();
      }
    }

    // ===== 解析游戏 JSON =====
    function tryParseGame(content) {
      // 直接解析
      try {
        var d = JSON.parse(content);
        if (d.html && d.title) return d;
      } catch(e) {}

      // 提取最外层 { ... }
      var m = content.match(/\{[\s\S]*\}/);
      if (m) {
        try {
          var d = JSON.parse(m[0]);
          if (d.html && d.title) return d;
        } catch(e) {}
      }

      // 提取 ```json ... ```
      var cm = content.match(/```(?:json)?\s*([\s\S]*?)```/);
      if (cm) {
        try {
          var d = JSON.parse(cm[1]);
          if (d.html && d.title) return d;
        } catch(e) {}
      }

      return null;
    }

    // ===== 显示预览 =====
    function showPreview(gameData) {
      previewEmpty.style.display = 'none';
      previewIframe.style.display = 'block';
      previewIframe.className = 'preview-iframe show';
      previewIframe.srcdoc = gameData.html;

      previewTitle.textContent = gameData.title;
      previewTag.textContent = CATEGORY_MAP[gameData.category] || '休闲';
      previewTag.style.display = 'inline-block';
      btnPublish.classList.add('show');
      btnModify.classList.add('show');
    }

    // ===== 聊天气泡 =====
    function appendBubble(html, type, isLoading, extraClass) {
      var wrapper = document.createElement('div');
      wrapper.className = 'msg ' + type + (isLoading ? ' msg-loading' : '');

      var avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = (type === 'ai-msg') ? '🐤' : '😊';

      var body = document.createElement('div');
      body.className = 'msg-body' + (extraClass ? ' ' + extraClass : '');
      body.innerHTML = html;

      wrapper.appendChild(avatar);
      wrapper.appendChild(body);
      chatMessages.appendChild(wrapper);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return wrapper;
    }

    function escapeHtml(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML.replace(/\n/g, '<br>');
    }

    // ===== 语音输入 (Web Speech API, 可替换) =====
    var recognition = null;
    var isRecording = false;

    function initSpeech() {
      var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        // 浏览器不支持，隐藏麦克风按钮
        voiceBtn.style.display = 'none';
        return;
      }
      recognition = new SR();
      recognition.lang = 'zh-CN';
      recognition.continuous = false;
      recognition.interimResults = true;

      recognition.onresult = function(e) {
        var transcript = '';
        for (var i = e.resultIndex; i < e.results.length; i++) {
          transcript += e.results[i][0].transcript;
        }
        chatInput.value = transcript;
        autoResize();
      };

      recognition.onend = function() {
        isRecording = false;
        voiceBtn.classList.remove('recording');
        voiceBtn.textContent = '🎤';
        chatInput.placeholder = '说说你的想法...';
        if (chatInput.value.trim()) {
          chatInput.focus();
        }
      };

      recognition.onerror = function(e) {
        isRecording = false;
        voiceBtn.classList.remove('recording');
        voiceBtn.textContent = '🎤';
        chatInput.placeholder = '说说你的想法...';
        if (e.error === 'not-allowed') {
          alert('请允许浏览器使用麦克风权限 🎤');
        }
      };
    }
    initSpeech();

    function toggleVoice() {
      if (!recognition) {
        alert('请使用 Chrome 浏览器以支持语音输入 🎤');
        return;
      }
      if (isRecording) {
        recognition.stop();
      } else {
        isRecording = true;
        voiceBtn.classList.add('recording');
        voiceBtn.textContent = '⏹';
        chatInput.value = '';
        chatInput.placeholder = '正在听你说...';
        try {
          recognition.start();
        } catch(e) {
          // 可能已经在运行
          isRecording = false;
          voiceBtn.classList.remove('recording');
          voiceBtn.textContent = '🎤';
        }
      }
    }

    // ===== 输入框自动高度 =====
    function autoResize() {
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
    }

    // ===== 继续修改 =====
    function focusChat() {
      chatInput.focus();
      chatInput.placeholder = '告诉我要改什么，比如"加个排行榜"...';
    }

    // ===== 发布流程 =====
    function showPublishModal() {
      if (!currentGameData) return;
      document.getElementById('pubTitle').value = currentGameData.title || '';
      document.getElementById('pubDesc').value = currentGameData.description || '';
      document.getElementById('pubCategory').value = currentGameData.category || 'casual';
      publishModal.classList.add('show');
    }

    function hidePublishModal() {
      publishModal.classList.remove('show');
    }

    async function doPublish() {
      var title = document.getElementById('pubTitle').value.trim();
      var desc = document.getElementById('pubDesc').value.trim();
      var category = document.getElementById('pubCategory').value;

      if (!title) { alert('请填写游戏名称'); return; }
      if (!currentGameData || !currentGameData.html) { alert('没有可发布的游戏'); return; }

      var btn = document.getElementById('pubConfirmBtn');
      btn.disabled = true;
      btn.textContent = '发布中...';

      try {
        var sb = getSupabase();
        if (!currentUser) throw new Error('请先登录');

        // 1. 上传 HTML 到 Supabase Storage (games bucket)
        var fileName = 'ai_' + currentUser.id.substring(0, 8) + '_' + Date.now() + '.html';
        var filePath = currentUser.id + '/' + fileName;
        var blob = new Blob([currentGameData.html], { type: 'text/html' });

        var upRes = await sb.storage.from('games').upload(filePath, blob, {
          contentType: 'text/html',
          upsert: false
        });
        if (upRes.error) throw new Error('文件上传失败: ' + upRes.error.message);

        // 2. 获取公开 URL
        var urlRes = sb.storage.from('games').getPublicUrl(filePath);
        var fileUrl = urlRes.data.publicUrl;

        // 3. 插入 games 表记录
        var insRes = await sb.from('games').insert({
          title: title,
          description: desc,
          category: category,
          author_id: currentUser.id,
          file_url: fileUrl,
          file_path: filePath,
          status: 'pending',
          play_count: 0,
          coin_per_5min: 1
        });
        if (insRes.error) throw new Error('保存失败: ' + insRes.error.message);

        // 4. 发布奖励 +5 金币
        var profRes = await sb.from('profiles').select('coins').eq('id', currentUser.id).single();
        var coins = (profRes.data && profRes.data.coins) || 0;
        await sb.from('profiles').update({ coins: coins + 5 }).eq('id', currentUser.id);

        hidePublishModal();
        alert('🎉 发布成功！获得 +5 金币！\n管理员审核通过后即可上线');
        window.location.href = 'profile.html';

      } catch (err) {
        alert('❌ ' + (err.message || '发布失败'));
        btn.disabled = false;
        btn.textContent = '确认发布';
      }
    }

    // ===== 事件绑定 =====
    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('input', autoResize);
    chatInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    voiceBtn.addEventListener('click', toggleVoice);
    btnModify.addEventListener('click', focusChat);
    btnPublish.addEventListener('click', showPublishModal);
    document.getElementById('pubCancelBtn').addEventListener('click', hidePublishModal);
    document.getElementById('pubConfirmBtn').addEventListener('click', doPublish);
    publishModal.addEventListener('click', function(e) {
      if (e.target === publishModal) hidePublishModal();
    });

  })();
  </script>
</body>
</html>
