<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小菜鸟 - 管理后台</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body style="opacity:0;transition:opacity 0.15s">
  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="logo">
      <img src="assets/logo.jpg" alt="小菜鸟" />
      <span>小菜鸟</span>
    </a>
    <div class="nav-links" id="navLinks"></div>
  </nav>

  <div class="admin-container" id="adminContent" style="display:none">
    <!-- 标题 -->
    <div class="admin-header">
      <h1>⚙️ 管理后台</h1>
      <p>管理用户和游戏内容</p>
    </div>

    <!-- 数据统计 -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-value" id="statUsers">0</div>
        <div class="stat-label">注册用户</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🎮</div>
        <div class="stat-value" id="statGames">0</div>
        <div class="stat-label">游戏总数</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⏳</div>
        <div class="stat-value" id="statPending">0</div>
        <div class="stat-label">待审核</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">✅</div>
        <div class="stat-value" id="statOnline">0</div>
        <div class="stat-label">已上线</div>
      </div>
    </div>

    <!-- 管理 Tab -->
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="switchAdminTab(this, 'gamesPanel')">🎮 游戏管理</button>
      <button class="admin-tab" onclick="switchAdminTab(this, 'usersPanel')">👥 用户管理</button>
    </div>

    <!-- 游戏管理 -->
    <div class="admin-panel" id="gamesPanel">
      <div class="panel-header">🎮 游戏管理</div>
      <div class="panel-body">
        <table class="admin-table">
          <thead>
            <tr>
              <th>游戏名</th>
              <th>作者</th>
              <th>分类</th>
              <th>状态</th>
              <th>游玩次数</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="gameTableBody">
            <tr><td colspan="6" style="text-align:center;padding:30px;color:#aaa;">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 用户管理 -->
    <div class="admin-panel" id="usersPanel" style="display:none">
      <div class="panel-header">👥 用户管理</div>
      <div class="panel-body">
        <table class="admin-table">
          <thead>
            <tr>
              <th>用户名</th>
              <th>角色</th>
              <th>金币</th>
              <th>注册时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <tr><td colspan="5" style="text-align:center;padding:30px;color:#aaa;">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 无权限提示 -->
  <div class="container" id="noAccess" style="display:none">
    <div class="auth-box" style="max-width:400px;margin:80px auto;text-align:center;">
      <h2>🔒 无权访问</h2>
      <p class="subtitle">只有管理员才能访问后台哦！</p>
      <a href="index.html" class="btn btn-primary" style="margin-top:20px;">回到首页</a>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2026 小菜鸟 - 专为小朋友打造的游戏乐园 🐣</p>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script>
    // ===== 管理后台逻辑 =====

    document.addEventListener('DOMContentLoaded', async function() {
      var user = await getCurrentUser();
      if (!user) {
        document.getElementById('noAccess').style.display = 'block';
        return;
      }
      var profile = await getUserProfile(user.id);
      if (!profile || profile.role !== 'admin') {
        document.getElementById('noAccess').style.display = 'block';
        return;
      }
      // 是管理员，显示后台
      document.getElementById('adminContent').style.display = 'block';
      loadStats();
      loadGames();
      loadUsers();
    });

    // 加载统计
    async function loadStats() {
      var sb = getSupabase();
      var usersResult = await sb.from('profiles').select('id', { count: 'exact' });
      var gamesResult = await sb.from('games').select('id', { count: 'exact' });
      var pendingResult = await sb.from('games').select('id', { count: 'exact' }).eq('status', 'pending');
      var onlineResult = await sb.from('games').select('id', { count: 'exact' }).eq('status', 'online');

      document.getElementById('statUsers').textContent = usersResult.count || 0;
      document.getElementById('statGames').textContent = gamesResult.count || 0;
      document.getElementById('statPending').textContent = pendingResult.count || 0;
      document.getElementById('statOnline').textContent = onlineResult.count || 0;
    }

    // 加载游戏列表
    async function loadGames() {
      var sb = getSupabase();
      var result = await sb.from('games').select('*').order('created_at', { ascending: false });
      var tbody = document.getElementById('gameTableBody');

      if (!result.data || result.data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:#aaa;">暂无游戏</td></tr>';
        return;
      }

      var html = '';
      for (var i = 0; i < result.data.length; i++) {
        var game = result.data[i];
        // 获取作者名
        var authorName = '未知';
        if (game.author_id) {
          var profileResult = await sb.from('profiles').select('username').eq('id', game.author_id).single();
          if (profileResult.data) authorName = profileResult.data.username;
        }
        var statusClass = game.status === 'online' ? 'online' : (game.status === 'pending' ? 'pending' : 'offline');
        var statusText = game.status === 'online' ? '已上线' : (game.status === 'pending' ? '待审核' : '已下线');

        html += '<tr>' +
          '<td>' + game.name + '</td>' +
          '<td>' + authorName + '</td>' +
          '<td>' + (game.category || '--') + '</td>' +
          '<td><span class="status-badge ' + statusClass + '">' + statusText + '</span></td>' +
          '<td>' + (game.play_count || 0) + '</td>' +
          '<td><div class="action-btns">';

        if (game.status !== 'online') {
          html += '<button class="btn-online" onclick="setGameStatus(\'' + game.id + '\', \'online\')">上线</button>';
        }
        if (game.status !== 'offline') {
          html += '<button class="btn-offline" onclick="setGameStatus(\'' + game.id + '\', \'offline\')">下线</button>';
        }
        html += '<button class="btn-delete" onclick="deleteGame(\'' + game.id + '\')">删除</button>';
        html += '</div></td></tr>';
      }
      tbody.innerHTML = html;
    }

    // 加载用户列表
    async function loadUsers() {
      var sb = getSupabase();
      var result = await sb.from('profiles').select('*').order('created_at', { ascending: false });
      var tbody = document.getElementById('userTableBody');

      if (!result.data || result.data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:30px;color:#aaa;">暂无用户</td></tr>';
        return;
      }

      var html = '';
      result.data.forEach(function(user) {
        var roleText = user.role === 'admin' ? '管理员' : '普通用户';
        var createdAt = user.created_at ? new Date(user.created_at).toLocaleDateString('zh-CN') : '--';
        html += '<tr>' +
          '<td>' + user.username + '</td>' +
          '<td>' + roleText + '</td>' +
          '<td>🪙 ' + (user.coins || 0) + '</td>' +
          '<td>' + createdAt + '</td>' +
          '<td><div class="action-btns">';
        if (user.role !== 'admin') {
          html += '<button class="btn-delete" onclick="deleteUser(\'' + user.id + '\', \'' + user.username + '\')">删除</button>';
        }
        html += '</div></td></tr>';
      });
      tbody.innerHTML = html;
    }

    // 设置游戏状态
    async function setGameStatus(gameId, status) {
      var sb = getSupabase();
      await sb.from('games').update({ status: status }).eq('id', gameId);
      loadGames();
      loadStats();
    }

    // 删除游戏
    async function deleteGame(gameId) {
      if (!confirm('确定要删除这个游戏吗？')) return;
      var sb = getSupabase();
      await sb.from('games').delete().eq('id', gameId);
      loadGames();
      loadStats();
    }

    // 删除用户
    async function deleteUser(userId, username) {
      if (!confirm('确定要删除用户 "' + username + '" 吗？')) return;
      var sb = getSupabase();
      // 删除用户的游戏
      await sb.from('games').delete().eq('author_id', userId);
      // 删除用户资料
      await sb.from('profiles').delete().eq('id', userId);
      loadUsers();
      loadStats();
    }

    // Tab 切换
    function switchAdminTab(btn, panelId) {
      document.querySelectorAll('.admin-tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.admin-panel').forEach(function(p) { p.style.display = 'none'; });
      btn.classList.add('active');
      document.getElementById(panelId).style.display = 'block';
    }
  </script>
</body>
</html>
