<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小菜鸟 - 登录</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="logo">
      <span class="logo-icon">🐣</span>
      <span>小菜鸟</span>
    </a>
    <div class="nav-links" id="navLinks"></div>
  </nav>

  <!-- 登录表单（未登录时显示） -->
  <div class="auth-container" id="loginSection">
    <div class="auth-card">
      <h2>🔑 登录</h2>
      <p class="subtitle">欢迎回来，小菜鸟！</p>
      <div class="error-msg" id="loginError"></div>
      <form id="loginForm">
        <div class="form-group">
          <label for="loginUsername">账号</label>
          <input type="text" id="loginUsername" placeholder="输入你的账号" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">密码</label>
          <input type="password" id="loginPassword" placeholder="输入你的密码" required>
        </div>
        <button type="submit" class="form-submit">登录</button>
      </form>
      <div class="switch-link">
        还没有账号？<a id="showRegister">立即注册</a>
      </div>
    </div>
  </div>

  <!-- 注册表单（点击注册时显示） -->
  <div class="auth-container" id="registerSection" style="display:none;">
    <div class="auth-card">
      <h2>🎉 注册</h2>
      <p class="subtitle">加入小菜鸟，开始你的游戏之旅！</p>
      <div class="error-msg" id="registerError"></div>
      <form id="registerForm">
        <div class="form-group">
          <label for="regUsername">账号</label>
          <input type="text" id="regUsername" placeholder="给自己取个酷名字" required minlength="2" maxlength="20">
        </div>
        <div class="form-group">
          <label for="regPassword">密码</label>
          <input type="password" id="regPassword" placeholder="设置密码（至少4位）" required minlength="4">
        </div>
        <div class="form-group">
          <label for="regPasswordConfirm">确认密码</label>
          <input type="password" id="regPasswordConfirm" placeholder="再输入一次密码" required>
        </div>
        <button type="submit" class="form-submit">注册</button>
      </form>
      <div class="switch-link">
        已有账号？<a id="showLogin">去登录</a>
      </div>
    </div>
  </div>

  <!-- 个人中心（登录后显示） -->
  <div class="profile-container" id="profileSection" style="display:none;">
    <div class="profile-header">
      <div class="avatar" id="profileAvatar">🐣</div>
      <div class="username" id="profileUsername">用户名</div>
      <div class="coins">🪙 <span id="profileCoins">0</span> 金币</div>
      <div class="profile-actions">
        <a href="editor.html" class="btn btn-primary">🎮 做游戏</a>
        <button class="logout-btn" id="logoutBtn">退出登录</button>
      </div>
    </div>

    <div class="profile-tabs">
      <div class="tab-nav">
        <button class="active" data-tab="published">我发布的</button>
        <button data-tab="played">我玩过的</button>
        <button data-tab="coins">金币记录</button>
      </div>
      <div class="tab-content">
        <div class="tab-panel active" id="tab-published">
          <div class="empty-state">
            <div class="empty-icon">🎮</div>
            <p>还没有发布过游戏哦，去做一个吧！</p>
          </div>
        </div>
        <div class="tab-panel" id="tab-played">
          <div class="empty-state">
            <div class="empty-icon">🕹️</div>
            <p>还没有玩过游戏，去首页看看吧！</p>
          </div>
        </div>
        <div class="tab-panel" id="tab-coins">
          <div class="empty-state">
            <div class="empty-icon">🪙</div>
            <p>暂无金币记录</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2026 小菜鸟 - 专为小朋友打造的游戏乐园 🐣</p>
    <div class="footer-links">
      <a href="index.html">首页</a>
      <a href="login.html">登录</a>
      <a href="#">关于我们</a>
      <a href="#">联系我们</a>
    </div>
  </footer>

  <script src="auth.js"></script>
  <script src="login.js"></script>
</body>
</html>
