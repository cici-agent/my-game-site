<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 / 我的 - 小菜鸟</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="login.css">
  <style>
    /* 注册页头像选择 */
    .avatar-picker-label {
      font-size: 0.95rem;
      font-weight: 700;
      color: #555;
      margin-bottom: 10px;
      text-align: left;
      display: block;
    }
    .avatar-picker-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .avatar-pick-item {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 3px solid #eee;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      overflow: hidden;
      object-fit: cover;
    }
    .avatar-pick-item:hover {
      transform: scale(1.12);
      border-color: #ffa726;
      box-shadow: 0 3px 10px rgba(255,107,53,0.25);
    }
    .avatar-pick-item.selected {
      border-color: #ff6b35;
      box-shadow: 0 0 0 3px rgba(255,107,53,0.2), 0 3px 10px rgba(255,107,53,0.35);
      transform: scale(1.08);
    }
    @media (max-width: 480px) {
      .avatar-picker-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }
    }
  </style>
</head>
<body style="opacity:0;transition:opacity 0.15s">
  <!-- 导航栏 - 登录页只显示首页链接 -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="logo">
      <img src="assets/logo.jpg" alt="小菜鸟" />
      <span>小菜鸟</span>
    </a>
    <div class="nav-links" id="navLinks">
      <a href="index.html">首页</a>
    </div>
  </nav>

  <!-- 登录/注册界面 -->
  <div id="loginSection">
    <div class="auth-box">
      <!-- 登录引导提示（有 redirect 参数时显示） -->
      <div id="redirectHint" style="display:none;background:linear-gradient(135deg,#fff3e0,#ffe0b2);border-radius:16px;padding:12px 18px;margin-bottom:16px;font-size:15px;color:#e65100;font-weight:600;text-align:center;">
        🔒 登录后即可继续
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="showTab('login')">登录</button>
        <button class="auth-tab" id="tabRegister" onclick="showTab('register')">注册</button>
      </div>

      <!-- 登录表单 -->
      <div id="loginForm">
        <h2>👋 欢迎回来！</h2>
        <p class="subtitle">登录小菜鸟，开始你的游戏之旅</p>
        <input type="text" id="loginUsername" placeholder="用户名" class="input-field">
        <input type="password" id="loginPassword" placeholder="密码" class="input-field">
        <div id="loginError" class="error-msg"></div>
        <button class="btn-primary" onclick="doLogin()">登录 🚀</button>
      </div>

      <!-- 注册表单 -->
      <div id="registerForm" style="display:none">
        <h2>🐥 加入小菜鸟！</h2>
        <p class="subtitle">选一个头像，取个名字，马上开始！</p>
        
        <!-- 头像选择 -->
        <label class="avatar-picker-label">🎨 选一个你喜欢的头像：</label>
        <div class="avatar-picker-grid" id="regAvatarGrid"></div>

        <input type="text" id="regUsername" placeholder="用户名（只能用字母数字下划线）" class="input-field">
        <input type="password" id="regPassword" placeholder="密码（至少6位）" class="input-field">
        <input type="password" id="regPassword2" placeholder="再输一次密码" class="input-field">
        <div id="registerError" class="error-msg"></div>
        <button class="btn-primary" onclick="doRegister()">注册 🎉</button>
      </div>
    </div>
  </div>

  <!-- 个人中心（登录后显示） -->
  <div id="profileSection" style="display:none">
    <div class="container">
      <div class="profile-header">
        <div class="avatar">🐥</div>
        <div class="profile-info">
          <h1 id="profileUsername">用户名</h1>
          <div class="coin-badge">🪙 金币：<span id="profileCoins">0</span></div>
          <div class="profile-actions">
            <a href="editor.html" class="btn-primary">🎮 做游戏</a>
            <a href="upload.html" class="btn-primary" style="background:linear-gradient(135deg,var(--blue),var(--blue-light))">📤 上传游戏</a>
            <button class="btn-secondary" onclick="doLogout()">退出登录</button>
          </div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="switchProfileTab(this, 'myGames')">我发布的游戏</button>
        <button class="tab" onclick="switchProfileTab(this, 'playedGames')">我玩过的游戏</button>
      </div>

      <div id="myGames" class="tab-content">
        <div class="empty-tip" id="myGamesContent">加载中...</div>
      </div>
      <div id="playedGames" class="tab-content" style="display:none">
        <div class="empty-tip">还没有玩过游戏，<a href="index.html">去看看吧！</a></div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2026 小菜鸟 - 专为小朋友打造的游戏乐园 🐣</p>
  </footer>

  <!-- Scripts -->
  <script src="/assets/js/supabase.min.js"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script>
    // ===== 头像列表 =====
    var AVATAR_LIST = [];
    for (var i = 1; i <= 12; i++) {
      AVATAR_LIST.push('assets/avatars/avatar_' + (i < 10 ? '0' + i : i) + '.png');
    }
    var _regSelectedAvatar = '';

    // 初始化注册页头像选择网格
    function initRegAvatarPicker() {
      var grid = document.getElementById('regAvatarGrid');
      if (!grid) return;
      grid.innerHTML = '';
      AVATAR_LIST.forEach(function(src) {
        var img = document.createElement('img');
        img.src = src;
        img.className = 'avatar-pick-item';
        img.onclick = function() {
          grid.querySelectorAll('.avatar-pick-item').forEach(function(el) { el.classList.remove('selected'); });
          img.classList.add('selected');
          _regSelectedAvatar = src;
        };
        grid.appendChild(img);
      });
      // 默认随机选一个
      var randomIdx = Math.floor(Math.random() * 12);
      var items = grid.querySelectorAll('.avatar-pick-item');
      items[randomIdx].classList.add('selected');
      _regSelectedAvatar = AVATAR_LIST[randomIdx];
    }

    // ===== 登录页专属逻辑 =====

    // 读取 redirect 参数
    var _redirectUrl = new URLSearchParams(window.location.search).get('redirect') || '';

    // 登录/注册成功后跳转
    function doRedirectAfterLogin() {
      if (_redirectUrl) {
        window.location.href = _redirectUrl;
      } else {
        window.location.href = 'index.html';
      }
    }

    // 登录页不使用 auth.js 的通用 updateNavbar，覆盖它
    function updateNavbar() {
      var navLinks = document.getElementById('navLinks');
      if (!navLinks) return;
      getCurrentUser().then(function(user) {
        if (user) {
          getUserProfile(user.id).then(function(profile) {
            var isAdmin = profile && profile.role === 'admin';
            navLinks.innerHTML = '<a href="index.html">首页</a>' +
              (isAdmin ? '<a href="admin.html">管理后台</a>' : '');
          });
        } else {
          navLinks.innerHTML = '<a href="index.html">首页</a>';
        }
      });
    }

    // 页面加载时检查登录状态
    document.addEventListener('DOMContentLoaded', function() {
      // 如果有 redirect 参数，显示引导提示
      if (_redirectUrl) {
        document.getElementById('redirectHint').style.display = 'block';
      }
      initRegAvatarPicker();
      updateNavbar();
      checkLoginState().then(function() {
        document.body.style.opacity = '1';
      });
    });

    async function checkLoginState() {
      var user = await getCurrentUser();
      if (user) {
        // 已登录：如果有 redirect 参数，直接跳转
        if (_redirectUrl) {
          doRedirectAfterLogin();
          return;
        }
        var profile = await getUserProfile(user.id);
        if (profile) {
          showProfile(profile);
        } else {
          var uname = user.email ? user.email.replace('@xiaocainiao.app', '') : '用户';
          setTimeout(async function() {
            var retryProfile = await getUserProfile(user.id);
            if (retryProfile) {
              showProfile(retryProfile);
            } else {
              showProfile({ id: user.id, username: uname, coins: 0, role: uname === 'admin' ? 'admin' : 'user' });
            }
          }, 1500);
        }
      } else {
        showLoginForm();
      }
    }

    function showProfile(profile) {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('profileSection').style.display = 'block';
      document.getElementById('profileUsername').textContent = profile.username;
      document.getElementById('profileCoins').textContent = profile.coins || 0;
      updateNavbar();
      loadMyGames(profile.id);
    }

    function showLoginForm() {
      document.getElementById('loginSection').style.display = 'block';
      document.getElementById('profileSection').style.display = 'none';
    }

    // 加载我发布的游戏
    async function loadMyGames(userId) {
      var sb = getSupabase();
      if (!sb) return;
      var result = await sb.from('games').select('*').eq('author_id', userId).order('created_at', { ascending: false });
      var container = document.getElementById('myGamesContent');
      if (!result.data || result.data.length === 0) {
        container.innerHTML = '还没有发布游戏，<a href="upload.html">去上传一个吧！</a>';
        return;
      }
      var html = '<div class="my-games-list">';
      result.data.forEach(function(game) {
        var statusClass = game.status === 'online' ? 'online' : 'pending';
        var statusText = game.status === 'online' ? '已上线' : '审核中';
        html += '<div class="my-game-item">' +
          '<span class="my-game-name">' + game.name + '</span>' +
          '<span class="status-badge ' + statusClass + '">' + statusText + '</span>' +
        '</div>';
      });
      html += '</div>';
      container.innerHTML = html;
    }

    // Tab 切换
    function showTab(tab) {
      document.getElementById('loginForm').style.display = (tab === 'login') ? 'block' : 'none';
      document.getElementById('registerForm').style.display = (tab === 'register') ? 'block' : 'none';
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
    }

    // 登录
    async function doLogin() {
      var username = document.getElementById('loginUsername').value.trim();
      var password = document.getElementById('loginPassword').value;
      var errEl = document.getElementById('loginError');
      if (!username || !password) { errEl.textContent = '请填写用户名和密码'; return; }
      errEl.textContent = '登录中...';
      var result = await signIn(username, password);
      if (result.error) { errEl.textContent = '登录失败：' + result.error; return; }
      errEl.textContent = '';
      // 登录成功后跳转
      doRedirectAfterLogin();
    }

    // 注册（含头像）
    async function doRegister() {
      var username = document.getElementById('regUsername').value.trim();
      var password = document.getElementById('regPassword').value;
      var password2 = document.getElementById('regPassword2').value;
      var errEl = document.getElementById('registerError');
      if (!username || !password) { errEl.textContent = '请填写用户名和密码'; return; }
      if (!/^[a-zA-Z0-9_]+$/.test(username)) { errEl.textContent = '用户名只能用字母、数字和下划线'; return; }
      if (username.length < 2 || username.length > 20) { errEl.textContent = '用户名长度 2-20 个字符'; return; }
      if (password.length < 6) { errEl.textContent = '密码至少6位'; return; }
      if (password !== password2) { errEl.textContent = '两次密码不一致'; return; }
      errEl.textContent = '注册中...';
      var result = await signUpWithAvatar(username, password, _regSelectedAvatar);
      if (result.error) { errEl.textContent = '注册失败：' + result.error; return; }
      errEl.textContent = '';
      // 注册成功后自动登录
      var loginResult = await signIn(username, password);
      if (!loginResult.error) {
        // 登录成功后跳转
        doRedirectAfterLogin();
      } else {
        errEl.textContent = '注册成功！请登录';
        showTab('login');
      }
    }

    // 登出
    async function doLogout() {
      await signOut();
      showLoginForm();
      updateNavbar();
    }

    // 个人中心 Tab 切换
    function switchProfileTab(btn, tabId) {
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.tab-content').forEach(function(t) { t.style.display = 'none'; });
      btn.classList.add('active');
      document.getElementById(tabId).style.display = 'block';
    }

    // 回车键提交
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        if (document.getElementById('loginForm').style.display !== 'none') {
          doLogin();
        } else {
          doRegister();
        }
      }
    });
  </script>
</body>
</html>
