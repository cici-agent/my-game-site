<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 / 我的 - 小菜鸟</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f0f8ff; color: #333; }
    nav { background: #ff6b35; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
    nav .logo { font-size: 1.6rem; font-weight: bold; color: white; text-decoration: none; }

    /* 登录表单 */
    .login-box { max-width: 400px; margin: 60px auto; background: white; border-radius: 24px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
    .login-box h2 { font-size: 1.8rem; margin-bottom: 8px; color: #ff6b35; }
    .login-box p { color: #888; margin-bottom: 28px; }
    .login-box input { width: 100%; padding: 12px 16px; border: 2px solid #eee; border-radius: 12px; font-size: 1rem; margin-bottom: 16px; outline: none; }
    .login-box input:focus { border-color: #ff6b35; }
    .login-box button { width: 100%; background: #ff6b35; color: white; border: none; padding: 14px; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-bottom: 12px; }
    .login-box .switch { color: #888; font-size: 0.9rem; }
    .login-box .switch a { color: #ff6b35; text-decoration: none; }

    /* 个人中心 */
    .container { max-width: 900px; margin: 32px auto; padding: 0 24px; }
    .profile-header { background: white; border-radius: 20px; padding: 32px; display: flex; align-items: center; gap: 24px; margin-bottom: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .avatar { width: 80px; height: 80px; background: #ffe0cc; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; cursor: pointer; }
    .profile-info h1 { font-size: 1.6rem; margin-bottom: 8px; }
    .coin-badge { background: #ffd700; color: #333; padding: 6px 16px; border-radius: 20px; font-weight: bold; display: inline-block; margin-right: 8px; }
    .profile-actions { display: flex; gap: 12px; margin-top: 12px; }
    .profile-actions a { background: #ff6b35; color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-size: 0.9rem; }
    .profile-actions a.secondary { background: #eee; color: #333; }
    .tabs { display: flex; gap: 12px; margin-bottom: 24px; }
    .tab { padding: 10px 24px; border-radius: 24px; border: 2px solid #ff6b35; color: #ff6b35; cursor: pointer; font-size: 1rem; background: white; }
    .tab.active { background: #ff6b35; color: white; }
    .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
    .game-card { background: white; border-radius: 16px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .game-card .thumb { width: 100%; height: 100px; background: #ffe0cc; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin-bottom: 10px; }
    .status { font-size: 0.8rem; padding: 3px 10px; border-radius: 10px; display: inline-block; margin-top: 6px; }
    .status.online { background: #d4edda; color: #155724; }
    .status.offline { background: #f8d7da; color: #721c24; }
    footer { background: #333; color: #aaa; text-align: center; padding: 24px; margin-top: 40px; }
  </style>
</head>
<body>
  <nav>
    <a class="logo" href="index.html">🐥 小菜鸟</a>
  </nav>

  <!-- 登录界面 -->
  <div id="loginSection">
    <div class="login-box">
      <h2>🐥 欢迎回来</h2>
      <p>登录小菜鸟，开始你的游戏之旅</p>
      <input type="text" placeholder="用户名" id="username">
      <input type="password" placeholder="密码" id="password">
      <button onclick="doLogin()">登录</button>
      <div class="switch">还没有账号？<a href="#">立即注册</a></div>
    </div>
  </div>

  <!-- 个人中心（登录后显示） -->
  <div id="profileSection" style="display:none">
    <div class="container">
      <div class="profile-header">
        <div class="avatar">🐥</div>
        <div class="profile-info">
          <h1 id="displayName">小菜鸟用户</h1>
          <div>
            <span class="coin-badge">🪙 金币：200</span>
          </div>
          <div class="profile-actions">
            <a href="editor.html">🎮 做游戏</a>
            <a href="#" class="secondary" onclick="doLogout()">退出登录</a>
          </div>
        </div>
      </div>
      <div class="tabs">
        <button class="tab active">我发布的游戏</button>
        <button class="tab">我玩过的游戏</button>
        <button class="tab">金币记录</button>
      </div>
      <div class="game-grid">
        <div class="game-card"><div class="thumb">🚀</div><h3>太空冒险</h3><span class="status online">已上线</span></div>
        <div class="game-card"><div class="thumb">🏰</div><h3>守护城堡</h3><span class="status offline">已下线</span></div>
      </div>
    </div>
  </div>

  <footer>© 2026 小菜鸟 · 小朋友的游戏乐园</footer>

  <script>
    // 简单登录逻辑（演示用）
    function doLogin() {
      const name = document.getElementById('username').value || '小菜鸟用户';
      document.getElementById('displayName').textContent = name;
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('profileSection').style.display = 'block';
    }
    function doLogout() {
      document.getElementById('loginSection').style.display = 'block';
      document.getElementById('profileSection').style.display = 'none';
    }
  </script>
</body>
</html>
