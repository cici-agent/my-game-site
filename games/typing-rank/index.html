<!DOCTYPE html>

<head>
<!--
  ===== 小菜鸟 · 打字排名赛 =====
  路径: games/typing-rank/index.html
  
  ===== 需要在 Supabase SQL Editor 执行的建表 SQL =====
  （与打字挑战赛共用，如果已执行过则跳过）
  
  -- 1. 打字挑战赛通关记录表
  CREATE TABLE IF NOT EXISTS typing_challenge_records (
    id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
    user_id UUID REFERENCES auth.users(id) ON DELETE CASCADE NOT NULL,
    type TEXT NOT NULL CHECK (type IN ('english', 'chinese')),
    level INT NOT NULL CHECK (level >= 1 AND level <= 10),
    passed_at TIMESTAMPTZ DEFAULT now(),
    best_wpm NUMERIC DEFAULT 0,
    best_cpm NUMERIC DEFAULT 0,
    best_accuracy NUMERIC DEFAULT 0,
    coins_rewarded INT DEFAULT 0,
    updated_at TIMESTAMPTZ DEFAULT now(),
    UNIQUE(user_id, type, level)
  );

  -- 2. 打字成绩流水记录表
  CREATE TABLE IF NOT EXISTS typing_records (
    id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
    user_id UUID REFERENCES auth.users(id) ON DELETE CASCADE NOT NULL,
    username TEXT NOT NULL,
    mode TEXT NOT NULL CHECK (mode IN ('challenge', 'rank')),
    lang TEXT NOT NULL CHECK (lang IN ('zh', 'en')),
    level INT,
    speed NUMERIC NOT NULL,
    accuracy NUMERIC NOT NULL,
    passed BOOLEAN DEFAULT false,
    coins_earned INT DEFAULT 0,
    created_at TIMESTAMPTZ DEFAULT now()
  );

  -- 3. 排名赛周榜表
  CREATE TABLE IF NOT EXISTS typing_weekly_rank (
    id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
    user_id UUID REFERENCES auth.users(id) ON DELETE CASCADE NOT NULL,
    username TEXT NOT NULL,
    lang TEXT NOT NULL CHECK (lang IN ('zh', 'en')),
    best_speed NUMERIC NOT NULL,
    accuracy NUMERIC NOT NULL,
    week_start DATE NOT NULL,
    attempts_today INT DEFAULT 1,
    last_attempt_date DATE DEFAULT CURRENT_DATE,
    updated_at TIMESTAMPTZ DEFAULT now(),
    UNIQUE(user_id, lang, week_start)
  );

  -- 4. 排名赛结算记录
  CREATE TABLE IF NOT EXISTS typing_rank_settlements (
    id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
    week_start DATE NOT NULL,
    lang TEXT NOT NULL,
    settled_at TIMESTAMPTZ DEFAULT now(),
    first_user_id UUID,
    first_username TEXT,
    first_coins INT DEFAULT 30,
    second_user_id UUID,
    second_username TEXT,
    second_coins INT DEFAULT 20,
    third_user_id UUID,
    third_username TEXT,
    third_coins INT DEFAULT 10,
    UNIQUE(week_start, lang)
  );

  -- 5. RLS 策略
  ALTER TABLE typing_challenge_records ENABLE ROW LEVEL SECURITY;
  ALTER TABLE typing_records ENABLE ROW LEVEL SECURITY;
  ALTER TABLE typing_weekly_rank ENABLE ROW LEVEL SECURITY;
  ALTER TABLE typing_rank_settlements ENABLE ROW LEVEL SECURITY;

  CREATE POLICY "Users can read own challenge records" ON typing_challenge_records
    FOR SELECT USING (auth.uid() = user_id);
  CREATE POLICY "Users can insert own challenge records" ON typing_challenge_records
    FOR INSERT WITH CHECK (auth.uid() = user_id);
  CREATE POLICY "Users can update own challenge records" ON typing_challenge_records
    FOR UPDATE USING (auth.uid() = user_id);

  CREATE POLICY "Users can insert own typing records" ON typing_records
    FOR INSERT WITH CHECK (auth.uid() = user_id);
  CREATE POLICY "Anyone can read typing records" ON typing_records
    FOR SELECT USING (true);

  CREATE POLICY "Users can insert own weekly rank" ON typing_weekly_rank
    FOR INSERT WITH CHECK (auth.uid() = user_id);
  CREATE POLICY "Users can update own weekly rank" ON typing_weekly_rank
    FOR UPDATE USING (auth.uid() = user_id);
  CREATE POLICY "Anyone can read weekly rank" ON typing_weekly_rank
    FOR SELECT USING (true);

  CREATE POLICY "Anyone can read settlements" ON typing_rank_settlements
    FOR SELECT USING (true);
  CREATE POLICY "Users can insert settlements" ON typing_rank_settlements
    FOR INSERT WITH CHECK (true);

  ===== END SQL =====
-->

// ===== Supabase 初始化 =====
var SUPABASE_URL = 'https://aqxbpuetdypcbmqdncpl.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxeGJwdWV0ZHlwY2JtcWRuY3BsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5ODg5MzksImV4cCI6MjA5NDU2NDkzOX0.YUwFQeJgbmhrtY32tGXbm9wz0jtou0Zxg1626EJl3r0';
var sb = null;
var currentUser = null;
var currentProfile = null;

function initSupabase() {
  var lib = (typeof supabase !== 'undefined' && supabase.createClient) ? supabase : window.supabase;
  sb = lib.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: true, storageKey: 'xiaocainiao_session', storage: window.localStorage, autoRefreshToken: true, detectSessionInUrl: false }
  });
}

async function checkAuth() {
  initSupabase();
  try {
    var { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = '/login.html'; return false; }
    currentUser = session.user;
    var { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
    currentProfile = profile || {};
    document.getElementById('coinsDisplay').textContent = '🪙 ' + (currentProfile.coins || 0);
    return true;
  } catch(e) {
    window.location.href = '/login.html';
    return false;
  }
}

// ===== 游戏状态 =====
var gameActive = false;
var gameTimer = null;
var timeLeft = 60;
var startTime = 0;
var cumulativeCorrect = 0;
var cumulativeWrong = 0;
var currentCorrect = 0;
var currentWrong = 0;
var sentencesCompleted = 0;

// 逐句滚动状态
var currentSentence = '';      // 当前要打的句子
var sentenceQueue = [];        // 句子队列
var currentPoemTitle = '';     // 当前诗名/文章名
var currentPoemAuthor = '';    // 当前作者/级别
var charElements = [];

// ===== 准备句子队列 =====
function prepareSentenceQueue() {
  sentenceQueue = [];
  if (playLang === 'zh') {
    // 随机打乱诗的顺序
    var shuffled = zhPoems.slice().sort(function() { return Math.random() - 0.5; });
    for (var i = 0; i < shuffled.length; i++) {
      var poem = shuffled[i];
      for (var j = 0; j < poem.lines.length; j++) {
        sentenceQueue.push({
          text: poem.lines[j],
          title: poem.title,
          author: poem.author
        });
      }
    }
  } else {
    // 英文：随机打乱文章顺序
    var shuffled = enSentences.slice().sort(function() { return Math.random() - 0.5; });
    for (var i = 0; i < shuffled.length; i++) {
      var article = shuffled[i];
      for (var j = 0; j < article.lines.length; j++) {
        sentenceQueue.push({
          text: article.lines[j],
          title: article.title,
          author: 'Level ' + article.level
        });
      }
    }
  }
}

// ===== 加载下一句 =====
function loadNextSentence() {
  if (sentenceQueue.length === 0) {
    prepareSentenceQueue(); // 循环
  }
  var item = sentenceQueue.shift();
  currentSentence = item.text;
  currentPoemTitle = item.title;
  currentPoemAuthor = item.author;
  renderSentence();
}

// ===== 渲染当前句子 =====
function renderSentence() {
  // 显示诗名/作者
  var infoEl = document.getElementById('poemInfo');
  if (playLang === 'zh') {
    infoEl.textContent = '《' + currentPoemTitle + '》— ' + currentPoemAuthor;
  } else {
    infoEl.textContent = currentPoemTitle + ' (' + currentPoemAuthor + ')';
  }
  
  // 渲染字符
  var container = document.getElementById('sentenceDisplay');
  var html = '';
  for (var i = 0; i < currentSentence.length; i++) {
    var cls = 'char';
    if (i === 0) cls += ' current';
    html += '<span class="' + cls + '">' + escapeHtml(currentSentence[i]) + '</span>';
  }
  container.innerHTML = html;
  charElements = container.querySelectorAll('.char');
  
  // 更新计数
  document.getElementById('sentenceCounter').textContent = '已完成 ' + sentencesCompleted + ' 句';
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/ /g, '&nbsp;');
}

// ===== 防作弊系统 =====
function showCheatWarning(msg) {
  var el = document.createElement('div');
  el.className = 'cheat-warning';
  el.textContent = msg || '请用键盘打字哦！🚫';
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, 2000);
}

function setupAntiCheat(input) {
  // 禁止粘贴
  input.addEventListener('paste', function(e) {
    e.preventDefault();
    showCheatWarning('不能粘贴哦，请用键盘打字！');
    return false;
  });
  
  // 禁止拖放
  input.addEventListener('drop', function(e) {
    e.preventDefault();
    showCheatWarning('请用键盘打字哦！');
    return false;
  });
  
  // 监听 inputType 检测语音输入
  input.addEventListener('beforeinput', function(e) {
    if (e.inputType === 'insertFromPaste' || 
        e.inputType === 'insertFromDrop' ||
        e.inputType === 'insertFromSpeech' ||
        e.inputType === 'insertReplacementText') {
      e.preventDefault();
      showCheatWarning('请用键盘打字哦！🚫');
      return false;
    }
  });
}

// ===== 输入处理 =====
function setupChineseInput(input) {
  var composing = false;
  input.addEventListener('compositionstart', function() { composing = true; });
  input.addEventListener('compositionend', function() {
    composing = false;
    processInput(input.value);
  });
  input.addEventListener('input', function(e) {
    // 额外检测语音/粘贴
    if (e.inputType === 'insertFromPaste' || e.inputType === 'insertFromSpeech' || e.inputType === 'insertReplacementText') {
      input.value = '';
      showCheatWarning('请用键盘打字哦！🚫');
      return;
    }
    if (!composing) processInput(input.value);
  });
}

function setupEnglishInput(input) {
  input.addEventListener('input', function(e) {
    if (!gameActive) return;
    // 额外检测语音/粘贴
    if (e.inputType === 'insertFromPaste' || e.inputType === 'insertFromSpeech' || e.inputType === 'insertReplacementText') {
      input.value = '';
      showCheatWarning('请用键盘打字哦！🚫');
      return;
    }
    processInput(input.value);
  });
}

function processInput(value) {
  if (!gameActive) return;
  
  currentCorrect = 0;
  currentWrong = 0;
  
  for (var i = 0; i < charElements.length; i++) {
    charElements[i].className = 'char';
    if (i < value.length) {
      if (value[i] === currentSentence[i]) {
        charElements[i].className = 'char correct';
        currentCorrect++;
      } else {
        charElements[i].className = 'char wrong';
        currentWrong++;
      }
    } else if (i === value.length) {
      charElements[i].className = 'char current';
    }
  }
  
  updateStats();
  
  // 当前句子打完
  if (value.length >= currentSentence.length) {
    cumulativeCorrect += currentCorrect;
    cumulativeWrong += currentWrong;
    currentCorrect = 0;
    currentWrong = 0;
    sentencesCompleted++;
    
    // 清空输入框
    var input = document.getElementById('typingInput');
    input.value = '';
    
    // 加载下一句（带过渡动画）
    var display = document.getElementById('sentenceDisplay');
    display.style.opacity = '0';
    display.style.transform = 'translateY(-10px)';
    setTimeout(function() {
      loadNextSentence();
      display.style.opacity = '1';
      display.style.transform = 'translateY(0)';
    }, 150);
  }
}

function updateStats() {
  var elapsed = (Date.now() - startTime) / 1000 / 60;
  if (elapsed < 0.01) elapsed = 0.01;
  
  var totalCorrectNow = cumulativeCorrect + currentCorrect;
  var totalWrongNow = cumulativeWrong + currentWrong;
  var totalAll = totalCorrectNow + totalWrongNow;
  
  var speed = 0;
  if (playLang === 'zh') {
    speed = Math.round(totalCorrectNow / elapsed);
    document.getElementById('statCount').textContent = totalCorrectNow;
  } else {
    speed = Math.round((totalCorrectNow / 5) / elapsed);
    document.getElementById('statCount').textContent = Math.round(totalCorrectNow / 5);
  }
  
  var accuracy = totalAll > 0 ? Math.round((totalCorrectNow / totalAll) * 100) : 100;
  document.getElementById('statSpeed').textContent = speed;
  document.getElementById('statAccuracy').textContent = accuracy + '%';
}

// ===== 时间工具 =====
function getWeekStart() {
  var now = new Date();
  var bjNow = new Date(now.getTime() + (8 * 60 * 60 * 1000) - (now.getTimezoneOffset() * 60 * 1000));
  var day = bjNow.getUTCDay();
  var diff = day === 0 ? 6 : day - 1;
  var monday = new Date(bjNow);
  monday.setUTCDate(monday.getUTCDate() - diff);
  return monday.toISOString().split('T')[0];
}

function getTodayBJ() {
  var now = new Date();
  var bjNow = new Date(now.getTime() + (8 * 60 * 60 * 1000) - (now.getTimezoneOffset() * 60 * 1000));
  return bjNow.toISOString().split('T')[0];
}

function getNextSettlement() {
  var now = new Date();
  var bjNow = new Date(now.getTime() + (8 * 60 * 60 * 1000) - (now.getTimezoneOffset() * 60 * 1000));
  var day = bjNow.getUTCDay();
  var daysUntilSat = (6 - day + 7) % 7;
  if (daysUntilSat === 0) {
    if (bjNow.getUTCHours() >= 20) {
      daysUntilSat = 7;
    }
  }
  var satDate = new Date(bjNow);
  satDate.setUTCDate(satDate.getUTCDate() + daysUntilSat);
  var month = satDate.getUTCMonth() + 1;
  var date = satDate.getUTCDate();
  return month + '月' + date + '日 周六 20:00';
}

function getLastWeekStart() {
  var now = new Date();
  var bjNow = new Date(now.getTime() + (8 * 60 * 60 * 1000) - (now.getTimezoneOffset() * 60 * 1000));
  var day = bjNow.getUTCDay();
  var diff = day === 0 ? 6 : day - 1;
  var monday = new Date(bjNow);
  monday.setUTCDate(monday.getUTCDate() - diff - 7);
  return monday.toISOString().split('T')[0];
}

  loadAttempts();
}

// ===== 排行榜 =====
async function loadRankList() {
  if (!currentUser) return;
  var weekStart = getWeekStart();
  
  try {
    var { data, error } = await sb.from('typing_weekly_rank')
      .select('*')
      .eq('lang', rankLang)
      .eq('week_start', weekStart)
      .order('best_speed', { ascending: false })
      .limit(20);
    
    if (error || !data || data.length === 0) {
      document.getElementById('rankListContainer').innerHTML = 
        '<div class="empty-state"><div class="empty-icon">🏆</div><div>本周还没有人参赛，快来争第一吧！</div></div>';
      document.getElementById('championBanner').innerHTML = '';
      return;
    }
    
    var unit = rankLang === 'zh' ? '字/分' : 'WPM';
    var html = '<ul class="rank-list">';
    for (var i = 0; i < data.length; i++) {
      var item = data[i];
      var posClass = '';
      if (i === 0) posClass = 'top1';
      else if (i === 1) posClass = 'top2';
      else if (i === 2) posClass = 'top3';
      var meClass = item.user_id === currentUser.id ? ' me' : '';
      var medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
      
      html += '<li class="rank-item ' + posClass + meClass + '">';
      html += '<div class="rank-pos">' + medal + '</div>';
      html += '<div class="rank-name">' + escapeHtml(item.username) + '</div>';
      html += '<div class="rank-score">' + Math.round(item.best_speed) + ' ' + unit + '</div>';
      html += '</li>';
    }
    html += '</ul>';
    document.getElementById('rankListContainer').innerHTML = html;
    
    // 上周冠军
    checkLastWeekChampion();
  } catch(e) {
    console.log('加载排行榜失败:', e);
  }
}

async function checkLastWeekChampion() {
  try {
    var lastWeek = getLastWeekStart();
    var { data } = await sb.from('typing_rank_settlements')
      .select('*')
      .eq('week_start', lastWeek)
      .eq('lang', rankLang)
      .maybeSingle();
    
    if (data && data.first_username) {
      showChampion(data);
    } else {
      // 尝试自动结算
      await tryAutoSettle(lastWeek);
    }
  } catch(e) {
    console.log('结算检查失败:', e);
  }
}

function showChampion(champion) {
  if (!champion) return;
  var unit = rankLang === 'zh' ? '字/分' : 'WPM';
  document.getElementById('championBanner').innerHTML = 
    '<div class="champion-banner">' +
    '<div class="crown">👑</div>' +
    '<div class="champ-text">上周冠军</div>' +
    '<div class="champ-name">' + escapeHtml(champion.first_username) + '</div>' +
    '<div class="champ-text">获得 30🪙</div>' +
    '</div>';
}

async function tryAutoSettle(weekStart) {
  try {
    var { data: existing } = await sb.from('typing_rank_settlements')
      .select('id')
      .eq('week_start', weekStart)
      .eq('lang', rankLang)
      .maybeSingle();
    
    if (existing) return;
    
    var { data: topPlayers } = await sb.from('typing_weekly_rank')
      .select('*')
      .eq('lang', rankLang)
      .eq('week_start', weekStart)
      .order('best_speed', { ascending: false })
      .limit(3);
    
    if (!topPlayers || topPlayers.length === 0) return;
    
    var settlement = {
      week_start: weekStart,
      lang: rankLang,
      first_user_id: topPlayers[0] ? topPlayers[0].user_id : null,
      first_username: topPlayers[0] ? topPlayers[0].username : null,
      first_coins: 30,
      second_user_id: topPlayers[1] ? topPlayers[1].user_id : null,
      second_username: topPlayers[1] ? topPlayers[1].username : null,
      second_coins: 20,
      third_user_id: topPlayers[2] ? topPlayers[2].user_id : null,
      third_username: topPlayers[2] ? topPlayers[2].username : null,
      third_coins: 10
    };
    
    await sb.from('typing_rank_settlements').insert(settlement);
    
    // 发放奖励
    var rewards = [
      { id: topPlayers[0] ? topPlayers[0].user_id : null, coins: 30 },
      { id: topPlayers[1] ? topPlayers[1].user_id : null, coins: 20 },
      { id: topPlayers[2] ? topPlayers[2].user_id : null, coins: 10 }
    ];
    
    for (var i = 0; i < rewards.length; i++) {
      if (rewards[i].id) {
        var { data: p } = await sb.from('profiles').select('coins').eq('id', rewards[i].id).single();
        if (p) {
          await sb.from('profiles').update({ coins: (p.coins || 0) + rewards[i].coins }).eq('id', rewards[i].id);
        }
      }
    }
    
    if (topPlayers[0]) showChampion(settlement);
  } catch(e) {
    console.log('自动结算失败:', e);
  }
}

// ===== 参赛次数 =====
async function loadAttempts() {
  if (!currentUser) return;
  var weekStart = getWeekStart();
  var today = getTodayBJ();
  
  try {
    var { data } = await sb.from('typing_weekly_rank')
      .select('attempts_today, last_attempt_date')
      .eq('user_id', currentUser.id)
      .eq('lang', playLang)
      .eq('week_start', weekStart)
      .maybeSingle();
    
    var attemptsUsed = 0;
    if (data && data.last_attempt_date === today) {
      attemptsUsed = data.attempts_today || 0;
    }
    
    var remaining = 5 - attemptsUsed;
    document.getElementById('attemptsInfo').textContent = '今日剩余次数：' + remaining + '/5';
    
    var btn = document.getElementById('enterBtn');
    if (remaining <= 0) {
      btn.disabled = true;
      btn.textContent = '今日次数已用完，明天再来！';
    } else if ((currentProfile.coins || 0) < 2) {
      btn.disabled = true;
      btn.textContent = '金币不足（需要2🪙）';
    } else {
      btn.disabled = false;
      btn.textContent = '🎯 开始比赛（-2🪙）';
    }
  } catch(e) {
    document.getElementById('attemptsInfo').textContent = '今日剩余次数：5/5';
  }
}

// ===== 历史结算 =====
async function loadHistory() {
  try {
    var { data, error } = await sb.from('typing_rank_settlements')
      .select('*')
      .order('settled_at', { ascending: false })
      .limit(10);
    
    if (error || !data || data.length === 0) {
      document.getElementById('historyList').innerHTML = 
        '<div class="empty-state"><div class="empty-icon">📜</div><div>暂无历史结算记录</div></div>';
      return;
    }
    
    var html = '';
    for (var i = 0; i < data.length; i++) {
      var s = data[i];
      var langLabel = s.lang === 'zh' ? '🇨🇳 中文' : '🇺🇸 英文';
      html += '<div class="rank-item" style="flex-direction:column; align-items:flex-start; margin-bottom:12px;">';
      html += '<div style="font-weight:700; margin-bottom:6px;">' + langLabel + ' | 周起始：' + s.week_start + '</div>';
      if (s.first_username) html += '<div>🥇 ' + escapeHtml(s.first_username) + ' (+' + s.first_coins + '🪙)</div>';
      if (s.second_username) html += '<div>🥈 ' + escapeHtml(s.second_username) + ' (+' + s.second_coins + '🪙)</div>';
      if (s.third_username) html += '<div>🥉 ' + escapeHtml(s.third_username) + ' (+' + s.third_coins + '🪙)</div>';
      html += '</div>';
    }
    document.getElementById('historyList').innerHTML = html;
  } catch(e) {
    console.log('加载历史失败:', e);
  }
}

// ===== 参赛入口 =====
async function enterRank() {
  if (!currentUser) return;
  
  // 检查金币
  if ((currentProfile.coins || 0) < 2) {
    alert('金币不足，需要2金币参赛！');
    return;
  }
  
  // 检查次数
  var weekStart = getWeekStart();
  var today = getTodayBJ();
  var { data } = await sb.from('typing_weekly_rank')
    .select('attempts_today, last_attempt_date')
    .eq('user_id', currentUser.id)
    .eq('lang', playLang)
    .eq('week_start', weekStart)
    .maybeSingle();
  
  var attemptsUsed = 0;
  if (data && data.last_attempt_date === today) {
    attemptsUsed = data.attempts_today || 0;
  }
  if (attemptsUsed >= 5) {
    alert('今日次数已用完，明天再来！');
    return;
  }
  
  // 扣金币
  try {
    var newCoins = (currentProfile.coins || 0) - 2;
    await sb.from('profiles').update({ coins: newCoins }).eq('id', currentUser.id);
    currentProfile.coins = newCoins;
    document.getElementById('coinsDisplay').textContent = '🪙 ' + newCoins;
  } catch(e) {
    alert('扣费失败，请重试');
    return;
  }
  
  startRankGame();
}

// ===== 开始游戏 =====
function startRankGame() {
  // 准备句子队列
  prepareSentenceQueue();
  
  cumulativeCorrect = 0;
  cumulativeWrong = 0;
  currentCorrect = 0;
  currentWrong = 0;
  sentencesCompleted = 0;
  
  // 隐藏主面板，显示倒计时
  document.getElementById('mainPanel').style.display = 'none';
  document.getElementById('resultPanel').style.display = 'none';
  document.getElementById('typingPanel').style.display = 'none';
  var cdPanel = document.getElementById('countdownPanel');
  cdPanel.style.display = 'block';
  
  var count = 3;
  cdPanel.textContent = count;
  var cdTimer = setInterval(function() {
    count--;
    if (count > 0) {
      cdPanel.textContent = count;
    } else {
      clearInterval(cdTimer);
      cdPanel.style.display = 'none';
      beginRankTyping();
    }
  }, 800);
}

function beginRankTyping() {
  document.getElementById('typingPanel').style.display = 'block';
  document.getElementById('statSpeedLabel').textContent = playLang === 'zh' ? '字/分钟' : 'WPM';
  document.getElementById('statCountLabel').textContent = playLang === 'zh' ? '已打字数' : '已打词数';
  
  // 加载第一句
  loadNextSentence();
  
  var input = document.getElementById('typingInput');
  // 移除旧事件
  var newInput = input.cloneNode(true);
  input.parentNode.replaceChild(newInput, input);
  newInput.value = '';
  newInput.focus();
  
  // 设置防作弊
  setupAntiCheat(newInput);
  
  timeLeft = 60;
  startTime = Date.now();
  gameActive = true;
  document.getElementById('statTime').textContent = '60';
  document.getElementById('statSpeed').textContent = '0';
  document.getElementById('statAccuracy').textContent = '100%';
  document.getElementById('statCount').textContent = '0';
  
  gameTimer = setInterval(function() {
    timeLeft--;
    document.getElementById('statTime').textContent = timeLeft;
    updateStats();
    if (timeLeft <= 0) {
      endRankGame();
    }
  }, 1000);
  
  var typingInput = document.getElementById('typingInput');
  if (playLang === 'zh') {
    setupChineseInput(typingInput);
  } else {
    setupEnglishInput(typingInput);
  }
  typingInput.focus();
  
  // 持续保持焦点
  typingInput.addEventListener('blur', function() {
    if (gameActive) {
      setTimeout(function() { typingInput.focus(); }, 100);
    }
  });
}

// ===== 结束游戏 =====
async function endRankGame() {
  gameActive = false;
  clearInterval(gameTimer);
  
  cumulativeCorrect += currentCorrect;
  cumulativeWrong += currentWrong;
  
  var totalCorrectFinal = cumulativeCorrect;
  var totalWrongFinal = cumulativeWrong;
  var totalAll = totalCorrectFinal + totalWrongFinal;
  
  var speed = 0;
  if (playLang === 'zh') {
    speed = totalCorrectFinal;
  } else {
    speed = Math.round(totalCorrectFinal / 5);
  }
  
  var accuracy = totalAll > 0 ? Math.round((totalCorrectFinal / totalAll) * 100) : 0;
  
  // 更新排行榜
  await updateWeeklyRank(speed, accuracy);
  
  // 保存流水记录
  try {
    await sb.from('typing_records').insert({
      user_id: currentUser.id,
      username: currentProfile.username || 'player',
      mode: 'rank',
      lang: playLang,
      level: null,
      speed: speed,
      accuracy: accuracy,
      passed: true,
      coins_earned: -2
    });
  } catch(e) {}
  
  // 显示结果
  showRankResult(speed, accuracy);
}

async function updateWeeklyRank(speed, accuracy) {
  var weekStart = getWeekStart();
  var today = getTodayBJ();
  
  try {
    var { data: existing } = await sb.from('typing_weekly_rank')
      .select('*')
      .eq('user_id', currentUser.id)
      .eq('lang', playLang)
      .eq('week_start', weekStart)
      .maybeSingle();
    
    if (existing) {
      var updateData = {
        updated_at: new Date().toISOString()
      };
      
      if (speed > existing.best_speed) {
        updateData.best_speed = speed;
        updateData.accuracy = accuracy;
      }
      
      if (existing.last_attempt_date === today) {
        updateData.attempts_today = (existing.attempts_today || 0) + 1;
      } else {
        updateData.attempts_today = 1;
        updateData.last_attempt_date = today;
      }
      
      await sb.from('typing_weekly_rank')
        .update(updateData)
        .eq('user_id', currentUser.id)
        .eq('lang', playLang)
        .eq('week_start', weekStart);
    } else {
      await sb.from('typing_weekly_rank').insert({
        user_id: currentUser.id,
        username: currentProfile.username || 'player',
        lang: playLang,
        best_speed: speed,
        accuracy: accuracy,
        week_start: weekStart,
        attempts_today: 1,
        last_attempt_date: today
      });
    }
  } catch(e) {
    console.log('更新排行榜失败:', e);
  }
}

function showRankResult(speed, accuracy) {
  document.getElementById('typingPanel').style.display = 'none';
  var panel = document.getElementById('resultPanel');
  panel.style.display = 'block';
  
  var unit = playLang === 'zh' ? '字/分钟' : 'WPM';
  
  document.getElementById('resultIcon').textContent = '🏅';
  document.getElementById('resultTitle').textContent = '比赛结束！';
  document.getElementById('resultDetail').innerHTML = 
    '本次成绩：<b>' + speed + ' ' + unit + '</b><br>' +
    '准确率：<b>' + accuracy + '%</b><br>' +
    '完成句数：<b>' + sentencesCompleted + ' 句</b>';
  document.getElementById('rankUpdate').textContent = '成绩已记录到本周排行榜！';
}

function backToMain() {
  document.getElementById('resultPanel').style.display = 'none';
  document.getElementById('mainPanel').style.display = 'block';
  switchTab('rank');
}

// ===== 初始化 =====
(async function() {
  var ok = await checkAuth();
  if (ok) {
    document.getElementById('nextSettlement').textContent = getNextSettlement();
    loadRankList();
    loadAttempts();
  }
})();
</script>
