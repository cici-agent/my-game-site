    completed BOOLEAN DEFAULT FALSE,
    completed_at TIMESTAMPTZ DEFAULT NOW(),
    UNIQUE(user_id, level)
  );
  ALTER TABLE grammar_progress ENABLE ROW LEVEL SECURITY;
  CREATE POLICY "Users can read own progress" ON grammar_progress FOR SELECT USING (auth.uid() = user_id);

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;color:#333}
nav{background:linear-gradient(135deg,#ff6b9d 0%,#ff8c5a 100%);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:1000;box-shadow:0 4px 20px rgba(255,107,53,0.35)}
nav a{text-decoration:none}
.nav-brand{display:flex;align-items:center;gap:10px;color:white;font-size:18px;font-weight:900}
.nav-brand img{width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,0.6);object-fit:cover}
.nav-links{display:flex;gap:8px}
.nav-links a{background:rgba(255,255,255,0.2);color:white;padding:8px 16px;border-radius:20px;font-size:14px;font-weight:700;border:2px solid rgba(255,255,255,0.3)}
.container{max-width:600px;margin:0 auto;padding:20px}
.header{text-align:center;color:white;margin-bottom:20px}
.header h1{font-size:28px;margin-bottom:6px;text-shadow:0 2px 8px rgba(0,0,0,0.2)}
.header p{font-size:14px;opacity:0.9}
.coins-display{background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);border-radius:20px;padding:8px 18px;display:inline-flex;align-items:center;gap:6px;color:white;font-weight:700;font-size:16px;cursor:pointer;border:1px solid rgba(255,255,255,0.3);margin-top:8px}
.coins-display:hover{background:rgba(255,255,255,0.25)}

/* Level Select */
.level-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:16px}
.level-card{background:white;border-radius:16px;padding:20px 16px;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,0.1);cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden}
.level-card:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,0.15)}
.level-card.locked{opacity:0.5;cursor:not-allowed;filter:grayscale(0.5)}
.level-card.completed{border:3px solid #4CAF50}
.level-card .level-num{font-size:32px;font-weight:900;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.level-card .level-label{font-size:13px;color:#666;margin-top:4px}
.level-card .level-reward{font-size:12px;color:#ff9800;font-weight:600;margin-top:6px}
.level-card .check-mark{position:absolute;top:8px;right:8px;font-size:20px}

/* Quiz Screen */
.quiz-screen{display:none}
.quiz-header{background:rgba(255,255,255,0.12);backdrop-filter:blur(10px);border-radius:16px;padding:16px;margin-bottom:16px;color:white;display:flex;justify-content:space-between;align-items:center}
.quiz-progress{font-size:14px;font-weight:600}
.quiz-score{font-size:14px;font-weight:600}
.question-card{background:white;border-radius:20px;padding:24px 20px;box-shadow:0 8px 30px rgba(0,0,0,0.12);margin-bottom:16px;animation:fadeIn 0.4s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.question-type{font-size:12px;color:#764ba2;font-weight:700;text-transform:uppercase;margin-bottom:8px;letter-spacing:1px}
.question-text{font-size:18px;font-weight:600;line-height:1.6;margin-bottom:20px;color:#222}
.options{display:flex;flex-direction:column;gap:12px}
.option-btn{width:100%;padding:16px 20px;border:2px solid #e0e0e0;border-radius:14px;background:white;font-size:16px;font-weight:500;text-align:left;cursor:pointer;transition:all 0.2s;color:#333;line-height:1.4}
.option-btn:hover{border-color:#764ba2;background:#f8f4ff}
.option-btn:active{transform:scale(0.98)}
.option-btn.correct{border-color:#4CAF50;background:#e8f5e9;color:#2e7d32;animation:pulse-green 0.5s}
.option-btn.wrong{border-color:#f44336;background:#ffebee;color:#c62828;animation:shake 0.4s}
@keyframes pulse-green{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.explanation{margin-top:16px;padding:14px;background:#f3e5f5;border-radius:12px;font-size:14px;line-height:1.5;color:#4a148c;display:none}
.explanation.show{display:block;animation:fadeIn 0.3s}

/* Result Screen */
.result-screen{display:none;text-align:center;color:white}
.result-card{background:rgba(255,255,255,0.95);border-radius:24px;padding:32px 24px;color:#333;box-shadow:0 10px 40px rgba(0,0,0,0.15)}
.result-emoji{font-size:64px;margin-bottom:12px}
.result-title{font-size:24px;font-weight:800;margin-bottom:8px}
.result-stats{font-size:16px;color:#666;margin-bottom:20px;line-height:1.8}
.result-coins{font-size:20px;color:#ff9800;font-weight:700;margin-bottom:20px}
.btn{padding:14px 32px;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn:active{transform:scale(0.96)}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:white;box-shadow:0 4px 15px rgba(102,126,234,0.4)}
.btn-secondary{background:#f5f5f5;color:#333;margin-left:10px}
.next-btn{display:none;margin-top:16px;width:100%;padding:16px;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#667eea,#764ba2);color:white;box-shadow:0 4px 15px rgba(102,126,234,0.3)}

/* Login prompt */
.login-prompt{background:rgba(255,255,255,0.95);border-radius:20px;padding:30px;text-align:center;margin-top:30px;box-shadow:0 8px 30px rgba(0,0,0,0.12)}
.login-prompt h3{margin-bottom:12px;color:#333}
.login-prompt p{color:#666;margin-bottom:20px;font-size:14px}
.login-btn{display:inline-block;padding:12px 32px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border-radius:12px;font-weight:700;text-decoration:none;font-size:16px}

@media(max-width:480px){
  .container{padding:12px}
  .header h1{font-size:22px}
  .level-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .level-card{padding:16px 12px}
  .level-card .level-num{font-size:26px}
  .question-text{font-size:16px}
  .option-btn{padding:14px 16px;font-size:15px}
  .nav-links a{padding:6px 10px;font-size:12px}
}
</style>

{q:"English ___ spoken in many countries.",opts:["is","are","was","were"],ans:0,type:"语法",exp:"English 单数，一般现在时被动用 is spoken。"},
{q:"In 'She tried to console her crying friend,' 'console' means ___.",opts:["scold","comfort","ignore","surprise"],ans:1,type:"词汇",exp:"console 意为安慰。"},
{q:"They have ___ in this city since 2020.",opts:["live","lived","living","lives"],ans:1,type:"语法",exp:"have lived 现在完成时，since 2020 表示持续。"},
{q:"In 'The company will launch a new product,' 'launch' means ___.",opts:["throw","introduce","cancel","hide"],ans:1,type:"词汇",exp:"launch 此处意为推出，发布。"}
],
// Level 8: 上下文词义 + 完成时/被动语态进阶
[
{q:"The letter ___ been sent before I arrived.",opts:["has","had","have","is"],ans:1,type:"语法",exp:"before I arrived 过去之前完成，用过去完成时 had been sent。"},
{q:"In 'The teacher's approach was very effective,' 'approach' means ___.",opts:["arrival","method","distance","speed"],ans:1,type:"词汇",exp:"approach 此处意为方法，方式。"},
{q:"By next month, she ___ completed the course.",opts:["will have","will has","would","has"],ans:0,type:"语法",exp:"By next month 将来完成时，用 will have completed。"},
{q:"In 'He managed to overcome many obstacles,' 'obstacles' means ___.",opts:["helpers","difficulties","friends","tools"],ans:1,type:"词汇",exp:"obstacles 意为障碍，困难。"},
{q:"The windows ___ cleaned every week.",opts:["is","are","was","has"],ans:1,type:"语法",exp:"The windows 复数，一般现在时被动用 are cleaned。"},
{q:"In 'The evidence was compelling,' 'compelling' means ___.",opts:["weak","convincing","confusing","boring"],ans:1,type:"词汇",exp:"compelling 意为令人信服的。"},
{q:"She had never ___ such a beautiful sunset before.",opts:["see","saw","seen","seeing"],ans:2,type:"语法",exp:"had never seen 过去完成时，see 的过去分词是 seen。"},
{q:"In 'They need to collaborate on this project,' 'collaborate' means ___.",opts:["compete","work together","argue","separate"],ans:1,type:"词汇",exp:"collaborate 意为合作。"},
{q:"The new bridge ___ being built right now.",opts:["is","are","was","were"],ans:0,type:"语法",exp:"The new bridge 单数，现在进行时被动用 is being built。"},
{q:"In 'The deadline is approaching rapidly,' 'approaching' means ___.",opts:["leaving","getting closer","stopping","slowing"],ans:1,type:"词汇",exp:"approaching 意为接近，靠近。"}
],
// Level 9: 小托福Step2 从句/虚拟语气/高级词汇
[
{q:"If I ___ you, I would apologize immediately.",opts:["am","was","were","be"],ans:2,type:"语法",exp:"虚拟语气 If I were you 表示与现在事实相反的假设。"},
{q:"'Meticulous' most nearly means ___.",opts:["careless","very careful","quick","lazy"],ans:1,type:"词汇",exp:"meticulous 意为一丝不苟的，非常仔细的。"},
{q:"The book ___ she recommended was excellent.",opts:["who","which","what","where"],ans:1,type:"语法",exp:"先行词 The book 是物，用 which 引导定语从句（that 也可）。"},
{q:"'Reluctant' most nearly means ___.",opts:["eager","unwilling","happy","excited"],ans:1,type:"词汇",exp:"reluctant 意为不情愿的。"},
{q:"I wish I ___ more time to finish the test.",opts:["have","has","had","having"],ans:2,type:"语法",exp:"I wish + 过去时表示对现在的虚拟，用 had。"},
{q:"'Abundant' most nearly means ___.",opts:["scarce","plentiful","empty","limited"],ans:1,type:"词汇",exp:"abundant 意为丰富的，大量的。"},
{q:"The reason ___ he was late is unclear.",opts:["which","what","why","where"],ans:2,type:"语法",exp:"The reason why... 原因状语从句。"},
{q:"'Inevitable' most nearly means ___.",opts:["avoidable","certain to happen","unlikely","optional"],ans:1,type:"词汇",exp:"inevitable 意为不可避免的。"},
{q:"Had she studied harder, she ___ passed the exam.",opts:["will have","would have","has","had"],ans:1,type:"语法",exp:"Had she studied... 虚拟语气过去完成，主句用 would have + 过去分词。"},
{q:"'Ambiguous' most nearly means ___.",opts:["clear","unclear","simple","obvious"],ans:1,type:"词汇",exp:"ambiguous 意为模棱两可的，不明确的。"}
],
// Level 10: 小托福Step2 高级语法+高级词汇
[
{q:"Not only ___ she smart, but she is also hardworking.",opts:["is","was","does","did"],ans:0,type:"语法",exp:"Not only 开头倒装，主语 she 现在时用 is。"},
{q:"'Pragmatic' most nearly means ___.",opts:["idealistic","practical","emotional","theoretical"],ans:1,type:"词汇",exp:"pragmatic 意为务实的，注重实际的。"},
{q:"It is essential that he ___ on time.",opts:["arrives","arrive","arrived","arriving"],ans:1,type:"语法",exp:"It is essential that + 主语 + 动词原形（虚拟语气）。"},
{q:"'Ephemeral' most nearly means ___.",opts:["eternal","short-lived","important","heavy"],ans:1,type:"词汇",exp:"ephemeral 意为短暂的，转瞬即逝的。"},
{q:"The project, ___ was started last year, is now complete.",opts:["that","which","who","whom"],ans:1,type:"语法",exp:"非限制性定语从句用 which（有逗号隔开）。"},
{q:"'Benevolent' most nearly means ___.",opts:["cruel","kind and generous","strict","indifferent"],ans:1,type:"词汇",exp:"benevolent 意为仁慈的，善良的。"},
{q:"Hardly had he arrived ___ it started to rain.",opts:["than","when","then","before"],ans:1,type:"语法",exp:"Hardly had... when... 固定搭配，表示一...就...。"},
{q:"'Ubiquitous' most nearly means ___.",opts:["rare","found everywhere","invisible","unique"],ans:1,type:"词汇",exp:"ubiquitous 意为无处不在的。"},
{q:"Were it not for your help, I ___ have succeeded.",opts:["would","would not","will","will not"],ans:1,type:"语法",exp:"Were it not for... 虚拟语气，没有你的帮助我不会成功，用 would not。"},
{q:"'Resilient' most nearly means ___.",opts:["fragile","able to recover quickly","slow","rigid"],ans:1,type:"词汇",exp:"resilient 意为有韧性的，能快速恢复的。"}
]
];

// ===== State =====
let currentLevel=0;
let currentQ=0;
let correctCount=0;
let wrongCount=0;
let answered=false;
let shuffledQuestions=[];

// ===== Init =====
async function init(){
  const token=localStorage.getItem('supabase_token');
  if(token){
    try{
      const res=await fetch(SUPABASE_URL+'/auth/v1/user',{headers:{'Authorization':'Bearer '+token,'apikey':SUPABASE_KEY}});
      if(res.ok){currentUser=await res.json();await loadProgress();}
    }catch(e){}
  }
  renderLevels();
  updateCoins();
}

async function loadProgress(){
  if(!currentUser)return;
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/grammar_progress?user_id=eq.'+currentUser.id+'&select=level,completed',{headers:{'Authorization':'Bearer '+localStorage.getItem('supabase_token'),'apikey':SUPABASE_KEY}});
    if(res.ok)userProgress=await res.json();
  }catch(e){}
}

function renderLevels(){
  const grid=document.getElementById('levelGrid');
  grid.innerHTML='';
  const labels=['基础词汇 I','基础词汇 II','常用词组 I','常用词组 II','同义反义 I','同义反义 II','上下文 I','上下文 II','高级语法 I','高级语法 II'];
  for(let i=0;i<10;i++){
    const completed=userProgress.find(p=>p.level===i+1&&p.completed);
    const unlocked=i===0||userProgress.find(p=>p.level===i&&p.completed);
    const card=document.createElement('div');
    card.className='level-card'+(completed?' completed':'')+((!unlocked&&!completed)?' locked':'');
    card.innerHTML=`
      ${completed?'<div class="check-mark">✅</div>':''}
      <div class="level-num">${i+1}</div>
      <div class="level-label">${labels[i]}</div>
      <div class="level-reward">🪙 +${REWARDS[i]}</div>
    `;
    if(unlocked||completed)card.onclick=()=>startLevel(i);
    grid.appendChild(card);
  }
}

function startLevel(level){
  currentLevel=level;
  currentQ=0;correctCount=0;wrongCount=0;answered=false;
  shuffledQuestions=shuffleArray([...QUESTIONS[level]]);
  document.getElementById('levelSelect').style.display='none';
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('quizScreen').style.display='block';
  showQuestion();
}

function showQuestion(){
  answered=false;
  const q=shuffledQuestions[currentQ];
  document.getElementById('qNum').textContent=currentQ+1;
  document.getElementById('qCorrect').textContent=correctCount;
  document.getElementById('qWrong').textContent=wrongCount;
  document.getElementById('qType').textContent=q.type==='语法'?'📝 语法题':'📚 词汇题';
  document.getElementById('qText').textContent=q.q;
  document.getElementById('explanation').className='explanation';
  document.getElementById('explanation').textContent='';
  document.getElementById('nextBtn').style.display='none';
  const optDiv=document.getElementById('optionsDiv');
  optDiv.innerHTML='';
  q.opts.forEach((opt,idx)=>{
    const btn=document.createElement('button');
    btn.className='option-btn';
    btn.textContent=String.fromCharCode(65+idx)+'. '+opt;
    btn.onclick=()=>selectAnswer(idx);
    optDiv.appendChild(btn);
  });
  document.getElementById('questionCard').style.animation='none';
  setTimeout(()=>document.getElementById('questionCard').style.animation='fadeIn 0.4s',10);
}

function selectAnswer(idx){
  if(answered)return;
  answered=true;
  const q=shuffledQuestions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  btns[q.ans].classList.add('correct');
  if(idx===q.ans){
    correctCount++;
  }else{
    wrongCount++;
    btns[idx].classList.add('wrong');
  }
  document.getElementById('qCorrect').textContent=correctCount;
  document.getElementById('qWrong').textContent=wrongCount;
  document.getElementById('explanation').textContent='💡 '+q.exp;
  document.getElementById('explanation').className='explanation show';
  document.getElementById('nextBtn').style.display='block';
  document.getElementById('nextBtn').textContent=currentQ<9?'下一题 →':'查看结果';
}

function nextQuestion(){
  currentQ++;
  if(currentQ>=10){showResult();return;}
  showQuestion();
}

async function showResult(){
  document.getElementById('quizScreen').style.display='none';
  document.getElementById('resultScreen').style.display='block';
  const passed=correctCount>=PASS_THRESHOLD;
  document.getElementById('resultEmoji').textContent=passed?'🎉':'😅';
  document.getElementById('resultTitle').textContent=passed?'恭喜通关！':'继续加油！';
  document.getElementById('resultStats').innerHTML=`正确：${correctCount}/10<br>需要 ${PASS_THRESHOLD} 题通过`;
  if(passed){
    const reward=REWARDS[currentLevel];
    document.getElementById('resultCoins').textContent='🪙 +'+reward+' 金币';
    if(currentUser)await saveProgress(reward);
  }else{
    document.getElementById('resultCoins').textContent='未通关，再试一次吧！';
  }
}

async function saveProgress(reward){
  const token=localStorage.getItem('supabase_token');
  if(!token||!currentUser)return;
  const headers={'Authorization':'Bearer '+token,'apikey':SUPABASE_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'};
  // Save progress
  try{
    await fetch(SUPABASE_URL+'/rest/v1/grammar_progress',{method:'POST',headers,body:JSON.stringify({user_id:currentUser.id,level:currentLevel+1,completed:true})});
  }catch(e){}
  // Add coins
  try{
    await fetch(SUPABASE_URL+'/rest/v1/rpc/add_coins',{method:'POST',headers:{'Authorization':'Bearer '+token,'apikey':SUPABASE_KEY,'Content-Type':'application/json'},body:JSON.stringify({uid:currentUser.id,amount:reward})});
  }catch(e){}
  // Record transaction
  try{
    await fetch(SUPABASE_URL+'/rest/v1/coin_transactions',{method:'POST',headers:{'Authorization':'Bearer '+token,'apikey':SUPABASE_KEY,'Content-Type':'application/json'},body:JSON.stringify({user_id:currentUser.id,amount:reward,type:'grammar_reward',description:'语法词汇挑战 第'+( currentLevel+1)+'关 通关奖励'})});
  }catch(e){}
  await loadProgress();
  renderLevels();
  updateCoins();
}

function backToLevels(){
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('quizScreen').style.display='none';
  document.getElementById('levelSelect').style.display='block';
}

function retryLevel(){
  startLevel(currentLevel);
}

async function updateCoins(){
  if(!currentUser)return;
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/profiles?id=eq.'+currentUser.id+'&select=coins',{headers:{'Authorization':'Bearer '+localStorage.getItem('supabase_token'),'apikey':SUPABASE_KEY}});
    if(res.ok){const d=await res.json();if(d[0])document.getElementById('coinCount').textContent=d[0].coins||0;}
  }catch(e){}
}

function showCoinHistory(){
  if(typeof window.showCoinHistoryModal==='function')window.showCoinHistoryModal();
  else window.location.href='/profile.html';
}

function shuffleArray(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

init();
</script>
