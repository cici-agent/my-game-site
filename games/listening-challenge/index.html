[
{text:"Hello, everyone. My name is Mr. Chen, and I will be your new science teacher this year. I know some of you might think science is difficult, but I promise to make it fun. We will do lots of experiments and even grow our own plants. I hope you will enjoy my class.", question:"What can we infer about Mr. Chen?", opts:["He is strict","He wants to make science enjoyable","He doesn't like experiments","He teaches math"], ans:1, tip:"他说 make it fun 和 lots of experiments"},
{text:"Last weekend, I went camping with my family for the first time. At first, I was scared because it was very dark and quiet at night. But then my dad showed me the stars, and I heard an owl. By morning, I did not want to leave. I cannot wait to go again!", question:"How did the speaker feel about camping in the end?", opts:["Still scared","Bored","Loved it and wants to go again","Angry"], ans:2, tip:"关键词: cannot wait to go again"},
{text:"Today I want to tell you about dolphins. Dolphins are very smart animals. They live in groups called pods. They talk to each other using clicks and whistles. Some scientists believe dolphins can even recognize themselves in a mirror, which shows they are self-aware.", question:"How do dolphins communicate?", opts:["By changing color","Using clicks and whistles","By waving fins","Through smell"], ans:1, tip:"关键词: clicks and whistles"},
{text:"Attention, shoppers! For the next thirty minutes, all fruits and vegetables are twenty percent off. This special offer is only available in the fresh food section on the first floor. Don't miss this chance to save money on healthy food!", question:"Where is the special offer?", opts:["Second floor","Online only","First floor fresh food section","At the checkout"], ans:2, tip:"关键词: first floor fresh food section"},
{text:"I have been collecting stamps since I was seven years old. Now I have over five hundred stamps from thirty different countries. My favorite one is from Japan. It has a picture of Mount Fuji with cherry blossoms. My grandma gave it to me for my birthday.", question:"How many countries are the stamps from?", opts:["Seven","Twenty","Thirty","Five hundred"], ans:2, tip:"关键词: thirty different countries"},
{text:"The school basketball team won the championship last night! The final score was fifty-two to forty-eight. It was a very close game. In the last ten seconds, our captain made an amazing three-point shot to win. The whole school is celebrating today.", question:"What happened in the last ten seconds?", opts:["The other team scored","The captain made a three-point shot","The game was paused","A player got injured"], ans:1, tip:"关键词: captain made an amazing three-point shot"},
{text:"Good morning, students. I have an important announcement. The school sports day has been moved from next Friday to next Monday because of the weather forecast. It will rain on Friday, but Monday should be sunny. Please tell your parents about the change.", question:"Why was sports day moved?", opts:["Teacher is sick","Not enough students","Rain expected on Friday","The field is broken"], ans:2, tip:"关键词: It will rain on Friday"},
{text:"My older sister just started university. She studies in another city, so she lives in a dormitory. She calls us every Sunday. She says the food in the cafeteria is not as good as Mom's cooking, but she has made many new friends and really enjoys her classes.", question:"What does the sister NOT like about university?", opts:["Her classes","Her friends","The cafeteria food","Her dormitory"], ans:2, tip:"关键词: food is not as good as Mom's cooking"},
{text:"If you want to make a paper airplane, first fold the paper in half lengthwise. Then fold the top corners down to the center line. Next, fold the wings down. Finally, throw it gently and watch it fly! The key is to make your folds very straight and even.", question:"What is the key to a good paper airplane?", opts:["Using thick paper","Throwing it hard","Making straight and even folds","Adding tape"], ans:2, tip:"关键词: folds very straight and even"},
{text:"The Amazon rainforest is called the lungs of the Earth because it produces about twenty percent of the world's oxygen. It is home to millions of species of plants and animals. However, every year, large areas of the forest are cut down. This is a serious problem for our planet.", question:"Why is the Amazon called the lungs of the Earth?", opts:["It is very large","It has many animals","It produces much of the world's oxygen","It rains a lot there"], ans:2, tip:"关键词: produces about twenty percent of the world's oxygen"}

{text:"The ancient Egyptians built the pyramids over four thousand years ago. The largest one, the Great Pyramid of Giza, took about twenty years to build. Scientists believe that thousands of workers moved huge stone blocks using ramps and rollers. Even today, people are amazed by how they did it without modern machines.", question:"How long did it take to build the Great Pyramid?", opts:["Ten years","Twenty years","Forty years","One hundred years"], ans:1, tip:"关键词: about twenty years"},
{text:"Welcome to the City Library reading program! This summer, children who read at least ten books can earn a free pizza coupon. To join, pick up a reading log at the front desk. Write down each book you finish. Bring your completed log back before August thirty-first.", question:"What do children get for reading ten books?", opts:["A new book","A free pizza coupon","A library card","A trophy"], ans:1, tip:"关键词: free pizza coupon"},
{text:"My family has a special tradition. Every Chinese New Year, we make dumplings together. Grandma teaches us how to fold them perfectly. Sometimes she hides a coin inside one dumpling. Whoever finds it is supposed to have good luck for the whole year. Last year, my little brother found it!", question:"What does finding the coin mean?", opts:["You win a prize","You cook next year","You have good luck","You get extra dumplings"], ans:2, tip:"关键词: good luck for the whole year"},
{text:"Scientists have discovered that plants can communicate with each other. When a plant is attacked by insects, it releases chemicals into the air. Nearby plants detect these chemicals and start producing their own defenses. It is like the first plant is warning its neighbors about danger.", question:"What happens when nearby plants detect the chemicals?", opts:["They die","They grow faster","They produce defenses","They attract more insects"], ans:2, tip:"关键词: start producing their own defenses"},
{text:"I used to think I was bad at math. Every test made me nervous, and I often made careless mistakes. Then my teacher suggested I try solving problems step by step and checking my work at the end. I followed her advice, and my scores improved a lot. Now math is actually one of my best subjects.", question:"What helped the speaker improve in math?", opts:["A new textbook","Solving problems step by step","Extra classes","A calculator"], ans:1, tip:"关键词: solving problems step by step"},
{text:"The school is planning to build a new garden behind the library. Students can help by donating seeds or volunteering to plant on weekends. The garden will grow vegetables and flowers. The vegetables will be used in the school cafeteria, and the flowers will make the school more beautiful.", question:"What will happen to the vegetables from the garden?", opts:["Sold at a market","Given to students","Used in the school cafeteria","Sent to a farm"], ans:2, tip:"关键词: used in the school cafeteria"},
{text:"Have you ever wondered why the sky is blue? Sunlight is made up of many colors. When sunlight enters the atmosphere, blue light is scattered more than other colors because it travels in shorter waves. That is why we see blue when we look up. At sunset, the sky turns red because the light travels through more atmosphere.", question:"Why does the sky look blue?", opts:["The ocean reflects up","Blue light scatters more","Clouds are blue","The sun is blue"], ans:1, tip:"关键词: blue light is scattered more"},
{text:"Our class pet is a hamster named Snowball. We take turns feeding him and cleaning his cage. Snowball loves running on his wheel at night. He sleeps during the day, which means he is nocturnal. Everyone in our class loves him, especially when he stuffs food in his cheeks!", question:"When is Snowball most active?", opts:["Morning","Afternoon","Night","All day"], ans:2, tip:"关键词: running on his wheel at night, nocturnal"},

{text:"Maria moved to a new school last month. At first, she felt lonely because she did not know anyone. She was too shy to talk to other students. Then one day, a girl named Sophie invited her to eat lunch together. They discovered they both loved reading fantasy books. Now they are best friends and have started a book club.", question:"What can we infer about Maria?", opts:["She is still lonely","She found a friend through a shared interest","She doesn't like her new school","She is very outgoing"], ans:1, tip:"通过共同爱好交到了朋友"},

{text:"Yesterday, our class visited a recycling center. We learned that paper, plastic, glass, and metal can all be recycled into new products. The guide told us that recycling one aluminum can saves enough energy to run a TV for three hours. I was amazed! Now I always make sure to put my trash in the right bin.", question:"How much energy does recycling one can save?", opts:["Enough to run a TV for one hour","Enough to run a TV for three hours","Enough to charge a phone","Enough to light a room for a day"], ans:1, tip:"关键词: run a TV for three hours"}

{text:"Imagine you are an astronaut floating in space. You look down and see Earth — a beautiful blue and green ball surrounded by thin white clouds. From up there, you cannot see any borders between countries. Many astronauts say that seeing Earth from space changed how they think. They realized how small and precious our planet is, and how important it is for everyone to take care of it together.", question:"What do many astronauts realize when they see Earth from space?", opts:["Earth is very large","Countries should have more borders","Earth is small and precious and needs protection","Space is boring"], ans:2, tip:"关键词: small and precious, take care of it together"},

// Auth
function getAuth() {
  try {
    const raw = localStorage.getItem('sb-aqxbpuetdypcbmqdncpl-auth-token');
    if (raw) {
      const d = JSON.parse(raw);
      userId = d.user?.id;
      token = d.access_token;
    }
  } catch(e){}
}

async function sbFetch(path, method='GET', body=null) {
  const headers = { 'apikey': SUPABASE_KEY, 'Content-Type':'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  return fetch(SUPABASE_URL + '/rest/v1/' + path, opts);
}

async function loadProgress() {
  if (!userId) return;
  try {
    const r = await sbFetch('listening_progress?user_id=eq.' + userId + '&completed=eq.true&select=level');
    if (r.ok) {
      const data = await r.json();
      data.forEach(d => completedLevels.add(d.level));
    }
  } catch(e){}
}

async function loadCoins() {
  if (!userId) { document.getElementById('coinCount').textContent = '未登录'; return; }
  try {
    const r = await sbFetch('profiles?id=eq.' + userId + '&select=coins');
    if (r.ok) {
      const data = await r.json();
      if (data[0]) { userCoins = data[0].coins || 0; }
    }
  } catch(e){}
  document.getElementById('coinCount').textContent = userCoins;
}

async function addCoins(amount) {
  if (!userId) return;
  userCoins += amount;
  document.getElementById('coinCount').textContent = userCoins;
  try {
    await sbFetch('rpc/add_coins', 'POST', { p_user_id: userId, p_amount: amount });
    // Also log transaction
    await sbFetch('coin_transactions', 'POST', {
      user_id: userId, amount: amount, type: 'listening_reward',
      description: '英语听力挑战 第' + (currentLevel+1) + '级通关奖励'
    });
  } catch(e){}
}

async function saveProgress(level) {
  if (!userId) return;
  try {
    await sbFetch('listening_progress', 'POST', {
      user_id: userId, level: level, completed: true
    });
  } catch(e){}
}

function renderLevels() {
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const btn = document.createElement('button');
    btn.className = 'level-btn';
    const isCompleted = completedLevels.has(i+1);
    const isUnlocked = i === 0 || completedLevels.has(i);
    if (isCompleted) btn.classList.add('completed');
    else if (isUnlocked) btn.classList.add('unlocked');
    else btn.classList.add('locked');
    btn.innerHTML = `${i+1}<span class="reward">+${REWARDS[i]}🪙</span>`;
    if (isUnlocked || isCompleted) {
      btn.onclick = () => startLevel(i);
    }
    grid.appendChild(btn);
  }
}

function startLevel(idx) {
  currentLevel = idx;
  currentQ = 0;
  score = 0;
  answered = false;
  document.getElementById('levelSelect').style.display = 'none';
  document.getElementById('gameArea').style.display = 'block';
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('levelLabel').textContent = '第 ' + (idx+1) + ' 级';
  showQuestion();
}

function showQuestion() {
  const q = LEVELS[currentLevel][currentQ];
  answered = false;
  document.getElementById('qNum').textContent = `第 ${currentQ+1}/10 题`;
  document.getElementById('progressFill').style.width = ((currentQ)/10*100) + '%';
  document.getElementById('textContent').textContent = q.text;
  document.getElementById('textContent').classList.remove('show');
  document.getElementById('toggleTextBtn').textContent = '👁️ 显示文字';
  document.getElementById('questionText').textContent = q.question;
  document.getElementById('tipBox').classList.remove('show');
  document.getElementById('tipBox').textContent = '';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('playHint').textContent = '点击播放听力';
  document.getElementById('playBtn').classList.remove('playing');

  const optDiv = document.getElementById('optionsDiv');
  optDiv.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = String.fromCharCode(65+i) + '. ' + opt;
    btn.onclick = () => selectAnswer(i, btn);
    optDiv.appendChild(btn);
  });
}

function playAudio() {
  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    document.getElementById('playBtn').classList.remove('playing');
    return;
  }
  const q = LEVELS[currentLevel][currentQ];
  const utter = new SpeechSynthesisUtterance(q.text);
  utter.lang = 'en-US';
  utter.rate = 0.85;
  utter.onstart = () => document.getElementById('playBtn').classList.add('playing');
  utter.onend = () => {
    document.getElementById('playBtn').classList.remove('playing');
    document.getElementById('playHint').textContent = '再听一遍';
  };
  utter.onerror = () => document.getElementById('playBtn').classList.remove('playing');
  window.speechSynthesis.speak(utter);
}

function toggleText() {
  const el = document.getElementById('textContent');
  const btn = document.getElementById('toggleTextBtn');
  if (el.classList.contains('show')) {
    el.classList.remove('show');
    btn.textContent = '👁️ 显示文字';
  } else {
    el.classList.add('show');
    btn.textContent = '🙈 隐藏文字';
  }
}

function selectAnswer(idx, btn) {
  if (answered) return;
  answered = true;
  const q = LEVELS[currentLevel][currentQ];
  const allBtns = document.querySelectorAll('.opt-btn');
  
  if (idx === q.ans) {
    btn.classList.add('correct');
    score++;
  } else {
    btn.classList.add('wrong');
    allBtns[q.ans].classList.add('correct');
    document.getElementById('tipBox').textContent = '💡 提示：' + q.tip;
    document.getElementById('tipBox').classList.add('show');
  }
  
  document.getElementById('nextBtn').style.display = 'block';
  document.getElementById('progressFill').style.width = ((currentQ+1)/10*100) + '%';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= 10) {
    showResult();
  } else {
    showQuestion();
  }
}

async function showResult() {
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('resultArea').style.display = 'block';
  const passed = score >= PASS_SCORE;
  document.getElementById('resultIcon').textContent = passed ? '🎉' : '😅';
  document.getElementById('resultTitle').textContent = passed ? '恭喜通关！' : '继续加油！';
  let detail = `答对 ${score}/10 题`;
  if (passed) {
    const reward = REWARDS[currentLevel];
    detail += `\n🪙 获得 ${reward} 金币奖励！`;
    if (!completedLevels.has(currentLevel+1)) {
      completedLevels.add(currentLevel+1);
      await saveProgress(currentLevel+1);
      await addCoins(reward);
    }
  } else {
    detail += `\n需要答对 ${PASS_SCORE} 题才能通关哦`;
  }
  document.getElementById('resultDetail').textContent = detail;
  renderLevels();
}

function retryLevel() {
  document.getElementById('resultArea').style.display = 'none';
  startLevel(currentLevel);
}

function backToLevels() {
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('levelSelect').style.display = 'block';
}

// Init
async function init() {
  getAuth();
  await loadCoins();
  await loadProgress();
  renderLevels();
}
init();
</script>
</body>
</html>
