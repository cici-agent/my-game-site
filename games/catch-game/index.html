<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Comic Sans MS', 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #FFE066 0%, #FF6B6B 50%, #4ECDC4 100%);
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  overflow: hidden; touch-action: none;
}
.screen { display:none; flex-direction:column; align-items:center; justify-content:center; width:100%; height:100vh; position:absolute; top:0; left:0; }
.screen.active { display:flex; }
.title { font-size:2.6em; color:#fff; text-shadow:3px 3px 0 #FF6B6B,6px 6px 0 rgba(0,0,0,0.1); margin-bottom:12px; animation:bounce 1s ease infinite alternate; }
@keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-8px)} }
.subtitle { font-size:1.1em; color:#fff; margin-bottom:20px; opacity:0.9; }
.btn { padding:12px 32px; font-size:1.15em; border:none; border-radius:50px; cursor:pointer; margin:5px; font-weight:bold; transition:transform 0.2s,box-shadow 0.2s; box-shadow:0 4px 15px rgba(0,0,0,0.2); }
.btn:hover { transform:scale(1.05); }
.btn:active { transform:scale(0.95); }
.btn-primary { background:#FF6B6B; color:#fff; }
.btn-secondary { background:#4ECDC4; color:#fff; }
.btn-start { background:#FFE066; color:#333; }
.btn-small { padding:8px 18px; font-size:0.95em; }
.btn-danger { background:#e74c3c; color:#fff; }
.btn-gray { background:#bbb; color:#fff; }
.input-field { padding:12px 18px; font-size:1.15em; border:3px solid #fff; border-radius:50px; background:rgba(255,255,255,0.9); text-align:center; width:200px; margin:8px; outline:none; }
.input-field:focus { border-color:#FF6B6B; }
.panel { background:rgba(255,255,255,0.97); border-radius:20px; padding:22px; min-width:320px; max-width:92vw; max-height:85vh; overflow-y:auto; box-shadow:0 10px 40px rgba(0,0,0,0.2); }
.panel-title { font-size:1.5em; color:#333; margin-bottom:8px; text-align:center; }
.room-code-display { font-size:2.2em; color:#FF6B6B; font-weight:bold; letter-spacing:6px; text-align:center; margin:6px 0; }
.player-list { list-style:none; margin:8px 0; max-height:170px; overflow-y:auto; }
.player-list li { padding:7px 12px; margin:3px 0; background:#f0f0f0; border-radius:10px; display:flex; align-items:center; gap:8px; font-size:0.95em; }
.player-list li .dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; }
.player-count { color:#666; font-size:0.85em; margin-bottom:6px; text-align:center; }
.char-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:7px; margin:8px auto; max-width:280px; }
.char-option { width:42px; height:42px; border-radius:50%; border:3px solid transparent; cursor:pointer; transition:transform 0.2s; display:flex; align-items:center; justify-content:center; }
.char-option:hover { transform:scale(1.1); }
.char-option.selected { border-color:#FF6B6B; transform:scale(1.15); }
.room-list { list-style:none; margin:8px 0; max-height:240px; overflow-y:auto; }
.room-card { padding:12px 14px; margin:6px 0; background:#f8f8f8; border-radius:12px; display:flex; align-items:center; justify-content:space-between; border:2px solid #eee; transition:border-color 0.2s; }
.room-card:hover { border-color:#4ECDC4; }
.room-info { display:flex; flex-direction:column; gap:2px; }
.room-name-text { font-weight:bold; color:#333; font-size:1em; }
.room-meta { font-size:0.78em; color:#888; }
.form-row { display:flex; align-items:center; gap:10px; margin:8px 0; flex-wrap:wrap; justify-content:center; }
.form-label { font-size:0.88em; color:#555; min-width:55px; }
.toggle-group { display:flex; gap:5px; }
.toggle-btn { padding:7px 14px; border-radius:18px; border:2px solid #ddd; background:#fff; cursor:pointer; font-size:0.88em; transition:all 0.2s; }
.toggle-btn.active { background:#4ECDC4; color:#fff; border-color:#4ECDC4; }
#game-hud { position:fixed; top:8px; left:8px; right:8px; display:flex; justify-content:space-between; align-items:center; z-index:100; pointer-events:none; }
.hud-item { background:rgba(255,255,255,0.9); padding:5px 11px; border-radius:18px; font-size:0.9em; font-weight:bold; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
.hud-timer { color:#FF6B6B; font-size:1.15em; }
.hud-role { color:#4ECDC4; }
.hud-stamina { color:#FFB347; }
#game-canvas { display:block; background:#8BC34A; touch-action:none; }
#joystick-area { position:fixed; bottom:25px; left:25px; width:125px; height:125px; z-index:200; display:none; }
#joystick-base { width:125px; height:125px; border-radius:50%; background:rgba(255,255,255,0.3); border:3px solid rgba(255,255,255,0.5); position:relative; }
#joystick-knob { width:52px; height:52px; border-radius:50%; background:rgba(255,255,255,0.7); position:absolute; top:36px; left:36px; }
.result-box { background:rgba(255,255,255,0.97); border-radius:20px; padding:30px; text-align:center; box-shadow:0 10px 40px rgba(0,0,0,0.2); }
.result-title { font-size:2em; margin-bottom:8px; }
.result-msg { font-size:1.1em; color:#666; margin-bottom:18px; }
#spectator-banner { display:none; position:fixed; bottom:70px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.7); color:#fff; padding:8px 22px; border-radius:18px; font-size:1em; z-index:150; }
.empty-msg { text-align:center; color:#999; padding:25px; font-size:0.95em; }
.modal-overlay { display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.5); z-index:500; align-items:center; justify-content:center; }
.modal-overlay.active { display:flex; }
.modal-box { background:#fff; border-radius:18px; padding:25px; text-align:center; max-width:300px; box-shadow:0 10px 30px rgba(0,0,0,0.3); }
.modal-box p { margin-bottom:15px; font-size:1.1em; color:#333; }
.kick-btn { background:none; border:none; cursor:pointer; font-size:0.8em; color:#e74c3c; margin-left:auto; padding:2px 8px; border-radius:8px; }
.kick-btn:hover { background:#fdd; }
#result-overlay .modal-box { animation: resultPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
@keyframes resultPop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.result-stat-row { display:flex; justify-content:space-between; align-items:center; padding:2px 0; border-bottom:1px solid #eee; }
.result-stat-row:last-child { border-bottom:none; }
.result-stat-label { color:#888; }
.result-stat-value { font-weight:bold; color:#333; }

/* ===== 物品栏 UI ===== */
#item-bar {
  position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
  display: none; gap: 8px; z-index: 200; pointer-events: auto;
}
#item-bar.active { display: flex; }
.item-slot {
  width: 52px; height: 52px; border-radius: 12px;
  background: rgba(255,255,255,0.92); border: 3px solid rgba(0,0,0,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6em; position: relative; cursor: pointer;
  box-shadow: 0 3px 10px rgba(0,0,0,0.15); transition: transform 0.15s;
}
.item-slot:active { transform: scale(0.9); }
.item-slot .slot-key {
  position: absolute; top: 2px; left: 5px; font-size: 0.45em;
  color: #999; font-weight: bold;
}
.item-slot.empty { opacity: 0.5; }

/* ===== 暗道提示 ===== */
#tunnel-msg {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  background: rgba(0,0,0,0.8); color: #fff; padding: 10px 22px;
  border-radius: 14px; font-size: 1em; z-index: 160;
  display: none; pointer-events: none;
}
#tunnel-msg.active { display: block; }

/* ===== 语音聊天 UI ===== */
#voice-panel {
  position: fixed; bottom: 12px; right: 12px; z-index: 300;
  display: none; flex-direction: column; align-items: flex-end; gap: 6px;
}
#voice-panel.active { display: flex; }
#mic-btn {
  width: 52px; height: 52px; border-radius: 50%; border: none;
  background: rgba(255,255,255,0.92); box-shadow: 0 3px 12px rgba(0,0,0,0.2);
  font-size: 1.6em; cursor: pointer; transition: transform 0.2s, background 0.2s;
  display: flex; align-items: center; justify-content: center; pointer-events: auto;
}
#mic-btn:hover { transform: scale(1.1); }
#mic-btn.muted { background: rgba(255,80,80,0.9); }
#mic-btn.muted::after { content: ''; position: absolute; width: 3px; height: 28px; background: #fff; border-radius: 2px; transform: rotate(45deg); }
#voice-speakers { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; max-height: 200px; overflow-y: auto; }
.voice-speaker { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.9); padding: 4px 10px; border-radius: 14px; font-size: 0.8em; font-weight: bold; box-shadow: 0 2px 6px rgba(0,0,0,0.1); transition: all 0.3s; }
.voice-speaker.speaking { background: rgba(76, 175, 80, 0.9); color: #fff; box-shadow: 0 0 12px rgba(76, 175, 80, 0.5); }
.voice-speaker .speaker-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
.voice-speaker.speaking .speaker-dot { background: #fff; animation: pulse-dot 0.6s ease infinite alternate; }
@keyframes pulse-dot { from { transform: scale(1); } to { transform: scale(1.4); } }
#voice-status { font-size: 0.72em; color: rgba(255,255,255,0.8); background: rgba(0,0,0,0.4); padding: 3px 8px; border-radius: 8px; display: none; }
#voice-status.active { display: block; }
</style>
</head>
<body>
<!-- 主菜单 -->
<div class="screen active" id="menu-screen">
  <div class="title">🏃 抓人大作战</div>
  <div class="subtitle">和朋友一起玩！</div>
  <button class="btn btn-primary" onclick="showScreen('create-screen')">🏠 创建房间</button>
  <button class="btn btn-secondary" onclick="showScreen('join-screen')">🚪 加入房间</button>
  <button class="btn btn-start" onclick="showScreen('browse-screen')">🔍 浏览房间</button>
</div>

<!-- 创建房间 -->
<div class="screen" id="create-screen">
  <div class="panel">
    <div class="panel-title">🏠 创建房间</div>
    <input class="input-field" id="create-name" placeholder="房间名称" maxlength="12">
    <div class="form-row"><span class="form-label">类型</span><div class="toggle-group"><span class="toggle-btn active" data-val="public" onclick="toggleRoomType(this)">公开</span><span class="toggle-btn" data-val="private" onclick="toggleRoomType(this)">私密</span></div></div>
    <div class="form-row"><span class="form-label">地图</span><div class="toggle-group" id="map-toggle"></div></div>
    <div class="panel-title" style="font-size:1em;margin-top:10px;">选择角色</div>
    <div class="char-grid" id="create-chars"></div>
    <input class="input-field" id="create-nick" placeholder="你的昵称" maxlength="8">
    <div style="text-align:center;margin-top:10px;">
      <button class="btn btn-primary" onclick="createRoom()">创建</button>
      <button class="btn btn-gray btn-small" onclick="showScreen('menu-screen')">返回</button>
    </div>
  </div>
</div>

<!-- 加入房间 -->
<div class="screen" id="join-screen">
  <div class="panel">
    <div class="panel-title">🚪 加入房间</div>
    <input class="input-field" id="join-code" placeholder="房间号" maxlength="4">
    <div class="panel-title" style="font-size:1em;margin-top:10px;">选择角色</div>
    <div class="char-grid" id="join-chars"></div>
    <input class="input-field" id="join-nick" placeholder="你的昵称" maxlength="8">
    <div style="text-align:center;margin-top:10px;">
      <button class="btn btn-secondary" onclick="joinRoom()">加入</button>
      <button class="btn btn-start btn-small" onclick="randomJoin()">🎲 随机加入</button>
      <button class="btn btn-gray btn-small" onclick="showScreen('menu-screen')">返回</button>
    </div>
  </div>
</div>

<!-- 浏览房间 -->
<div class="screen" id="browse-screen">
  <div class="panel">
    <div class="panel-title">🔍 公开房间</div>
    <ul class="room-list" id="room-list"><li class="empty-msg">加载中...</li></ul>
    <div style="text-align:center;margin-top:10px;">
      <button class="btn btn-secondary btn-small" onclick="loadRooms()">🔄 刷新</button>
      <button class="btn btn-gray btn-small" onclick="showScreen('menu-screen')">返回</button>
    </div>
  </div>
</div>

<!-- 大厅 -->
<div class="screen" id="lobby-screen">
  <div class="panel">
    <div id="lobby-room-name" class="panel-title">🎮 房间</div>
    <div class="room-code-display" id="lobby-room-code"></div>
    <div class="player-count" id="lobby-count"></div>
    <ul class="player-list" id="lobby-players"></ul>
    <div id="lobby-host-controls" style="display:none;text-align:center;margin-top:8px;">
      <button class="btn btn-primary btn-small" onclick="forceStart()">🚀 强制开始</button>
    </div>
    <div style="text-align:center;margin-top:8px;">
      <button class="btn btn-start btn-small" onclick="proposeStart()">✋ 提议开始</button>
      <button class="btn btn-danger btn-small" onclick="leaveRoom()">退出</button>
    </div>
    <div id="lobby-wait-msg" style="text-align:center;color:#888;font-size:0.85em;margin-top:5px;"></div>
  </div>
</div>

<!-- 游戏画面 -->
<div class="screen" id="game-screen">
  <div id="game-hud">
    <span class="hud-item hud-role" id="hud-role"></span>
    <span class="hud-item hud-timer" id="hud-timer">3:00</span>
    <span class="hud-item hud-stamina" id="hud-stamina">⚡100</span>
  </div>
  <canvas id="game-canvas"></canvas>
  <div id="joystick-area"><div id="joystick-base"><div id="joystick-knob"></div></div></div>
  <div id="spectator-banner">👻 你已被抓！观战中...</div>
</div>

<!-- 物品栏 (游戏中显示) -->
<div id="item-bar">
  <div class="item-slot empty" id="slot-0" onclick="useItem(0)"><span class="slot-key">1</span></div>
  <div class="item-slot empty" id="slot-1" onclick="useItem(1)"><span class="slot-key">2</span></div>
  <div class="item-slot empty" id="slot-2" onclick="useItem(2)"><span class="slot-key">3</span></div>
</div>

<!-- 暗道提示 -->
<div id="tunnel-msg"></div>

<!-- 投票弹窗 -->
<div class="modal-overlay" id="vote-modal">
  <div class="modal-box">
    <p id="vote-msg">有人提议开始游戏</p>
    <button class="btn btn-primary btn-small" onclick="voteAgree()">👍 同意</button>
    <button class="btn btn-gray btn-small" onclick="voteWait()">⏳ 继续等待</button>
  </div>
</div>

<!-- 结算弹窗 -->
<div class="modal-overlay" id="result-overlay">
  <div class="modal-box result-box">
    <div class="result-title" id="result-title">🎉</div>
    <div class="result-msg" id="result-msg"></div>
    <div id="result-details" style="text-align:left;font-size:0.88em;margin:10px 0;"></div>
    <button class="btn btn-primary btn-small" onclick="returnToLobby()">🔄 再来一局</button>
    <button class="btn btn-gray btn-small" onclick="backToMenu()">🏠 返回主页</button>
  </div>
</div>

<!-- 语音聊天面板 -->
<div id="voice-panel">
  <div id="voice-speakers"></div>
  <button id="mic-btn" onclick="toggleMic()" title="点击切换麦克风">🎤</button>
  <div id="voice-status"></div>
</div>

// ===== UTILS =====
function escH(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function genId(){return Math.random().toString(36).substr(2,9);}
function genRoomCode(){return String(Math.floor(1000+Math.random()*9000));}

function selectMap(el){el.parentElement.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');selectedMap=+el.dataset.val;}
function selectChar(el,idx){el.parentElement.querySelectorAll('.char-option').forEach(c=>c.classList.remove('selected'));el.classList.add('selected');myCharIdx=idx;}
function toggleRoomType(el){el.parentElement.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');roomType=el.dataset.val;}

// ===== ROOM MANAGEMENT =====
function createRoom(){
  roomName=document.getElementById('create-name').value.trim()||'快乐房间';
  myNick=document.getElementById('create-nick').value.trim()||CHARS[myCharIdx].name;
  roomCode=genRoomCode();myId=genId();isHost=true;
  joinChannel();
}
function joinRoom(){
  roomCode=document.getElementById('join-code').value.trim();
  if(!roomCode||roomCode.length!==4){alert('请输入4位房间号');return;}
  myNick=document.getElementById('join-nick').value.trim()||CHARS[myCharIdx].name;
  myId=genId();isHost=false;
  joinChannel();
}
function randomJoin(){
  myNick=document.getElementById('join-nick').value.trim()||CHARS[myCharIdx].name;
  myId=genId();isHost=false;
  // Try to find a public room
  const ch=sb.channel('room-list');
  ch.subscribe(async(status)=>{
    if(status==='SUBSCRIBED'){
      ch.send({type:'broadcast',event:'list-request',payload:{from:myId}});
      setTimeout(()=>{ch.unsubscribe();if(!roomCode){alert('没有找到可加入的房间，试试创建一个吧！');}},3000);
    }
  });
  ch.on('broadcast',{event:'list-response'},({payload})=>{
    if(roomCode)return;
    if(payload.type==='public'&&payload.count<10){
      roomCode=payload.code;roomName=payload.name;selectedMap=payload.map||0;
      ch.unsubscribe();joinChannel();
    }
  });
}
function loadRooms(){
  const list=document.getElementById('room-list');
  list.innerHTML='<li class="empty-msg">搜索中...</li>';
  const ch=sb.channel('room-list');
  const rooms=[];
  ch.subscribe(async(status)=>{
    if(status==='SUBSCRIBED'){
      ch.send({type:'broadcast',event:'list-request',payload:{from:'browser'}});
      setTimeout(()=>{
        ch.unsubscribe();
        if(rooms.length===0){list.innerHTML='<li class="empty-msg">暂无公开房间</li>';return;}
        list.innerHTML='';
        rooms.forEach(r=>{
          list.innerHTML+=`<li class="room-card"><div class="room-info"><span class="room-name-text">${escH(r.name)}</span><span class="room-meta">队长:${escH(r.host)} | ${r.count}/10人 | ${MAPS[r.map||0].name}</span></div><button class="btn btn-secondary btn-small" onclick="joinFromBrowse('${r.code}',${r.map||0})">加入</button></li>`;
        });
      },2500);
    }
  });
  ch.on('broadcast',{event:'list-response'},({payload})=>{
    if(payload.type==='public')rooms.push(payload);
  });
}
function joinFromBrowse(code,map){
  roomCode=code;selectedMap=map;
  myNick=prompt('输入你的昵称:',CHARS[myCharIdx].name)||CHARS[myCharIdx].name;
  myId=genId();isHost=false;
  joinChannel();
}
function leaveRoom(){
  if(channel){channel.unsubscribe();channel=null;}
  lobbyPlayers={};gameState='menu';
  showScreen('menu-screen');
  leaveVoiceChannel();
}

// ===== CHANNEL =====
function joinChannel(){
  gameState='lobby';
  channel=sb.channel('catch-room-'+roomCode,{config:{broadcast:{self:false}}});
  channel.on('broadcast',{event:'presence'},({payload})=>onPresence(payload));
  channel.on('broadcast',{event:'kick'},({payload})=>onKick(payload));
  channel.on('broadcast',{event:'vote-propose'},({payload})=>onVotePropose(payload));
  channel.on('broadcast',{event:'vote-response'},({payload})=>onVoteResponse(payload));
  channel.on('broadcast',{event:'game-start'},({payload})=>onGameStart(payload));
  channel.on('broadcast',{event:'player-move'},({payload})=>onPlayerMove(payload));
  channel.on('broadcast',{event:'player-caught'},({payload})=>onPlayerCaught(payload));
  channel.on('broadcast',{event:'food-eaten'},({payload})=>onFoodEaten(payload));
  channel.on('broadcast',{event:'coin-spawn'},({payload})=>onCoinSpawn(payload));
  channel.on('broadcast',{event:'game-end'},({payload})=>onGameEnd(payload));
  channel.on('broadcast',{event:'list-request'},()=>{
    if(isHost&&gameState==='lobby'){
      channel.send({type:'broadcast',event:'list-response',payload:{code:roomCode,name:roomName,host:myNick,count:Object.keys(lobbyPlayers).length,type:roomType,map:selectedMap}});
    }
  });
  // New events for items/tunnels
  channel.on('broadcast',{event:'item-pickup'},({payload})=>onItemPickup(payload));
  channel.on('broadcast',{event:'item-use'},({payload})=>onItemUse(payload));
  channel.on('broadcast',{event:'obstacle-place'},({payload})=>onObstaclePlace(payload));
  channel.on('broadcast',{event:'tunnel-unlock'},({payload})=>onTunnelUnlock(payload));
  channel.on('broadcast',{event:'key-pickup'},({payload})=>onKeyPickup(payload));
  channel.on('broadcast',{event:'item-spawn'},({payload})=>onItemSpawn(payload));
  // Voice UID mapping
  channel.on('broadcast',{event:'voice-uid'},({payload})=>onVoiceUid(payload));

  channel.subscribe(async(status)=>{
    if(status==='SUBSCRIBED'){
      broadcastPresence();
      presenceInterval=setInterval(broadcastPresence,2000);
      showScreen('lobby-screen');
      document.getElementById('lobby-room-code').textContent=roomCode;
      document.getElementById('lobby-room-name').textContent='🎮 '+(roomName||'游戏房间');
      document.getElementById('lobby-host-controls').style.display=isHost?'block':'none';
      // Also respond to room list requests on the global channel
      const listCh=sb.channel('room-list');
      listCh.subscribe(s=>{
        if(s==='SUBSCRIBED'){
          listCh.on('broadcast',{event:'list-request'},()=>{
            if(isHost&&gameState==='lobby'){
              listCh.send({type:'broadcast',event:'list-response',payload:{code:roomCode,name:roomName,host:myNick,count:Object.keys(lobbyPlayers).length,type:roomType,map:selectedMap}});
            }
          });
        }
      });
      // Join voice channel
      joinVoiceChannel('catch-voice-'+roomCode);
    }
  });
}

function broadcastPresence(){
  if(!channel)return;
  channel.send({type:'broadcast',event:'presence',payload:{id:myId,nick:myNick,charIdx:myCharIdx,isHost,ts:Date.now()}});
  // Self
  lobbyPlayers[myId]={nick:myNick,charIdx:myCharIdx,isHost};
  lobbyTs[myId]=Date.now();
  updateLobbyUI();
}

function onPresence(p){
  lobbyPlayers[p.id]={nick:p.nick,charIdx:p.charIdx,isHost:p.isHost};
  lobbyTs[p.id]=Date.now();
  // Check for character conflict
  if(p.id!==myId&&p.charIdx===myCharIdx){
    // Auto-switch to next available
    const used=new Set(Object.entries(lobbyPlayers).filter(([id])=>id!==myId).map(([,v])=>v.charIdx));
    for(let i=0;i<CHARS.length;i++){if(!used.has(i)){myCharIdx=i;broadcastPresence();break;}}
  }
  updateLobbyUI();
  // Clean stale
  const now=Date.now();
  Object.keys(lobbyTs).forEach(id=>{if(now-lobbyTs[id]>6000){delete lobbyPlayers[id];delete lobbyTs[id];}});
}

function updateLobbyUI(){
  const list=document.getElementById('lobby-players');
  const count=Object.keys(lobbyPlayers).length;
  document.getElementById('lobby-count').textContent=`${count}/10 玩家`;
  list.innerHTML='';
  Object.entries(lobbyPlayers).forEach(([id,p])=>{
    const hostBadge=p.isHost?'👑':'';
    const kickBtn=(isHost&&id!==myId)?`<span class="kick-btn" onclick="kickPlayer('${id}')">踢出</span>`:'';
    const voiceIcon=isPlayerInVoice(id)?'🎤':'';
    list.innerHTML+=`<li><span class="dot" style="background:${CHARS[p.charIdx].color}"></span>${CHARS[p.charIdx].emoji} ${escH(p.nick)} ${hostBadge} ${voiceIcon}${kickBtn}</li>`;
  });
}
// ===== KICK =====
function kickPlayer(targetId){
  if(!isHost)return;
  channel.send({type:'broadcast',event:'kick',payload:{targetId}});
}
function onKick({targetId}){
  if(targetId===myId){alert('你被队长踢出了房间！');leaveRoom();}
  else{delete lobbyPlayers[targetId];updateLobbyUI();}
}

// ===== VOTE SYSTEM =====
function proposeStart(){
  const count=Object.keys(lobbyPlayers).length;
  if(count<2){alert('至少需要2个玩家！');return;}
  channel.send({type:'broadcast',event:'vote-propose',payload:{proposer:myId,proposerName:myNick}});
  // Count self vote
  onVotePropose({proposer:myId,proposerName:myNick});
}
function onVotePropose({proposer,proposerName}){
  if(gameState!=='lobby')return;
  const ids=Object.keys(lobbyPlayers);
  currentVote={proposer,proposerName,votes:{},needed:ids.length};
  currentVote.votes[proposer]='agree';
  if(proposer===myId){
    document.getElementById('lobby-wait-msg').textContent='等待其他玩家投票...';
  } else {
    document.getElementById('vote-msg').textContent=`${escH(proposerName)} 提议开始游戏，是否同意？`;
    document.getElementById('vote-modal').classList.add('active');
  }
  checkVoteResult();
}
function voteAgree(){
  document.getElementById('vote-modal').classList.remove('active');
  if(currentVote)onVoteResponse({id:myId,vote:'agree'});
  channel.send({type:'broadcast',event:'vote-response',payload:{id:myId,vote:'agree'}});
}
function voteWait(){
  document.getElementById('vote-modal').classList.remove('active');
  if(currentVote)onVoteResponse({id:myId,vote:'wait'});
  channel.send({type:'broadcast',event:'vote-response',payload:{id:myId,vote:'wait'}});
}
function onVoteResponse({id,vote}){
  if(!currentVote)return;
  currentVote.votes[id]=vote;
  checkVoteResult();
}
function checkVoteResult(){
  if(!currentVote)return;
  const votes=Object.values(currentVote.votes);
  if(votes.includes('wait')){
    document.getElementById('lobby-wait-msg').textContent='有人选择继续等待，游戏暂不开始';
    currentVote=null;return;
  }
  if(votes.filter(v=>v==='agree').length>=currentVote.needed){
    document.getElementById('lobby-wait-msg').textContent='全员同意！即将开始...';
    if(isHost)setTimeout(()=>startGame(),1000);
    currentVote=null;
  }
}
function forceStart(){
  if(!isHost)return;
  const count=Object.keys(lobbyPlayers).length;
  if(count<2){alert('至少需要2个玩家！');return;}
  startGame();
}

// ===== START GAME =====
function startGame(){
  const ids=Object.keys(lobbyPlayers);
  const catcherIdx=Math.floor(Math.random()*ids.length);
  const startPositions=ids.map((_,i)=>({
    x:100+Math.random()*(MAP_W-200),
    y:100+Math.random()*(MAP_H-200)
  }));
  // Init foods
  const initFoods=[];
  for(let i=0;i<8;i++){
    initFoods.push({id:i,x:50+Math.random()*(MAP_W-100),y:50+Math.random()*(MAP_H-100),active:true});
  }
  // Init item pickups
  const initItems=[];
  const itemTypes=['hp','spd','block'];
  for(let i=0;i<5;i++){
    initItems.push({id:'item_'+i,x:80+Math.random()*(MAP_W-160),y:80+Math.random()*(MAP_H-160),active:true,type:itemTypes[Math.floor(Math.random()*3)]});
  }
  // Init tunnel keys
  const map=MAPS[selectedMap];
  const initKeys=[];
  map.tunnels.forEach(t=>{
    if(t.locked&&t.keySpawn){
      initKeys.push({id:'key_'+t.id,x:t.keySpawn.x,y:t.keySpawn.y,active:true,tunnelId:t.id});
    }
  });
  // Init tunnel states (all locked ones start locked)
  const initTunnelStates={};
  map.tunnels.forEach(t=>{initTunnelStates[t.id]=!t.locked;});

  const payload={
    catcherId:ids[catcherIdx],
    players:ids.map((id,i)=>({id,nick:lobbyPlayers[id].nick,charIdx:lobbyPlayers[id].charIdx,x:startPositions[i].x,y:startPositions[i].y})),
    foods:initFoods,
    items:initItems,
    keys:initKeys,
    tunnelStates:initTunnelStates,
    map:selectedMap
  };
  channel.send({type:'broadcast',event:'game-start',payload});
  onGameStart(payload);
}

function onGameStart(data){
  gameState='playing';
  selectedMap=data.map;
  timeLeft=GAME_DURATION;
  isCaught=false;
  players={};foods=data.foods||[];
  itemPickups=data.items||[];
  tunnelKeys=data.keys||[];
  tunnelStates=data.tunnelStates||{};
  obstacles=[];
  myItems=[null,null,null];
  mySpeedBuff=0;mySpeedMul=1;
  frameCount=0;itemSpawnTimer=0;
  inTunnel=false;currentTunnelId=null;
  teleportCooldown=0;
  iceVX=0;iceVY=0;
  springLaunch=0;

  data.players.forEach(p=>{
    players[p.id]={x:p.x,y:p.y,nick:p.nick,charIdx:p.charIdx,role:p.id===data.catcherId?'catcher':'runner',caught:false,dx:0,dy:0,stamina:STAMINA_MAX};
  });

  showScreen('game-screen');
  document.getElementById('vote-modal').classList.remove('active');
  document.getElementById('result-overlay').classList.remove('active');
  const me=players[myId];
  document.getElementById('hud-role').textContent=me.role==='catcher'?'🏃 抓人者':'🐇 逃跑者';

  // Show item bar
  document.getElementById('item-bar').classList.add('active');
  updateItemBarUI();

  setupCanvas();
  if(isMobile)setupJoystick();
  setupKeys();

  if(gameInterval)clearInterval(gameInterval);
  gameInterval=setInterval(gameLoop,1000/60);
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timeLeft--;
    document.getElementById('hud-timer').textContent=`${Math.floor(timeLeft/60)}:${String(timeLeft%60).padStart(2,'0')}`;
    if(timeLeft<=0){if(isHost){channel.send({type:'broadcast',event:'game-end',payload:{reason:'time'}});}endGame('time');}
  },1000);
}

// ===== INPUT =====
function setupKeys(){
  if(keys._bound)return;keys._bound=true;
  window.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;
    // Item hotkeys 1,2,3
    if(e.key==='1')useItem(0);
    if(e.key==='2')useItem(1);
    if(e.key==='3')useItem(2);
  });
  window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
}
function setupJoystick(){
  const area=document.getElementById('joystick-area');
  const knob=document.getElementById('joystick-knob');
  area.style.display='block';
  const base=document.getElementById('joystick-base');
  const bw=125,r=bw/2;
  function handleTouch(e){
    e.preventDefault();
    const t=e.touches[0],rect=base.getBoundingClientRect();
    let dx=t.clientX-rect.left-r,dy=t.clientY-rect.top-r;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>r){dx=dx/dist*r;dy=dy/dist*r;}
    knob.style.left=(r+dx-26)+'px';knob.style.top=(r+dy-26)+'px';
    joystickDX=dx/r;joystickDY=dy/r;joystickActive=true;
  }
  area.addEventListener('touchstart',handleTouch,{passive:false});
  area.addEventListener('touchmove',handleTouch,{passive:false});
  area.addEventListener('touchend',()=>{knob.style.left='36px';knob.style.top='36px';joystickDX=0;joystickDY=0;joystickActive=false;});
}
// ===== GAME LOOP =====
function gameLoop(){
  if(gameState!=='playing')return;
  frameCount++;
  const me=players[myId];
  if(!me||me.caught){render();return;}

  // If in tunnel, handle auto-eject
  if(inTunnel){
    const framesIn=frameCount-tunnelEnteredFrame;
    const secIn=framesIn/60;
    showTunnelMsg(`暗道中... ${Math.max(0,(3-secIn)).toFixed(1)}秒后弹出`);
    if(secIn>=3){
      // Eject to exit
      const map=MAPS[selectedMap];
      const isRev=currentTunnelId.endsWith("_rev");
      const tunnelId=isRev?currentTunnelId.replace("_rev",""):currentTunnelId;
      const tunnel=map.tunnels.find(t=>t.id===tunnelId);
      if(tunnel){
        const exitPt=isRev?tunnel.entry:tunnel.exit;
        me.x=exitPt.x+exitPt.w/2;
        me.y=exitPt.y+exitPt.h/2;
      }
      inTunnel=false;currentTunnelId=null;
      hideTunnelMsg();
    }
    broadcastMove(me);
    render();
    return;
  }

  let dx=0,dy=0;
  if(isMobile&&joystickActive){dx=joystickDX;dy=joystickDY;}
  else{if(keys['w']||keys['arrowup'])dy=-1;if(keys['s']||keys['arrowdown'])dy=1;if(keys['a']||keys['arrowleft'])dx=-1;if(keys['d']||keys['arrowright'])dx=1;}
  const len=Math.sqrt(dx*dx+dy*dy);
  if(len>0){dx/=len;dy/=len;}

  // Get terrain at player position
  const terrain=getTerrainAt(me.x,me.y);

  // Stamina cost (movement + terrain)
  if(len>0){
    const stCost=STAMINA_MOVE_COST+terrain.staminaCost;
    me.stamina-=stCost;
    if(me.stamina<=0){me.stamina=0;dx=0;dy=0;}
  } else {
    me.stamina=Math.min(STAMINA_MAX,me.stamina+STAMINA_REGEN);
  }

  // Speed calculation
  let spd=me.role==='catcher'?SPEED_CATCHER:SPEED_NORMAL;
  spd*=terrain.spdMul;
  // Speed buff from potion
  if(mySpeedBuff>0){spd*=1.8;mySpeedBuff--;}

  // Spring launch (overrides normal movement)
  if(springLaunch>0){
    dx=springDX;dy=springDY;spd=6;
    springLaunch--;
  }

  // Ice physics
  if(terrain.friction){
    iceVX=iceVX*terrain.friction+dx*spd*0.1;
    iceVY=iceVY*terrain.friction+dy*spd*0.1;
    // Cap ice speed
    const iceSpd=Math.sqrt(iceVX*iceVX+iceVY*iceVY);
    if(iceSpd>spd*1.5){iceVX=iceVX/iceSpd*spd*1.5;iceVY=iceVY/iceSpd*spd*1.5;}
    var nx=me.x+iceVX, ny=me.y+iceVY;
  } else {
    iceVX=0;iceVY=0;
    // Boost direction override
    if(terrain.dir&&len===0&&terrain.spdMul>1.5){
      // Standing on boost pad applies force
      const bDir={right:{x:1,y:0},left:{x:-1,y:0},down:{x:0,y:1},up:{x:0,y:-1}}[terrain.dir]||{x:0,y:0};
      dx=bDir.x;dy=bDir.y;
    } else if(terrain.dir&&terrain.spdMul>1.5){
      // Moving on boost: add boost direction
      const bDir={right:{x:1,y:0},left:{x:-1,y:0},down:{x:0,y:1},up:{x:0,y:-1}}[terrain.dir]||{x:0,y:0};
      dx=dx*0.5+bDir.x*0.5;dy=dy*0.5+bDir.y*0.5;
    }
    var nx=me.x+dx*spd, ny=me.y+dy*spd;
  }

  // Collision with walls
  const map=MAPS[selectedMap];
  const r=resolveCol(me.x,me.y,nx,ny,PLAYER_R,map.walls);
  // Also check obstacles
  const allWalls=[...map.walls,...obstacles.map(o=>({x:o.x-15,y:o.y-15,w:30,h:30}))];
  const r2=resolveCol(me.x,me.y,r.x,r.y,PLAYER_R,allWalls);
  me.x=Math.max(PLAYER_R,Math.min(MAP_W-PLAYER_R,r2.x));
  me.y=Math.max(PLAYER_R,Math.min(MAP_H-PLAYER_R,r2.y));
  me.dx=dx;me.dy=dy;

  // Teleport check
  if(teleportCooldown>0)teleportCooldown--;
  if(terrain.type==='TELEPORT'&&teleportCooldown<=0){
    const tData=getTerrainDataAt(me.x,me.y);
    if(tData&&tData.pairId){
      const mapTerrains=map.terrains;
      const pair=mapTerrains.find(t=>t.type==='TELEPORT'&&t.pairId===tData.pairId&&(t.x!==tData.x||t.y!==tData.y));
      if(pair){
        me.x=pair.x+pair.w/2;me.y=pair.y+pair.h/2;
        teleportCooldown=120; // 2 seconds cooldown
        showTunnelMsg('⚡ 传送！');setTimeout(hideTunnelMsg,800);
      }
    }
  }

  // Spring check
  if(terrain.type==='SPRING'&&springLaunch<=0){
    // Launch in movement direction or random
    springDX=dx||((Math.random()-0.5)*2);
    springDY=dy||((Math.random()-0.5)*2);
    const sLen=Math.sqrt(springDX*springDX+springDY*springDY);
    if(sLen>0){springDX/=sLen;springDY/=sLen;}
    springLaunch=20; // ~0.33 seconds
    showTunnelMsg('🦘 弹飞！');setTimeout(hideTunnelMsg,600);
  }

  // Food/stamina pickup
  foods.forEach(f=>{
    if(!f.active)return;
    if(Math.hypot(me.x-f.x,me.y-f.y)<PLAYER_R+FOOD_R){
      f.active=false;me.stamina=Math.min(STAMINA_MAX,me.stamina+FOOD_STAMINA);
      channel.send({type:'broadcast',event:'food-eaten',payload:{foodId:f.id}});
    }
  });

  // Item pickup
  itemPickups.forEach(item=>{
    if(!item.active)return;
    if(Math.hypot(me.x-item.x,me.y-item.y)<PLAYER_R+12){
      // Try to add to inventory
      const slot=myItems.indexOf(null);
      if(slot!==-1){
        myItems[slot]=item.type;
        item.active=false;
        updateItemBarUI();
        channel.send({type:'broadcast',event:'item-pickup',payload:{itemId:item.id}});
      }
    }
  });

  // Key pickup
  tunnelKeys.forEach(k=>{
    if(!k.active)return;
    if(Math.hypot(me.x-k.x,me.y-k.y)<PLAYER_R+12){
      // Key goes to inventory as 'key' type
      const slot=myItems.indexOf(null);
      if(slot!==-1){
        myItems[slot]='key';
        k.active=false;
        updateItemBarUI();
        channel.send({type:'broadcast',event:'key-pickup',payload:{keyId:k.id}});
        showTunnelMsg('🔑 获得钥匙！');setTimeout(hideTunnelMsg,1000);
      }
    }
  });

  // Tunnel entry check
  map.tunnels.forEach(t=>{
    const entry=t.entry;
    if(me.x>entry.x&&me.x<entry.x+entry.w&&me.y>entry.y&&me.y<entry.y+entry.h){
      const unlocked=tunnelStates[t.id];
      if(unlocked){
        // Enter tunnel
        inTunnel=true;tunnelEnteredFrame=frameCount;currentTunnelId=t.id;
        showTunnelMsg('🚪 进入暗道...');
      } else {
        // Need key
        const keySlot=myItems.indexOf('key');
        if(keySlot!==-1){
          // Use key to unlock
          myItems[keySlot]=null;
          tunnelStates[t.id]=true;
          updateItemBarUI();
          channel.send({type:'broadcast',event:'tunnel-unlock',payload:{tunnelId:t.id}});
          showTunnelMsg('🔓 暗道已开启！所有人都能进了');setTimeout(hideTunnelMsg,1500);
        } else {
          showTunnelMsg('🔒 需要钥匙才能进入');setTimeout(hideTunnelMsg,1000);
        }
      }
    }
    // Also check exit as entry (bidirectional)
    const exit=t.exit;
    if(me.x>exit.x&&me.x<exit.x+exit.w&&me.y>exit.y&&me.y<exit.y+exit.h){
      const unlocked=tunnelStates[t.id];
      if(unlocked){
        inTunnel=true;tunnelEnteredFrame=frameCount;currentTunnelId=t.id+'_rev';
        showTunnelMsg('🚪 进入暗道...');
      }
    }
  });

  // Coin spawn (host only)
  tickCoinSpawn();
  // Item spawn (host only)
  tickItemSpawn();

  // Expire obstacles
  obstacles=obstacles.filter(o=>frameCount<o.expireFrame);

  // Catch detection
  if(me.role==='catcher'){
    Object.entries(players).forEach(([id,p])=>{
      if(id===myId||p.caught||p.role==='catcher')return;
      if(Math.hypot(me.x-p.x,me.y-p.y)<CATCH_DIST)
        channel.send({type:'broadcast',event:'player-caught',payload:{caughtId:id}});
    });
  }

  // HUD
  document.getElementById('hud-stamina').textContent='⚡'+Math.round(me.stamina);

  broadcastMove(me);
  render();
}

function broadcastMove(me){
  if(frameCount%3===0&&channel){
    channel.send({type:'broadcast',event:'player-move',payload:{id:myId,x:me.x,y:me.y,dx:me.dx,dy:me.dy,stamina:me.stamina,caught:me.caught}});
  }
}

function onPlayerMove(p){
  if(players[p.id]){Object.assign(players[p.id],{x:p.x,y:p.y,dx:p.dx,dy:p.dy,stamina:p.stamina,caught:p.caught});}
}
function onPlayerCaught({caughtId}){
  if(players[caughtId])players[caughtId].caught=true;
  if(caughtId===myId){isCaught=true;document.getElementById('spectator-banner').style.display='block';}
  // Check if all runners caught
  const runners=Object.values(players).filter(p=>p.role==='runner');
  if(runners.every(p=>p.caught)&&isHost){channel.send({type:"broadcast",event:"game-end",payload:{reason:"allcaught"}});endGame("allcaught");}
}
function onFoodEaten({foodId}){const f=foods.find(x=>x.id===foodId);if(f)f.active=false;}
function onCoinSpawn(coin){if(!foods.find(f=>f.id===coin.id))foods.push(coin);}
function onItemPickup({itemId}){const it=itemPickups.find(x=>x.id===itemId);if(it)it.active=false;}
function onItemUse(data){/* visual effects handled locally */}
function onObstaclePlace({x,y,id,expireFrame}){obstacles.push({x,y,id,expireFrame});}
function onTunnelUnlock({tunnelId}){tunnelStates[tunnelId]=true;}
function onKeyPickup({keyId}){const k=tunnelKeys.find(x=>x.id===keyId);if(k)k.active=false;}
function onItemSpawn(item){if(!itemPickups.find(x=>x.id===item.id))itemPickups.push(item);}

// ===== TERRAIN HELPERS =====
function getTerrainAt(px,py){
  const map=MAPS[selectedMap];
  if(!map.terrains)return TERRAIN.NORMAL;
  for(const t of map.terrains){
    if(px>=t.x&&px<=t.x+t.w&&py>=t.y&&py<=t.y+t.h){
      const tt=TERRAIN[t.type];
      return {...tt, type:t.type, dir:t.dir};
    }
  }
  return TERRAIN.NORMAL;
}
function getTerrainDataAt(px,py){
  const map=MAPS[selectedMap];
  if(!map.terrains)return null;
  for(const t of map.terrains){
    if(px>=t.x&&px<=t.x+t.w&&py>=t.y&&py<=t.y+t.h) return t;
  }
  return null;
}

// ===== ITEM SYSTEM =====
function useItem(slot){
  if(gameState!=='playing')return;
  const item=myItems[slot];
  if(!item)return;
  const me=players[myId];
  if(!me||me.caught)return;

  if(item==='hp'){
    me.stamina=Math.min(STAMINA_MAX,me.stamina+50);
    showTunnelMsg('💊 体力+50！');setTimeout(hideTunnelMsg,800);
  } else if(item==='spd'){
    mySpeedBuff=300; // 5 seconds at 60fps
    showTunnelMsg('⚡ 加速5秒！');setTimeout(hideTunnelMsg,800);
  } else if(item==='block'){
    // Place obstacle behind player
    const ox=me.x-(me.dx||0)*40;
    const oy=me.y-(me.dy||0)*40;
    const obs={x:ox,y:oy,id:'obs_'+frameCount,expireFrame:frameCount+900}; // 15 seconds
    obstacles.push(obs);
    channel.send({type:'broadcast',event:'obstacle-place',payload:obs});
    showTunnelMsg('🪨 放置障碍物！');setTimeout(hideTunnelMsg,800);
  } else if(item==='key'){
    // Key is used automatically at tunnel doors, not manually
    showTunnelMsg('🔑 走到暗道门口自动使用');setTimeout(hideTunnelMsg,1000);
    return; // Don't consume
  }

  myItems[slot]=null;
  updateItemBarUI();
  channel.send({type:'broadcast',event:'item-use',payload:{id:myId,item,slot}});
}

function updateItemBarUI(){
  for(let i=0;i<3;i++){
    const el=document.getElementById('slot-'+i);
    const item=myItems[i];
    if(item){
      el.classList.remove('empty');
      const info=Object.values(ITEM_TYPES).find(t=>t.id===item);
      el.innerHTML=`<span class="slot-key">${i+1}</span>${info?info.emoji:'?'}`;
      el.title=info?info.desc:'';
    } else {
      el.classList.add('empty');
      el.innerHTML=`<span class="slot-key">${i+1}</span>`;
      el.title='空';
    }
  }
}

// ===== SPAWN TIMERS =====
let coinSpawnTimer=0,nextCoinId=100;
function tickCoinSpawn(){
  if(!isHost)return;
  coinSpawnTimer++;
  if(coinSpawnTimer<420)return;
  coinSpawnTimer=0;
  const map=MAPS[selectedMap];
  let fx,fy,ok,tries=0;
  do{fx=50+Math.random()*(MAP_W-100);fy=50+Math.random()*(MAP_H-100);ok=true;
    for(const w of map.walls){if(fx>w.x-15&&fx<w.x+w.w+15&&fy>w.y-15&&fy<w.y+w.h+15){ok=false;break;}}
    tries++;
  }while(!ok&&tries<30);
  if(ok){const c={id:nextCoinId++,x:fx,y:fy,active:true};foods.push(c);channel.send({type:'broadcast',event:'coin-spawn',payload:c});}
}

function tickItemSpawn(){
  if(!isHost)return;
  itemSpawnTimer++;
  if(itemSpawnTimer<ITEM_SPAWN_INTERVAL)return;
  itemSpawnTimer=0;
  // Max 8 items on map
  if(itemPickups.filter(i=>i.active).length>=8)return;
  const map=MAPS[selectedMap];
  const types=['hp','spd','block'];
  let fx,fy,ok,tries=0;
  do{fx=50+Math.random()*(MAP_W-100);fy=50+Math.random()*(MAP_H-100);ok=true;
    for(const w of map.walls){if(fx>w.x-15&&fx<w.x+w.w+15&&fy>w.y-15&&fy<w.y+w.h+15){ok=false;break;}}
    tries++;
  }while(!ok&&tries<30);
  if(ok){
    const item={id:'item_'+Date.now()+'_'+Math.random().toString(36).substr(2,4),x:fx,y:fy,active:true,type:types[Math.floor(Math.random()*3)]};
    itemPickups.push(item);
    channel.send({type:'broadcast',event:'item-spawn',payload:item});
  }
}

// ===== TUNNEL MSG =====
function showTunnelMsg(msg){const el=document.getElementById('tunnel-msg');el.textContent=msg;el.classList.add('active');}
function hideTunnelMsg(){document.getElementById('tunnel-msg').classList.remove('active');}
// ===== COLLISION =====
function resolveCol(ox,oy,nx,ny,r,walls){
  let x=nx,y=ny;
  for(let iter=0;iter<4;iter++){
    let moved=false;
    for(const w of walls){
      const cx=Math.max(w.x,Math.min(x,w.x+w.w)),cy=Math.max(w.y,Math.min(y,w.y+w.h));
      const ddx=x-cx,ddy=y-cy,d=Math.sqrt(ddx*ddx+ddy*ddy);
      if(d<r){moved=true;if(d<0.001){x=ox;y=oy;}else{const ov=(r-d)+0.5;x+=ddx/d*ov;y+=ddy/d*ov;}}
    }
    if(!moved)break;
  }
  return{x:Math.max(r,Math.min(MAP_W-r,x)),y:Math.max(r,Math.min(MAP_H-r,y))};
}

// ===== RENDER =====
function render(){
  const canvas=document.getElementById('game-canvas');
  const ctx=canvas.getContext('2d');
  const me=players[myId];if(!me)return;

  // Camera follows player
  const camX=Math.max(0,Math.min(MAP_W-canvas.width,me.x-canvas.width/2));
  const camY=Math.max(0,Math.min(MAP_H-canvas.height,me.y-canvas.height/2));

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.translate(-camX,-camY);

  const map=MAPS[selectedMap];

  // Background
  ctx.fillStyle=map.bg;ctx.fillRect(0,0,MAP_W,MAP_H);

  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=1;
  for(let x=0;x<=MAP_W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,MAP_H);ctx.stroke();}
  for(let y=0;y<=MAP_H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(MAP_W,y);ctx.stroke();}

  // Terrains
  if(map.terrains){
    map.terrains.forEach(t=>{
      const tt=TERRAIN[t.type];
      if(!tt||!tt.color)return;
      ctx.fillStyle=tt.color;
      ctx.fillRect(t.x,t.y,t.w,t.h);
      // Labels/icons
      ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='rgba(0,0,0,0.5)';
      const cx=t.x+t.w/2,cy=t.y+t.h/2;
      if(t.type==='SWAMP')ctx.fillText('🌿',cx,cy);
      else if(t.type==='ICE')ctx.fillText('❄️',cx,cy);
      else if(t.type==='BOOST'){
        ctx.fillText('⏩',cx,cy);
        // Arrow direction
        ctx.strokeStyle='rgba(255,200,0,0.8)';ctx.lineWidth=2;
        const dirs={right:[1,0],left:[-1,0],down:[0,1],up:[0,-1]};
        const d=dirs[t.dir]||[1,0];
        ctx.beginPath();ctx.moveTo(cx-d[0]*15,cy-d[1]*15);ctx.lineTo(cx+d[0]*15,cy+d[1]*15);ctx.stroke();
      }
      else if(t.type==='SLOPE_UP')ctx.fillText('⛰️',cx,cy);
      else if(t.type==='SLOPE_DN')ctx.fillText('⬇️',cx,cy);
      else if(t.type==='THORNS')ctx.fillText('🌵',cx,cy);
      else if(t.type==='TELEPORT'){ctx.fillText('🌀',cx,cy);}
      else if(t.type==='SPRING')ctx.fillText('🦘',cx,cy);
    });
  }

  // Tunnel entries/exits
  map.tunnels.forEach(t=>{
    const unlocked=tunnelStates[t.id];
    // Entry
    ctx.fillStyle=unlocked?'rgba(0,200,100,0.5)':'rgba(200,0,0,0.4)';
    ctx.fillRect(t.entry.x,t.entry.y,t.entry.w,t.entry.h);
    ctx.font='18px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(unlocked?'🚪':'🔒',t.entry.x+t.entry.w/2,t.entry.y+t.entry.h/2);
    // Exit
    ctx.fillStyle='rgba(0,200,100,0.4)';
    ctx.fillRect(t.exit.x,t.exit.y,t.exit.w,t.exit.h);
    ctx.fillText('🚪',t.exit.x+t.exit.w/2,t.exit.y+t.exit.h/2);
  });

  // Walls
  ctx.fillStyle=map.wallColor;ctx.shadowColor='rgba(0,0,0,0.2)';ctx.shadowBlur=3;
  map.walls.forEach(w=>ctx.fillRect(w.x,w.y,w.w,w.h));
  ctx.shadowColor='transparent';ctx.shadowBlur=0;

  // Obstacles (player-placed)
  obstacles.forEach(o=>{
    ctx.fillStyle='#8B4513';
    ctx.beginPath();ctx.arc(o.x,o.y,15,0,Math.PI*2);ctx.fill();
    ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🪨',o.x,o.y);
  });

  // Foods (stamina stars)
  foods.forEach(f=>{
    if(!f.active)return;
    ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(f.x,f.y,FOOD_R,0,Math.PI*2);ctx.fill();
    ctx.font=`${FOOD_R}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('⭐',f.x,f.y);
  });

  // Item pickups
  itemPickups.forEach(item=>{
    if(!item.active)return;
    const info=Object.values(ITEM_TYPES).find(t=>t.id===item.type);
    ctx.fillStyle='rgba(255,255,255,0.8)';ctx.beginPath();ctx.arc(item.x,item.y,12,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#FFD700';ctx.lineWidth=2;ctx.stroke();
    ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(info?info.emoji:'?',item.x,item.y);
  });

  // Tunnel keys
  tunnelKeys.forEach(k=>{
    if(!k.active)return;
    ctx.font='18px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🔑',k.x,k.y);
    // Glow
    ctx.strokeStyle='rgba(255,215,0,0.6)';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(k.x,k.y,14,0,Math.PI*2);ctx.stroke();
  });

  // Players
  Object.entries(players).forEach(([id,p])=>{
    if(p.caught&&id!==myId)ctx.globalAlpha=0.3;
    const ch=CHARS[p.charIdx]||CHARS[0];
    const isSpeaking=getPlayerSpeaking(id);
    // Speaking glow
    if(isSpeaking){ctx.fillStyle='rgba(76,175,80,0.25)';ctx.beginPath();ctx.arc(p.x,p.y,PLAYER_R+5,0,Math.PI*2);ctx.fill();}
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.1)';ctx.beginPath();ctx.ellipse(p.x,p.y+PLAYER_R+3,PLAYER_R*0.7,4,0,0,Math.PI*2);ctx.fill();
    // Body
    ctx.fillStyle=ch.color;ctx.beginPath();ctx.arc(p.x,p.y,PLAYER_R,0,Math.PI*2);ctx.fill();
    // Role border
    if(p.role==='catcher'){ctx.strokeStyle='#FF0000';ctx.lineWidth=3;ctx.stroke();}
    else{ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=2;ctx.stroke();}
    // Emoji
    ctx.font=`${PLAYER_R*1.1}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(ch.emoji,p.x,p.y);
    // Name
    ctx.font='bold 10px sans-serif';ctx.fillStyle='#333';ctx.textBaseline='bottom';ctx.fillText(p.nick||'',p.x,p.y-PLAYER_R-5);
    // Role icon
    if(p.role==='catcher'){ctx.font='12px sans-serif';ctx.fillText('👹',p.x,p.y-PLAYER_R-16);}
    // Stamina bar (self only)
    if(id===myId){
      const bw=32,bh=4;
      ctx.fillStyle='#333';ctx.fillRect(p.x-bw/2,p.y+PLAYER_R+8,bw,bh);
      ctx.fillStyle=p.stamina>30?'#4CAF50':'#FF5722';
      ctx.fillRect(p.x-bw/2,p.y+PLAYER_R+8,bw*(p.stamina/STAMINA_MAX),bh);
    }
    // Speed buff indicator
    if(id===myId&&mySpeedBuff>0){ctx.font='10px sans-serif';ctx.fillStyle='#FF8C00';ctx.textBaseline='top';ctx.fillText('⚡加速中',p.x,p.y+PLAYER_R+14);}
    ctx.globalAlpha=1;
  });

  // Border
  ctx.strokeStyle='#333';ctx.lineWidth=4;ctx.strokeRect(0,0,MAP_W,MAP_H);

  ctx.restore();
}

// ===== END GAME =====
function onGameEnd({reason}){endGame(reason);}
function endGame(reason){
  if(gameState!=='playing')return;
  gameState='result';
  if(gameInterval){clearInterval(gameInterval);gameInterval=null;}
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  document.getElementById('item-bar').classList.remove('active');

  const elapsed=GAME_DURATION-timeLeft;
  const me=players[myId];
  let title='',msg='';
  if(reason==='time'){
    // Time up = runners win
    title=me.role==='runner'&&!me.caught?'🎉 胜利！':'😈 时间到！';
    msg=me.role==='runner'&&!me.caught?'你成功逃脱了！':'逃跑者们赢了！';
  } else {
    // All caught = catcher wins
    title=me.role==='catcher'?'🎉 全部抓住！':'😢 被抓了...';
    msg=me.role==='catcher'?'你抓住了所有人！':'抓人者获胜！';
  }
  document.getElementById('result-title').textContent=title;
  document.getElementById('result-msg').textContent=msg;

  const runners=Object.values(players).filter(p=>p.role==='runner');
  const caught=runners.filter(p=>p.caught).length;
  document.getElementById('result-details').innerHTML=`
    <div class="result-stat-row"><span class="result-stat-label">⏱️ 时长</span><span class="result-stat-value">${Math.floor(elapsed/60)}:${String(elapsed%60).padStart(2,'0')}</span></div>
    <div class="result-stat-row"><span class="result-stat-label">🐾 逃跑者</span><span class="result-stat-value">${runners.length}人</span></div>
    <div class="result-stat-row"><span class="result-stat-label">❌ 被抓</span><span class="result-stat-value">${caught}人</span></div>
    <div class="result-stat-row"><span class="result-stat-label">🗺️ 地图</span><span class="result-stat-value">${MAPS[selectedMap].name}</span></div>
  `;
  document.getElementById('result-overlay').classList.add('active');
}

function returnToLobby(){
  document.getElementById('result-overlay').classList.remove('active');
  gameState='lobby';players={};foods=[];obstacles=[];
  showScreen('lobby-screen');
  broadcastPresence();
}
function backToMenu(){
  document.getElementById('result-overlay').classList.remove('active');
  leaveRoom();
}
// ===== 声网语音聊天模块 =====
const AGORA_TOKEN_URL = SUPABASE_URL + '/functions/v1/agora-token';
let voiceEnabled = true;
let agoraClient = null;
let localAudioTrack = null;
let voiceJoined = false;
let voiceMuted = false;
let voiceUid = 0;
let speakingUsers = {};
let voiceUidToPlayerId = {};

function initAgoraClient() {
  if (typeof AgoraRTC === 'undefined') { voiceEnabled = false; return; }
  try {
    agoraClient = AgoraRTC.createClient({ mode: 'rtc', codec: 'vp8' });
    agoraClient.on('user-published', async (user, mediaType) => {
      if (mediaType === 'audio') {
        await agoraClient.subscribe(user, mediaType);
        user.audioTrack.play();
        updateSpeakerUI(user.uid, true);
      }
    });
    agoraClient.on('user-unpublished', (user, mediaType) => {
      if (mediaType === 'audio') updateSpeakerUI(user.uid, false);
    });
    agoraClient.on('user-left', (user) => { delete speakingUsers[user.uid]; renderSpeakers(); });
    agoraClient.enableAudioVolumeIndicator();
    agoraClient.on('volume-indicator', (volumes) => {
      Object.keys(speakingUsers).forEach(uid => { speakingUsers[uid].speaking = false; });
      volumes.forEach(({ uid, level }) => {
        if (level > 5) {
          if (uid === 0) uid = voiceUid;
          if (speakingUsers[uid]) speakingUsers[uid].speaking = true;
        }
      });
      renderSpeakers();
    });
  } catch (e) { voiceEnabled = false; }
}

async function joinVoiceChannel(channelName) {
  if (!voiceEnabled || !agoraClient) return;
  try {
    voiceUid = hashStringToUid(myId);
    const tokenResp = await fetch(AGORA_TOKEN_URL, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ channelName, uid: voiceUid })
    });
    if (!tokenResp.ok) { showVoiceStatus('语音连接失败'); return; }
    const { token, appId } = await tokenResp.json();
    await agoraClient.join(appId, channelName, token, voiceUid);
    localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack({ encoderConfig: 'speech_low_quality' });
    await agoraClient.publish([localAudioTrack]);
    voiceJoined = true; voiceMuted = false;
    speakingUsers[voiceUid] = { nickname: myNick, charIdx: myCharIdx, speaking: false };
    if (channel) channel.send({ type: 'broadcast', event: 'voice-uid', payload: { id: myId, voiceUid, nickname: myNick, charIdx: myCharIdx } });
    document.getElementById('voice-panel').classList.add('active');
    updateMicBtn();
    showVoiceStatus('🎙️ 语音已连接'); setTimeout(hideVoiceStatus, 2000);
    renderSpeakers();
  } catch (err) { showVoiceStatus('语音连接失败'); }
}

async function leaveVoiceChannel() {
  if (!voiceJoined) return;
  try { if (localAudioTrack) { localAudioTrack.close(); localAudioTrack = null; } await agoraClient.leave(); } catch (e) {}
  voiceJoined = false; speakingUsers = {}; voiceUidToPlayerId = {};
  document.getElementById('voice-panel').classList.remove('active');
}

function toggleMic() {
  if (!voiceJoined || !localAudioTrack) return;
  voiceMuted = !voiceMuted;
  localAudioTrack.setEnabled(!voiceMuted);
  updateMicBtn();
  showVoiceStatus(voiceMuted ? '🔇 麦克风已关闭' : '🎤 麦克风已开启');
  setTimeout(hideVoiceStatus, 1500);
}

function updateMicBtn() {
  const btn = document.getElementById('mic-btn');
  btn.textContent = voiceMuted ? '🔇' : '🎤';
  btn.classList.toggle('muted', voiceMuted);
}

function updateSpeakerUI(uid, isPublishing) {
  if (isPublishing && !speakingUsers[uid]) {
    const playerId = voiceUidToPlayerId[uid];
    const pd = playerId ? (lobbyPlayers[playerId] || players[playerId]) : null;
    speakingUsers[uid] = { nickname: pd ? pd.nick || pd.nickname : '玩家', charIdx: pd ? pd.charIdx : 0, speaking: false };
  }
  renderSpeakers();
}

function renderSpeakers() {
  const container = document.getElementById('voice-speakers');
  const entries = Object.entries(speakingUsers);
  container.innerHTML = entries.map(([uid, info]) => {
    const ch = CHARS[info.charIdx] || CHARS[0];
    const cls = info.speaking ? ' speaking' : '';
    const isMe = Number(uid) === voiceUid;
    return `<div class="voice-speaker${cls}"><span class="speaker-dot"></span>${ch.emoji} ${escH(info.nickname)}${isMe ? '(我)' : ''}</div>`;
  }).join('');
}

function showVoiceStatus(msg) { const el = document.getElementById('voice-status'); el.textContent = msg; el.classList.add('active'); }
function hideVoiceStatus() { document.getElementById('voice-status').classList.remove('active'); }
function hashStringToUid(str) { let h = 0; for (let i = 0; i < str.length; i++) { h = ((h << 5) - h) + str.charCodeAt(i); h = h & h; } return Math.abs(h) % 100000000 + 1; }
function onVoiceUid(payload) {
  if (!payload || !payload.id || !payload.voiceUid) return;
  voiceUidToPlayerId[payload.voiceUid] = payload.id;
  if (!speakingUsers[payload.voiceUid]) speakingUsers[payload.voiceUid] = { nickname: payload.nickname, charIdx: payload.charIdx, speaking: false };
  else { speakingUsers[payload.voiceUid].nickname = payload.nickname; speakingUsers[payload.voiceUid].charIdx = payload.charIdx; }
  renderSpeakers();
}
function getPlayerSpeaking(playerId) {
  for (const [vUid, pId] of Object.entries(voiceUidToPlayerId)) {
    if (pId === playerId && speakingUsers[vUid] && speakingUsers[vUid].speaking) return true;
  }
  if (playerId === myId && speakingUsers[voiceUid] && speakingUsers[voiceUid].speaking) return true;
  return false;
}
function isPlayerInVoice(playerId) {
  for (const [vUid, pId] of Object.entries(voiceUidToPlayerId)) { if (pId === playerId) return true; }
  if (playerId === myId && voiceJoined) return true;
  return false;
}

// ===== INIT =====
window.addEventListener('load', () => {
  myId = genId();
  initUI();
  initAgoraClient();
});
</script>
