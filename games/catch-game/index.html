// ===== DRAWING =====
function draw(){
  const canvas=document.getElementById('game-canvas');
  const ctx=canvas.getContext('2d');
  const me=players[myId];if(!me)return;

  // Camera (clamped to map bounds)
  camX=Math.max(0,Math.min(MAP_W-canvas.width,me.x-canvas.width/2));
  camY=Math.max(0,Math.min(MAP_H-canvas.height,me.y-canvas.height/2));
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.translate(-camX,-camY);

  const map=MAPS[selectedMap];

  // Background with grass texture
  drawBackground(ctx,map);

  // Terrains
  drawTerrains(ctx,map);

  // River (with animation)
  drawRiver(ctx,map);

  // Decorations (behind players)
  drawDecorations(ctx,map);

  // Walls (irregular shapes)
  drawWalls(ctx,map);

  // Gates
  drawGates(ctx,map);

  // Portals
  drawPortals(ctx);

  // Chests
  drawChests(ctx,map);

  // Gate switches
  drawGateSwitches(ctx,map);

  // Foods (coins)
  foods.forEach(f=>{
    if(!f.active)return;
    ctx.beginPath();ctx.arc(f.x,f.y,FOOD_R,0,Math.PI*2);
    ctx.fillStyle='#FFD700';ctx.fill();
    ctx.strokeStyle='#B8860B';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#B8860B';ctx.font='8px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('$',f.x,f.y);
  });

  // Items on ground
  itemPickups.forEach(item=>{
    if(!item.active)return;
    ctx.font='18px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(ITEM_TYPES[item.type].emoji,item.x,item.y);
    // Glow
    ctx.beginPath();ctx.arc(item.x,item.y,14,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,0,0.4)';ctx.lineWidth=2;ctx.stroke();
  });

  // Tunnel keys on ground
  tunnelKeys.forEach(k=>{
    if(!k.active)return;
    ctx.font='20px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🔑',k.x,k.y);
    ctx.beginPath();ctx.arc(k.x,k.y,14,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,215,0,0.5)';ctx.lineWidth=2;ctx.stroke();
  });

  // Obstacles
  obstacles.forEach(o=>{
    ctx.beginPath();ctx.arc(o.x,o.y,12,0,Math.PI*2);
    ctx.fillStyle='#795548';ctx.fill();
    ctx.strokeStyle='#4E342E';ctx.lineWidth=2;ctx.stroke();
    // Rock texture
    ctx.beginPath();ctx.arc(o.x-3,o.y-3,4,0,Math.PI*2);
    ctx.fillStyle='#5D4037';ctx.fill();
  });

  // Players
  Object.entries(players).forEach(([id,p])=>{
    // Other players who are invisible: skip rendering
    if(id!==myId&&p._invisible&&!p.caught)return;
    if(p.caught&&!p.isCatcher){
      // Ghost
      ctx.globalAlpha=0.4;
      drawPlayer(ctx,p,id===myId);
      ctx.globalAlpha=1;
    } else if(id===myId&&invisTimer>0){
      // Self invisible: dashed outline, transparent
      ctx.globalAlpha=0.4;
      ctx.setLineDash([6,4]);
      drawPlayer(ctx,p,true);
      ctx.setLineDash([]);
      ctx.globalAlpha=1;
    } else if(p._frozen){
      // Frozen by NPC
      ctx.globalAlpha=0.6;
      drawPlayer(ctx,p,id===myId);
      // Ice effect
      ctx.beginPath();ctx.arc(p.x,p.y,PLAYER_R+6,0,Math.PI*2);
      ctx.strokeStyle='rgba(100,200,255,0.7)';ctx.lineWidth=3;ctx.stroke();
      ctx.globalAlpha=1;
    } else {
      drawPlayer(ctx,p,id===myId);
    }
  });

  // NPCs
  drawNPCs(ctx);

  ctx.restore();

  // River animation
  riverAnimOffset+=0.5;
}

function drawPlayer(ctx,p,isMe){
  const ch=CHARS[p.charIdx];
  const pColor=p.playerColor||(p.isCatcher?CATCHER_COLORS[0]:RUNNER_COLORS[0]);
  // Shadow
  ctx.beginPath();ctx.ellipse(p.x,p.y+PLAYER_R,PLAYER_R*0.8,PLAYER_R*0.3,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fill();
  // Catcher glow
  if(p.isCatcher){
    ctx.beginPath();ctx.arc(p.x,p.y,PLAYER_R+5,0,Math.PI*2);
    ctx.shadowBlur=18;ctx.shadowColor='#FF1744';
    ctx.strokeStyle='rgba(255,23,68,0.7)';ctx.lineWidth=3;ctx.stroke();
    ctx.shadowBlur=0;
  }
  // Body
  ctx.beginPath();ctx.arc(p.x,p.y,PLAYER_R,0,Math.PI*2);
  ctx.fillStyle=pColor;ctx.fill();
  ctx.strokeStyle=p.isCatcher?'#FF1744':'rgba(0,0,0,0.3)';ctx.lineWidth=p.isCatcher?3:2;ctx.stroke();
  // Emoji
  ctx.font='16px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(ch.emoji,p.x,p.y);
  // Name tag with player color background
  const nameW=ctx.measureText(p.nick).width+10;
  ctx.fillStyle=pColor;
  ctx.beginPath();ctx.roundRect(p.x-nameW/2,p.y-PLAYER_R-20,nameW,14,4);ctx.fill();
  ctx.font='bold 9px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='center';
  ctx.fillText(p.nick,p.x,p.y-PLAYER_R-13);
  // Catcher indicator
  if(p.isCatcher){
    ctx.font='12px sans-serif';ctx.fillText('🏷️',p.x,p.y-PLAYER_R-30);
  }
  // Speed boost indicator
  if(p._speedBoost&&p._speedBoost>0){
    ctx.beginPath();ctx.arc(p.x,p.y,PLAYER_R+4,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,200,0,0.6)';ctx.lineWidth=2;ctx.stroke();
  }
}

// ===== DRAW NPCs =====
function drawNPCs(ctx){
  npcs.forEach(npc=>{
    const emoji=npc.type==='beast'?'🐺':'⚔️';
    const color=npc.type==='beast'?'#8B4513':'#4A4A4A';
    // Shadow
    ctx.beginPath();ctx.ellipse(npc.x,npc.y+18,14,5,0,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fill();
    // Body
    ctx.beginPath();ctx.arc(npc.x,npc.y,18,0,Math.PI*2);
    ctx.fillStyle=color;ctx.fill();
    ctx.strokeStyle=npc.state==='chase'?'#FF0000':'#555';
    ctx.lineWidth=npc.state==='chase'?3:2;ctx.stroke();
    // Emoji
    ctx.font='20px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(emoji,npc.x,npc.y);
    // Chase indicator
    if(npc.state==='chase'){
      ctx.font='12px sans-serif';ctx.fillText('❗',npc.x,npc.y-24);
    }
  });
}

// ===== DRAW BACKGROUND =====
function drawBackground(ctx,map){
  ctx.fillStyle=map.bg;ctx.fillRect(0,0,MAP_W,MAP_H);
  // Grass/ground texture
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
  for(let x=0;x<=MAP_W;x+=40){
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,MAP_H);ctx.stroke();
  }
  for(let y=0;y<=MAP_H;y+=40){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(MAP_W,y);ctx.stroke();
  }
  // Random grass tufts (seeded by map index for consistency)
  const seed=selectedMap*1000;
  for(let i=0;i<60;i++){
    const gx=((seed+i*137)%MAP_W);
    const gy=((seed+i*251)%MAP_H);
    ctx.strokeStyle='rgba(0,100,0,0.15)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(gx,gy);ctx.lineTo(gx-3,gy-8);ctx.stroke();
    ctx.beginPath();ctx.moveTo(gx,gy);ctx.lineTo(gx+2,gy-7);ctx.stroke();
    ctx.beginPath();ctx.moveTo(gx,gy);ctx.lineTo(gx+4,gy-5);ctx.stroke();
  }
  // Map border
  ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=4;ctx.strokeRect(0,0,MAP_W,MAP_H);
}

// ===== DRAW TERRAINS =====
function drawTerrains(ctx,map){
  if(!map.terrains)return;
  map.terrains.forEach(t=>{
    const td=TERRAIN[t.type];if(!td)return;
    ctx.fillStyle=td.color;
    // Rounded rect for terrain
    const r=8;
    ctx.beginPath();
    ctx.moveTo(t.x+r,t.y);ctx.lineTo(t.x+t.w-r,t.y);ctx.quadraticCurveTo(t.x+t.w,t.y,t.x+t.w,t.y+r);
    ctx.lineTo(t.x+t.w,t.y+t.h-r);ctx.quadraticCurveTo(t.x+t.w,t.y+t.h,t.x+t.w-r,t.y+t.h);
    ctx.lineTo(t.x+r,t.y+t.h);ctx.quadraticCurveTo(t.x,t.y+t.h,t.x,t.y+t.h-r);
    ctx.lineTo(t.x,t.y+r);ctx.quadraticCurveTo(t.x,t.y,t.x+r,t.y);
    ctx.closePath();ctx.fill();
    // Label
    ctx.font='11px sans-serif';ctx.fillStyle='rgba(0,0,0,0.5)';ctx.textAlign='center';ctx.textBaseline='middle';
    const labels={SWAMP:'沼泽',ICE:'冰面',BOOST:'加速',SLOPE_UP:'上坡',SLOPE_DN:'下坡',THORNS:'荆棘',SPRING:'弹簧'};
    ctx.fillText(labels[t.type]||'',t.x+t.w/2,t.y+t.h/2);
    // Boost arrow
    if(t.type==='BOOST'&&t.dir){
      ctx.font='16px sans-serif';
      const arrows={right:'→',left:'←',up:'↑',down:'↓'};
      ctx.fillText(arrows[t.dir]||'',t.x+t.w/2,t.y+t.h/2+14);
    }
  });
}

// ===== DRAW RIVER =====
function drawRiver(ctx,map){
  if(!map.river)return;
  const r=map.river;
  const hw=r.width/2;
  const bType=map.barrierType||'river';

  // Build path along river with width
  const pts=r.path;
  if(pts.length<2)return;

  // Left bank
  const leftBank=[],rightBank=[];
  for(let i=0;i<pts.length;i++){
    let nx,ny;
    if(i<pts.length-1){nx=pts[i+1].x-pts[i].x;ny=pts[i+1].y-pts[i].y;}
    else{nx=pts[i].x-pts[i-1].x;ny=pts[i].y-pts[i-1].y;}
    const len=Math.sqrt(nx*nx+ny*ny)||1;
    const perpX=-ny/len*hw,perpY=nx/len*hw;
    leftBank.push({x:pts[i].x+perpX,y:pts[i].y+perpY});
    rightBank.push({x:pts[i].x-perpX,y:pts[i].y-perpY});
  }

  ctx.beginPath();
  ctx.moveTo(leftBank[0].x,leftBank[0].y);
  for(let i=1;i<leftBank.length;i++){ctx.lineTo(leftBank[i].x,leftBank[i].y);}
  for(let i=rightBank.length-1;i>=0;i--){ctx.lineTo(rightBank[i].x,rightBank[i].y);}
  ctx.closePath();

  if(bType==='wall'){
    // 城墙/护城河 - dark gray stone wall texture
    ctx.fillStyle='#4A4A4A';ctx.globalAlpha=0.85;ctx.fill();ctx.globalAlpha=1;
    // Stone brick pattern
    ctx.strokeStyle='rgba(30,30,30,0.5)';ctx.lineWidth=1.5;
    for(let i=0;i<pts.length-1;i++){
      const a=pts[i],b=pts[i+1];
      const steps=Math.floor(Math.hypot(b.x-a.x,b.y-a.y)/25);
      for(let s=0;s<steps;s++){
        const t=s/steps;
        const cx=a.x+t*(b.x-a.x),cy=a.y+t*(b.y-a.y);
        // Draw brick lines
        ctx.beginPath();
        ctx.rect(cx-hw*0.6+((s%2)*12),cy-8,hw*1.0,14);
        ctx.stroke();
      }
    }
    // Top edge crenellations
    ctx.fillStyle='#3A3A3A';
    for(let i=0;i<leftBank.length-1;i++){
      const lx=leftBank[i].x,ly=leftBank[i].y;
      if(i%2===0){ctx.fillRect(lx-5,ly-5,10,10);}
    }
  } else if(bType==='lava'){
    // 燕尾池/燕尾沟 - orange-red lava
    ctx.fillStyle='#D84315';ctx.globalAlpha=0.8;ctx.fill();ctx.globalAlpha=1;
    // Lava glow effect
    ctx.strokeStyle='rgba(255,152,0,0.6)';ctx.lineWidth=3;ctx.stroke();
    // Bubbling animation
    ctx.fillStyle='rgba(255,87,34,0.7)';
    for(let i=0;i<pts.length-1;i++){
      const mx=(pts[i].x+pts[i+1].x)/2;
      const my=(pts[i].y+pts[i+1].y)/2;
      const offset=Math.sin(riverAnimOffset*0.06+i*2.5)*6;
      const r2=3+Math.sin(riverAnimOffset*0.08+i)*2;
      ctx.beginPath();ctx.arc(mx+offset,my+offset*0.5,r2,0,Math.PI*2);ctx.fill();
    }
    // Bright streaks
    ctx.strokeStyle='rgba(255,235,59,0.4)';ctx.lineWidth=1.5;
    for(let i=0;i<pts.length-1;i++){
      const mx=(pts[i].x+pts[i+1].x)/2;
      const my=(pts[i].y+pts[i+1].y)/2;
      const offset=Math.cos(riverAnimOffset*0.04+i*3)*8;
      ctx.beginPath();ctx.moveTo(mx-8+offset,my);ctx.lineTo(mx+8+offset,my);ctx.stroke();
    }
  } else {
    // Default river - blue water
    ctx.fillStyle=r.color;ctx.globalAlpha=0.7;ctx.fill();ctx.globalAlpha=1;
    // Water ripple animation
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1.5;
    for(let i=0;i<pts.length-1;i++){
      const mx=(pts[i].x+pts[i+1].x)/2;
      const my=(pts[i].y+pts[i+1].y)/2;
      const offset=Math.sin(riverAnimOffset*0.05+i*2)*5;
      ctx.beginPath();ctx.moveTo(mx-10+offset,my);ctx.lineTo(mx+10+offset,my);ctx.stroke();
    }
    // More ripples
    for(let i=0;i<pts.length-1;i++){
      const mx=(pts[i].x+pts[i+1].x)/2;
      const my=(pts[i].y+pts[i+1].y)/2;
      const offset=Math.cos(riverAnimOffset*0.04+i*3)*7;
      ctx.beginPath();ctx.arc(mx+offset,my+8,3,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.stroke();
    }
  }

  // Draw bridges
  if(r.bridges){
    r.bridges.forEach((br,brIdx)=>{
      // Check if bridge is blocked
      let bridgeBlocked=false;
      if(map.gates){
        for(const g of map.gates){
          if(g.type==='bridge-block'&&g.bridgeIdx===brIdx&&gateStates[g.id]){
            bridgeBlocked=true;break;
          }
        }
      }

      if(bType==='wall'){
        // City gate style bridge
        ctx.fillStyle='#8D6E63';
        ctx.fillRect(br.x,br.y,br.w,br.h);
        // Gate arch pattern
        ctx.strokeStyle='#5D4037';ctx.lineWidth=2;
        ctx.beginPath();
        ctx.arc(br.x+br.w/2,br.y+br.h*0.3,br.w*0.35,Math.PI,0);
        ctx.stroke();
        // Portcullis lines
        ctx.strokeStyle='#4E342E';ctx.lineWidth=1;
        for(let i=br.x+10;i<br.x+br.w;i+=12){
          ctx.beginPath();ctx.moveTo(i,br.y);ctx.lineTo(i,br.y+br.h);ctx.stroke();
        }
        ctx.fillStyle='#6D4C41';
        ctx.fillRect(br.x,br.y,br.w,4);
        ctx.fillRect(br.x,br.y+br.h-4,br.w,4);
      } else if(bType==='lava'){
        // Stone bridge over lava
        ctx.fillStyle='#757575';
        ctx.fillRect(br.x,br.y,br.w,br.h);
        // Stone texture
        ctx.strokeStyle='#424242';ctx.lineWidth=1.5;
        for(let i=br.x+12;i<br.x+br.w;i+=15){
          ctx.beginPath();ctx.moveTo(i,br.y);ctx.lineTo(i,br.y+br.h);ctx.stroke();
        }
        // Edge stones
        ctx.fillStyle='#616161';
        ctx.fillRect(br.x,br.y,br.w,5);
        ctx.fillRect(br.x,br.y+br.h-5,br.w,5);
      } else {
        // Wooden bridge (default)
        ctx.fillStyle='#8D6E63';
        ctx.fillRect(br.x,br.y,br.w,br.h);
        // Planks
        ctx.strokeStyle='#5D4037';ctx.lineWidth=1;
        for(let i=0;i<br.w;i+=8){
          ctx.beginPath();ctx.moveTo(br.x+i,br.y);ctx.lineTo(br.x+i,br.y+br.h);ctx.stroke();
        }
        // Rails
        ctx.fillStyle='#4E342E';
        ctx.fillRect(br.x,br.y,br.w,3);
        ctx.fillRect(br.x,br.y+br.h-3,br.w,3);
      }

      // If bridge is blocked, draw a subtle warning tint (wall is drawn by drawGates)
      if(bridgeBlocked){
        ctx.fillStyle='rgba(183,28,28,0.15)';
        ctx.fillRect(br.x,br.y,br.w,br.h);
      }
    });
  }
}


// ===== DRAW WALLS (irregular polygons) =====
function drawWalls(ctx,map){
  map.walls.forEach(w=>{
    if(w.shape==='poly'&&w.pts&&w.pts.length>2){
      ctx.beginPath();
      ctx.moveTo(w.pts[0].x,w.pts[0].y);
      for(let i=1;i<w.pts.length;i++){ctx.lineTo(w.pts[i].x,w.pts[i].y);}
      ctx.closePath();
      ctx.fillStyle=map.wallColor;ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=2;ctx.stroke();
      // Texture lines
      ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=1;
      const cx=w.x+w.w/2,cy=w.y+w.h/2;
      for(let i=0;i<3;i++){
        ctx.beginPath();
        ctx.moveTo(cx-15+i*12,cy-10);ctx.lineTo(cx-10+i*12,cy+10);
        ctx.stroke();
      }
    } else {
      // Fallback rect
      ctx.fillStyle=map.wallColor;
      ctx.fillRect(w.x,w.y,w.w,w.h);
      ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=2;
      ctx.strokeRect(w.x,w.y,w.w,w.h);
    }
  });
}

// ===== DRAW GATES =====
function drawGates(ctx,map){
  if(!map.gates)return;
  map.gates.forEach(g=>{
    const active=gateStates[g.id];
    if(g.type==='barrier'){
      // Barrier: visible only when active
      if(active){
        ctx.fillStyle=g.color||'#556B2F';
        ctx.globalAlpha=0.85;
        ctx.fillRect(g.x,g.y,g.w,g.h);
        // Stone texture
        ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=2;
        for(let i=g.x+15;i<g.x+g.w;i+=20){ctx.beginPath();ctx.moveTo(i,g.y);ctx.lineTo(i,g.y+g.h);ctx.stroke();}
        for(let i=g.y+15;i<g.y+g.h;i+=20){ctx.beginPath();ctx.moveTo(g.x,i);ctx.lineTo(g.x+g.w,i);ctx.stroke();}
        ctx.font='18px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('🧱',g.x+g.w/2,g.y+g.h/2);
        ctx.globalAlpha=1;
      }
    } else if(g.type==='bridge-block'){
      // Bridge-block: when active, draw a solid brick wall at blockWall position
      if(active&&g.blockWall){
        const bw=g.blockWall;
        ctx.fillStyle='#5D1A1A';
        ctx.fillRect(bw.x,bw.y,bw.w,bw.h);
        // Brick texture
        ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=1;
        const brickH=10,brickW=20;
        for(let row=bw.y;row<bw.y+bw.h;row+=brickH){
          const offset=(Math.floor((row-bw.y)/brickH)%2)*brickW/2;
          for(let col=bw.x-offset;col<bw.x+bw.w;col+=brickW){
            ctx.strokeRect(col,row,brickW,brickH);
          }
        }
        ctx.globalAlpha=1;
      }
    } else {
      // Normal gate
      if(!active){
        ctx.fillStyle=g.color||'#8B0000';
        ctx.fillRect(g.x,g.y,g.w,g.h);
        ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;
        if(g.w>g.h){
          for(let i=g.x+8;i<g.x+g.w;i+=10){ctx.beginPath();ctx.moveTo(i,g.y);ctx.lineTo(i,g.y+g.h);ctx.stroke();}
        } else {
          for(let i=g.y+8;i<g.y+g.h;i+=10){ctx.beginPath();ctx.moveTo(g.x,i);ctx.lineTo(g.x+g.w,i);ctx.stroke();}
        }
        ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('🚧',g.x+g.w/2,g.y+g.h/2);
      } else {
        ctx.strokeStyle='rgba(100,100,100,0.3)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
        ctx.strokeRect(g.x,g.y,g.w,g.h);
        ctx.setLineDash([]);
      }
    }
  });
}

// ===== DRAW GATE SWITCHES =====
function drawGateSwitches(ctx,map){
  if(!map.gates)return;
  map.gates.forEach(g=>{
    const open=gateStates[g.id];
    const sx=g.switchPos.x,sy=g.switchPos.y;
    // Pressure plate
    ctx.beginPath();ctx.arc(sx,sy,14,0,Math.PI*2);
    if(g.type==='bridge-block'){
      ctx.fillStyle=open?'rgba(183,28,28,0.6)':'rgba(100,100,200,0.4)';ctx.fill();
      ctx.strokeStyle='#B71C1C';ctx.lineWidth=2;ctx.stroke();
      ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(open?'🔒':'🔓',sx,sy);
    } else {
      ctx.fillStyle=open?'rgba(0,200,0,0.5)':'rgba(200,0,0,0.4)';ctx.fill();
      ctx.strokeStyle=g.color||'#333';ctx.lineWidth=2;ctx.stroke();
      ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(open?'🟢':'🔴',sx,sy);
    }
  });
}

// ===== DRAW PORTALS =====
function drawPortals(ctx){
  if(!portals||portals.length===0)return;
  const colors=['#9C27B0','#00BCD4','#FF9800'];
  portals.forEach((p,i)=>{
    const cx=p.x,cy=p.y;
    // Outer glow
    const grad=ctx.createRadialGradient(cx,cy,5,cx,cy,30);
    grad.addColorStop(0,colors[i%3]);
    grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(cx,cy,30,0,Math.PI*2);ctx.fill();
    // Swirl effect
    ctx.beginPath();
    for(let a=0;a<Math.PI*4;a+=0.2){
      const r2=5+a*3;
      const px=cx+Math.cos(a+frameCount*0.06)*r2;
      const py=cy+Math.sin(a+frameCount*0.06)*r2;
      if(a===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
    }
    ctx.strokeStyle=colors[i%3];ctx.lineWidth=2;ctx.globalAlpha=0.7;ctx.stroke();
    ctx.globalAlpha=1;
    // Center icon
    ctx.font='22px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🌀',cx,cy);
  });
}

// ===== DRAW CHESTS =====
function drawChests(ctx,map){
  if(!activeChests||activeChests.length===0)return;
  activeChests.forEach(ch=>{
    const state=chestStates[ch.id];
    const opened=state&&state.items&&state.items.length===0;
    const cx=ch.x,cy=ch.y;
    if(!opened){
      // Closed chest - wooden box
      ctx.fillStyle='#8B4513';
      ctx.fillRect(cx-18,cy-14,36,28);
      // Lid
      ctx.fillStyle='#A0522D';
      ctx.fillRect(cx-20,cy-18,40,10);
      // Metal band
      ctx.fillStyle='#FFD700';
      ctx.fillRect(cx-2,cy-18,4,28);
      // Lock
      ctx.beginPath();ctx.arc(cx,cy+2,5,0,Math.PI*2);
      ctx.fillStyle='#FFD700';ctx.fill();
      ctx.strokeStyle='#B8860B';ctx.lineWidth=1;ctx.stroke();
      // Sparkle
      if(frameCount%60<30){
        ctx.font='10px sans-serif';ctx.textAlign='center';
        ctx.fillText('✨',cx+15,cy-15);
      }
    } else {
      // Open empty chest
      ctx.fillStyle='#6B3A0A';
      ctx.fillRect(cx-18,cy-8,36,22);
      // Open lid (tilted)
      ctx.fillStyle='#8B4513';
      ctx.fillRect(cx-20,cy-22,40,8);
      ctx.globalAlpha=0.5;
      ctx.fillStyle='#333';
      ctx.font='12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('空',cx,cy+4);
      ctx.globalAlpha=1;
    }
  });
}

// ===== DRAW DECORATIONS =====
function drawDecorations(ctx,map){
  if(!map.decorations)return;
  map.decorations.forEach(d=>{
    switch(d.type){
      case 'tree':
        // Trunk
        ctx.fillStyle='#5D4037';ctx.fillRect(d.x-4,d.y,8,20);
        // Canopy (circle)
        ctx.beginPath();ctx.arc(d.x,d.y-5,18,0,Math.PI*2);
        ctx.fillStyle='#2E7D32';ctx.fill();
        ctx.beginPath();ctx.arc(d.x-6,d.y-8,12,0,Math.PI*2);
        ctx.fillStyle='#388E3C';ctx.fill();
        ctx.beginPath();ctx.arc(d.x+7,d.y-3,10,0,Math.PI*2);
        ctx.fillStyle='#43A047';ctx.fill();
        break;
      case 'bush':
        ctx.beginPath();ctx.arc(d.x,d.y,12,0,Math.PI*2);
        ctx.fillStyle='#4CAF50';ctx.fill();
        ctx.beginPath();ctx.arc(d.x+8,d.y+3,9,0,Math.PI*2);
        ctx.fillStyle='#66BB6A';ctx.fill();
        break;
      case 'flower':
        ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(['🌸','🌼','🌺'][Math.floor(d.x)%3],d.x,d.y);
        break;
      case 'rock':
        ctx.beginPath();ctx.ellipse(d.x,d.y,14,10,0,0,Math.PI*2);
        ctx.fillStyle='#757575';ctx.fill();
        ctx.strokeStyle='#616161';ctx.lineWidth=1;ctx.stroke();
        break;
      case 'lamp':
        ctx.fillStyle='#333';ctx.fillRect(d.x-2,d.y,4,25);
        ctx.beginPath();ctx.arc(d.x,d.y,6,0,Math.PI*2);
        ctx.fillStyle='#FFF9C4';ctx.fill();
        ctx.strokeStyle='#F9A825';ctx.lineWidth=1;ctx.stroke();
        break;
      case 'barrel':
        ctx.fillStyle='#6D4C41';ctx.fillRect(d.x-8,d.y-10,16,20);
        ctx.strokeStyle='#4E342E';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(d.x-9,d.y-5);ctx.lineTo(d.x+9,d.y-5);ctx.stroke();
        ctx.beginPath();ctx.moveTo(d.x-9,d.y+5);ctx.lineTo(d.x+9,d.y+5);ctx.stroke();
        break;
      case 'torch':
        ctx.fillStyle='#5D4037';ctx.fillRect(d.x-2,d.y,4,18);
        ctx.beginPath();ctx.arc(d.x,d.y-2,5,0,Math.PI*2);
        ctx.fillStyle=frameCount%40<20?'#FF6F00':'#FF8F00';ctx.fill();
        break;
      case 'skull':
        ctx.font='16px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('💀',d.x,d.y);
        break;
      case 'moss':
        ctx.beginPath();ctx.ellipse(d.x,d.y,10,6,0.3,0,Math.PI*2);
        ctx.fillStyle='rgba(76,175,80,0.4)';ctx.fill();
        break;
    }
  });
}


// ===== VOICE CHAT (Agora) =====
const AGORA_TOKEN_URL=SUPABASE_URL+'/functions/v1/agora-token';
let voiceEnabled=true,agoraClient=null,localAudioTrack=null;
let voiceJoined=false,voiceMuted=false,voiceUid=0;
let speakingUsers={},voiceUidToPlayerId={};

function initAgoraClient(){
  if(typeof AgoraRTC==='undefined'){voiceEnabled=false;return;}
  try{
    agoraClient=AgoraRTC.createClient({mode:'rtc',codec:'vp8'});
    agoraClient.on('user-published',async(user,mediaType)=>{
      if(mediaType==='audio'){await agoraClient.subscribe(user,mediaType);user.audioTrack.play();speakingUsers[user.uid]={speaking:false};}
    });
    agoraClient.on('user-unpublished',(user,mediaType)=>{if(mediaType==='audio')delete speakingUsers[user.uid];});
    agoraClient.on('user-left',(user)=>{delete speakingUsers[user.uid];});
    agoraClient.enableAudioVolumeIndicator();
    agoraClient.on('volume-indicator',(volumes)=>{
      Object.keys(speakingUsers).forEach(uid=>{speakingUsers[uid].speaking=false;});
      volumes.forEach(({uid,level})=>{
        if(level>5){
          const realUid=uid===0?voiceUid:uid;
          if(speakingUsers[realUid])speakingUsers[realUid].speaking=true;
        }
      });
    });
  }catch(e){voiceEnabled=false;}
}

async function joinVoice(){
  if(!voiceEnabled||!agoraClient||!roomCode)return;
  try{
    voiceUid=hashUid(myId);
    const resp=await fetch(AGORA_TOKEN_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({channelName:'catch-'+roomCode,uid:voiceUid})});
    if(!resp.ok)return;
    const{token,appId}=await resp.json();
    await agoraClient.join(appId,'catch-'+roomCode,token,voiceUid);
    localAudioTrack=await AgoraRTC.createMicrophoneAudioTrack({encoderConfig:'speech_low_quality'});
    await agoraClient.publish([localAudioTrack]);
    voiceJoined=true;voiceMuted=false;
    speakingUsers[voiceUid]={speaking:false};
    document.getElementById('voice-panel').classList.add('active');
    updateMicBtn();
  }catch(e){console.log('Voice join failed',e);}
}

async function leaveVoice(){
  if(!voiceJoined)return;
  try{if(localAudioTrack){localAudioTrack.close();localAudioTrack=null;}await agoraClient.leave();}catch(e){}
  voiceJoined=false;speakingUsers={};
  document.getElementById('voice-panel').classList.remove('active');
}

function toggleMic(){
  if(!voiceJoined||!localAudioTrack)return;
  voiceMuted=!voiceMuted;
  localAudioTrack.setEnabled(!voiceMuted);
  updateMicBtn();
}
function updateMicBtn(){
  const btn=document.getElementById('mic-btn');
  btn.textContent=voiceMuted?'🔇':'🎤';
  btn.classList.toggle('muted',voiceMuted);
}
function hashUid(str){let h=0;for(let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h=h&h;}return Math.abs(h)%100000000+1;}

// ===== INIT =====
window.addEventListener('load',async()=>{
  myId=genId();
  initUI();
  initAgoraClient();
  // 预填网站注册用户名（监听 auth 状态，session 恢复后立即填入）
  sb.auth.onAuthStateChange(async(event, session)=>{
    if(session?.user){
      try{
        const {data:profile}=await sb.from('profiles').select('username').eq('id',session.user.id).single();
        const uname=profile?.username||session.user.email?.split('@')[0]||'';
        if(uname){
          const cn=document.getElementById('create-nick');
          const jn=document.getElementById('join-nick');
          if(cn&&!cn.value)cn.value=uname;
          if(jn&&!jn.value)jn.value=uname;
          myNick=uname;
        }
      }catch(e){console.warn('prefill nick error',e);}
    }
  });
});
