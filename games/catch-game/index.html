<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>抓人大作战 - 小菜鸟</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<!-- 声网 Web SDK (国内 CDN) -->
<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Comic Sans MS', 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #FFE066 0%, #FF6B6B 50%, #4ECDC4 100%);
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  overflow: hidden; touch-action: none;
}
.screen { display:none; flex-direction:column; align-items:center; justify-content:center; width:100%; height:100vh; position:absolute; top:0; left:0; }
.screen.active { display:flex; }
.title { font-size:2.6em; color:#fff; text-shadow:3px 3px 0 #FF6B6B,6px 6px 0 rgba(0,0,0,0.1); margin-bottom:12px; animation:bounce 1s ease infinite alternate; }
@keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-8px)} }
.subtitle { font-size:1.1em; color:#fff; margin-bottom:20px; opacity:0.9; }
.btn { padding:12px 32px; font-size:1.15em; border:none; border-radius:50px; cursor:pointer; margin:5px; font-weight:bold; transition:transform 0.2s,box-shadow 0.2s; box-shadow:0 4px 15px rgba(0,0,0,0.2); }
.btn:hover { transform:scale(1.05); }
.btn:active { transform:scale(0.95); }
.btn-primary { background:#FF6B6B; color:#fff; }
.btn-secondary { background:#4ECDC4; color:#fff; }
.btn-start { background:#FFE066; color:#333; }
.btn-small { padding:8px 18px; font-size:0.95em; }
.btn-danger { background:#e74c3c; color:#fff; }
.btn-gray { background:#bbb; color:#fff; }
.input-field { padding:12px 18px; font-size:1.15em; border:3px solid #fff; border-radius:50px; background:rgba(255,255,255,0.9); text-align:center; width:200px; margin:8px; outline:none; }
.input-field:focus { border-color:#FF6B6B; }
.panel { background:rgba(255,255,255,0.97); border-radius:20px; padding:22px; min-width:320px; max-width:92vw; max-height:85vh; overflow-y:auto; box-shadow:0 10px 40px rgba(0,0,0,0.2); }
.panel-title { font-size:1.5em; color:#333; margin-bottom:8px; text-align:center; }
.room-code-display { font-size:2.2em; color:#FF6B6B; font-weight:bold; letter-spacing:6px; text-align:center; margin:6px 0; }
.player-list { list-style:none; margin:8px 0; max-height:170px; overflow-y:auto; }
.player-list li { padding:7px 12px; margin:3px 0; background:#f0f0f0; border-radius:10px; display:flex; align-items:center; gap:8px; font-size:0.95em; }
.player-list li .dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; }
.player-count { color:#666; font-size:0.85em; margin-bottom:6px; text-align:center; }
.char-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:7px; margin:8px auto; max-width:280px; }
.char-option { width:42px; height:42px; border-radius:50%; border:3px solid transparent; cursor:pointer; transition:transform 0.2s; display:flex; align-items:center; justify-content:center; }
.char-option:hover { transform:scale(1.1); }
.char-option.selected { border-color:#FF6B6B; transform:scale(1.15); }
.room-list { list-style:none; margin:8px 0; max-height:240px; overflow-y:auto; }
.room-card { padding:12px 14px; margin:6px 0; background:#f8f8f8; border-radius:12px; display:flex; align-items:center; justify-content:space-between; border:2px solid #eee; transition:border-color 0.2s; }
.room-card:hover { border-color:#4ECDC4; }
.room-info { display:flex; flex-direction:column; gap:2px; }
.room-name-text { font-weight:bold; color:#333; font-size:1em; }
.room-meta { font-size:0.78em; color:#888; }
.form-row { display:flex; align-items:center; gap:10px; margin:8px 0; flex-wrap:wrap; justify-content:center; }
.form-label { font-size:0.88em; color:#555; min-width:55px; }
.toggle-group { display:flex; gap:5px; }
.toggle-btn { padding:7px 14px; border-radius:18px; border:2px solid #ddd; background:#fff; cursor:pointer; font-size:0.88em; transition:all 0.2s; }
.toggle-btn.active { background:#4ECDC4; color:#fff; border-color:#4ECDC4; }
#game-hud { position:fixed; top:8px; left:8px; right:8px; display:flex; justify-content:space-between; align-items:center; z-index:100; pointer-events:none; }
.hud-item { background:rgba(255,255,255,0.9); padding:5px 11px; border-radius:18px; font-size:0.9em; font-weight:bold; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
.hud-timer { color:#FF6B6B; font-size:1.15em; }
.hud-role { color:#4ECDC4; }
.hud-stamina { color:#FFB347; }
#game-canvas { display:block; background:#8BC34A; touch-action:none; }
#joystick-area { position:fixed; bottom:25px; left:25px; width:125px; height:125px; z-index:200; display:none; }
#joystick-base { width:125px; height:125px; border-radius:50%; background:rgba(255,255,255,0.3); border:3px solid rgba(255,255,255,0.5); position:relative; }
#joystick-knob { width:52px; height:52px; border-radius:50%; background:rgba(255,255,255,0.7); position:absolute; top:36px; left:36px; }
.result-box { background:rgba(255,255,255,0.97); border-radius:20px; padding:30px; text-align:center; box-shadow:0 10px 40px rgba(0,0,0,0.2); }
.result-title { font-size:2em; margin-bottom:8px; }
.result-msg { font-size:1.1em; color:#666; margin-bottom:18px; }
#spectator-banner { display:none; position:fixed; bottom:70px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.7); color:#fff; padding:8px 22px; border-radius:18px; font-size:1em; z-index:150; }
.empty-msg { text-align:center; color:#999; padding:25px; font-size:0.95em; }
/* Vote modal */
.modal-overlay { display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.5); z-index:500; align-items:center; justify-content:center; }
.modal-overlay.active { display:flex; }
.modal-box { background:#fff; border-radius:18px; padding:25px; text-align:center; max-width:300px; box-shadow:0 10px 30px rgba(0,0,0,0.3); }
.modal-box p { margin-bottom:15px; font-size:1.1em; color:#333; }
.kick-btn { background:none; border:none; cursor:pointer; font-size:0.8em; color:#e74c3c; margin-left:auto; padding:2px 8px; border-radius:8px; }
.kick-btn:hover { background:#fdd; }

/* 结算弹窗动画 */
#result-overlay .modal-box {
  animation: resultPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes resultPop {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.result-stat-row { display:flex; justify-content:space-between; align-items:center; padding:2px 0; border-bottom:1px solid #eee; }
.result-stat-row:last-child { border-bottom:none; }
.result-stat-label { color:#888; }
.result-stat-value { font-weight:bold; color:#333; }

/* ===== 语音聊天 UI ===== */
#voice-panel {
  position: fixed;
  bottom: 12px;
  right: 12px;
  z-index: 300;
  display: none;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
}
#voice-panel.active { display: flex; }
#mic-btn {
  width: 52px; height: 52px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.92);
  box-shadow: 0 3px 12px rgba(0,0,0,0.2);
  font-size: 1.6em;
  cursor: pointer;
  transition: transform 0.2s, background 0.2s;
  display: flex; align-items: center; justify-content: center;
  pointer-events: auto;
}
#mic-btn:hover { transform: scale(1.1); }
#mic-btn.muted { background: rgba(255,80,80,0.9); }
#mic-btn.muted::after { content: ''; position: absolute; width: 3px; height: 28px; background: #fff; border-radius: 2px; transform: rotate(45deg); }
#voice-speakers {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  max-height: 200px;
  overflow-y: auto;
}
.voice-speaker {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,255,255,0.9);
  padding: 4px 10px;
  border-radius: 14px;
  font-size: 0.8em;
  font-weight: bold;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  transition: all 0.3s;
}
.voice-speaker.speaking {
  background: rgba(76, 175, 80, 0.9);
  color: #fff;
  box-shadow: 0 0 12px rgba(76, 175, 80, 0.5);
}
.voice-speaker .speaker-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #ccc;
}
.voice-speaker.speaking .speaker-dot {
  background: #fff;
  animation: pulse-dot 0.6s ease infinite alternate;
}
@keyframes pulse-dot { from { transform: scale(1); } to { transform: scale(1.4); } }
#voice-status {
  font-size: 0.72em;
  color: rgba(255,255,255,0.8);
  background: rgba(0,0,0,0.4);
  padding: 3px 8px;
  border-radius: 8px;
  display: none;
}
#voice-status.active { display: block; }
/* 游戏中玩家头像说话高亮 - 通过 canvas 绘制 */
</style>
</head>
<body>

<!-- Menu -->
<div id="menu-screen" class="screen active">
  <div class="title">🏃 抓人大作战</div>
  <div class="subtitle">和朋友一起玩抓人游戏！</div>
  <input id="nickname-input" class="input-field" placeholder="输入昵称" maxlength="8">
  <button class="btn btn-primary" onclick="showCreateRoom()">🏠 创建房间</button>
  <button class="btn btn-secondary" onclick="showHall()">🌐 公开大厅</button>
  <button class="btn btn-secondary" onclick="showJoinByCode()">🔑 输入房间号</button>
</div>

<!-- Create Room -->
<div id="create-screen" class="screen">
  <div class="panel">
    <div class="panel-title">🏠 创建房间</div>
    <div class="form-row">
      <span class="form-label">房间名：</span>
      <input id="room-name-input" class="input-field" placeholder="给房间起个名" maxlength="12" style="width:170px;">
    </div>
    <div class="form-row">
      <span class="form-label">类型：</span>
      <div class="toggle-group">
        <div class="toggle-btn active" id="toggle-public" onclick="setRoomType('public')">🌐 公开</div>
        <div class="toggle-btn" id="toggle-private" onclick="setRoomType('private')">🔒 私密</div>
      </div>
    </div>
    <div style="text-align:center;margin-top:12px;">
      <button class="btn btn-primary" onclick="doCreateRoom()">✅ 创建</button>
      <button class="btn btn-small btn-gray" onclick="showScreen('menu-screen')">返回</button>
    </div>
  </div>
</div>

<!-- Hall -->
<div id="hall-screen" class="screen">
  <div class="panel" style="min-width:340px;">
    <div class="panel-title">🌐 公开大厅</div>
    <div style="text-align:center;margin-bottom:10px;">
      <button class="btn btn-small btn-primary" onclick="randomJoin()">🎲 随机加入</button>
      <button class="btn btn-small btn-secondary" onclick="refreshHall()">🔄 刷新</button>
      <button class="btn btn-small btn-gray" onclick="showScreen('menu-screen')">返回</button>
    </div>
    <ul class="room-list" id="hall-room-list">
      <div class="empty-msg">正在加载...</div>
    </ul>
  </div>
</div>

<!-- Join by Code -->
<div id="join-screen" class="screen">
  <div class="panel" style="text-align:center;">
    <div class="panel-title">🔑 输入房间号</div>
    <input id="room-code-input" class="input-field" placeholder="4位房间号" maxlength="4" style="width:150px;">
    <div style="margin-top:12px;">
      <button class="btn btn-primary" onclick="joinByCode()">加入</button>
      <button class="btn btn-small btn-gray" onclick="showScreen('menu-screen')">返回</button>
    </div>
  </div>
</div>

<!-- Lobby -->
<div id="lobby-screen" class="screen">
  <div class="panel">
    <div class="panel-title" id="lobby-room-name">🎮 游戏房间</div>
    <div class="room-code-display" id="lobby-room-code">----</div>
    <div class="player-count" id="lobby-player-count">等待玩家加入...</div>
    <div style="font-size:0.82em;color:#999;text-align:center;margin-bottom:6px;">选择角色：</div>
    <div class="char-grid" id="char-grid"></div>
    <ul class="player-list" id="player-list"></ul>
    <div id="lobby-host-controls" style="display:none;text-align:center;margin-top:8px;">
      <div style="margin-bottom:5px;font-size:0.82em;color:#666;">队长选择地图：</div>
      <select id="map-select" style="padding:7px 14px;border-radius:10px;border:2px solid #ddd;font-size:1em;margin-bottom:8px;">
        <option value="0">🌿 草地</option>
        <option value="1">🏘️ 城镇</option>
        <option value="2">🧱 迷宫</option>
      </select>
      <br>
      <button class="btn btn-start" onclick="forceStart()">🚀 强制开始</button>
      <div style="font-size:0.72em;color:#999;margin-top:3px;">队长可强制开始（需2-10人）</div>
    </div>
    <div style="text-align:center;margin-top:8px;">
      <button class="btn btn-small btn-primary" onclick="proposeStart()">✋ 提议开始</button>
      <button class="btn btn-small btn-gray" onclick="leaveRoom()">退出房间</button>
    </div>
    <div id="lobby-wait-msg" style="text-align:center;margin-top:6px;color:#666;font-size:0.85em;"></div>
  </div>
</div>

<!-- Vote Modal -->
<div class="modal-overlay" id="vote-modal">
  <div class="modal-box">
    <p id="vote-msg">XXX 提议开始游戏</p>
    <button class="btn btn-small btn-primary" onclick="voteAgree()">✅ 同意</button>
    <button class="btn btn-small btn-gray" onclick="voteWait()">⏳ 继续等待</button>
  </div>
</div>

<!-- Game -->
<div id="game-screen" class="screen">
  <div id="game-hud">
    <div class="hud-item hud-role" id="hud-role">逃跑者</div>
    <div class="hud-item hud-timer" id="hud-timer">3:00</div>
    <div class="hud-item hud-stamina" id="hud-stamina">⚡ 100</div>
  </div>
  <canvas id="game-canvas"></canvas>
  <div id="joystick-area"><div id="joystick-base"><div id="joystick-knob"></div></div></div>
  <div id="spectator-banner">👻 你已被抓！观战中...</div>
</div>

<!-- Result Overlay (游戏结束弹窗，不切换screen) -->
<div class="modal-overlay" id="result-overlay">
  <div class="modal-box" style="max-width:360px;padding:30px 28px;">
    <div id="result-title" style="font-size:2em;margin-bottom:6px;">🎉</div>
    <div id="result-msg" style="font-size:1.05em;color:#555;margin-bottom:14px;"></div>
    <!-- 结算详情 -->
    <div id="result-details" style="background:#f8f8f8;border-radius:12px;padding:12px 14px;margin-bottom:16px;text-align:left;font-size:0.9em;line-height:1.8;"></div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-secondary btn-small" onclick="returnToLobby()">🏠 回到房间</button>
      <button class="btn btn-danger btn-small" onclick="leaveRoomFromResult()">🚪 退出房间</button>
    </div>
    <div style="font-size:0.75em;color:#aaa;margin-top:10px;">语音频道保持连接中 🎙️</div>
  </div>
</div>

<!-- 语音聊天面板 (在大厅和游戏中显示) -->
<div id="voice-panel">
  <div id="voice-speakers"></div>
  <button id="mic-btn" onclick="toggleMic()" title="点击切换麦克风">🎤</button>
  <div id="voice-status"></div>
</div>

<script>
// ===== CONFIG =====
const SUPABASE_URL='https://aqxbpuetdypcbmqdncpl.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxeGJwdWV0ZHlwY2JtcWRuY3BsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5ODg5MzksImV4cCI6MjA5NDU2NDkzOX0.YUwFQeJgbmhrtY32tGXbm9wz0jtou0Zxg1626EJl3r0';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

// ===== CONSTANTS =====
const GAME_DURATION=180, MAP_W=1200, MAP_H=900, PLAYER_R=18, FOOD_R=10;
const SPEED_NORMAL=3, SPEED_CATCHER=3;
const STAMINA_MAX=100, STAMINA_MOVE_COST=0.15, STAMINA_REGEN=0.3, FOOD_STAMINA=30;
const CATCH_DIST=36, BROADCAST_MS=50;

// ===== CHARACTERS =====
const CHARS=[
  {name:'小猫',color:'#FF6B6B',emoji:'🐱'},{name:'小狗',color:'#4ECDC4',emoji:'🐶'},
  {name:'小兔',color:'#FFB6C1',emoji:'🐰'},{name:'小熊',color:'#DEB887',emoji:'🐻'},
  {name:'小鸡',color:'#FFE066',emoji:'🐥'},{name:'小猪',color:'#FFB3BA',emoji:'🐷'},
  {name:'小鹿',color:'#C4A882',emoji:'🦌'},{name:'小狐',color:'#FF8C42',emoji:'🦊'},
  {name:'小企鹅',color:'#5B7FFF',emoji:'🐧'},{name:'小青蛙',color:'#77DD77',emoji:'🐸'}
];

// ===== MAPS =====
const MAPS=[
  {name:'草地',bg:'#8BC34A',wallColor:'#5D8A3C',walls:[
    {x:200,y:200,w:80,h:80},{x:500,y:150,w:60,h:120},{x:900,y:200,w:100,h:60},
    {x:150,y:500,w:60,h:150},{x:400,y:400,w:100,h:80},{x:700,y:350,w:80,h:100},
    {x:1000,y:500,w:80,h:80},{x:300,y:700,w:120,h:60},{x:600,y:650,w:80,h:100},
    {x:900,y:700,w:60,h:120}
  ]},
  {name:'城镇',bg:'#D4C5A9',wallColor:'#8B7355',walls:[
    {x:100,y:100,w:150,h:120},{x:400,y:80,w:120,h:150},{x:700,y:100,w:180,h:100},
    {x:1000,y:80,w:120,h:130},{x:100,y:400,w:120,h:180},{x:350,y:380,w:160,h:120},
    {x:650,y:400,w:120,h:160},{x:900,y:380,w:180,h:120},{x:150,y:700,w:140,h:100},
    {x:450,y:680,w:100,h:140},{x:750,y:700,w:160,h:100},{x:1000,y:650,w:120,h:150}

let myId=Math.random().toString(36).substr(2,9);
let myNick='',myCharIdx=0;
let roomCode='',roomName='',roomType='public';
let isHost=false;
let channel=null,hallChannel=null;
let gameState='menu',selectedMap=0;

// Game
let players={},foods=[];
let timeLeft=GAME_DURATION;
let gameInterval=null,timerInterval=null;
let lastBroadcast=0;
let myRole='runner',isCaught=false;
let canvas,ctx,cameraX=0,cameraY=0;

// Input
let keys={},joystickActive=false,joystickDX=0,joystickDY=0;
let isMobile=/Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent);

// Lobby
let lobbyPlayers={};
let lobbyTs={};
let presenceInterval=null;

// Hall
let hallRooms={};

// Vote
let currentVote=null; // {proposer, proposerName, votes:{id:'agree'|'wait'}, needed}
let voteTimeout=null;

// ===== INIT =====
window.onload=()=>{
  canvas=document.getElementById('game-canvas');
  ctx=canvas.getContext('2d');
  const ns=['小勇士','小英雄','小冒险家','小探险家','小玩家'];
  document.getElementById('nickname-input').value=ns[Math.floor(Math.random()*ns.length)];
  myCharIdx=Math.floor(Math.random()*CHARS.length);
  buildCharGrid();
  if(isMobile){document.getElementById('joystick-area').style.display='block';setupJoystick();}
  window.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;});
  window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
  resizeCanvas();
  window.addEventListener('resize',resizeCanvas);
  subscribeHall();
};

function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}

function buildCharGrid(){
  const g=document.getElementById('char-grid'); g.innerHTML='';
  CHARS.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='char-option'+(i===myCharIdx?' selected':'');
    d.style.background=c.color;
    d.innerHTML=`<span style="font-size:1.3em">${c.emoji}</span>`;
    d.onclick=()=>{
      // 检查是否有其他玩家已选了这个头像
      const taken=Object.values(lobbyPlayers).some(p=>p.id!==myId&&p.charIdx===i);
      if(taken){alert('这个角色已被其他玩家选择，请换一个！');return;}
      myCharIdx=i;
      document.querySelectorAll('.char-option').forEach(el=>el.classList.remove('selected'));
      d.classList.add('selected');
      if(channel)broadcastPresence();
    };
    g.appendChild(d);
  });
}

function pickUniqueChar(){
  const usedIdx=Object.values(lobbyPlayers).filter(p=>p.id!==myId).map(p=>p.charIdx);
  for(let i=0;i<CHARS.length;i++){
    if(!usedIdx.includes(i)){myCharIdx=i;return;}
  }
}

// ===== SCREENS =====
function showScreen(id){document.querySelectorAll('.screen').forEach(el=>el.classList.remove('active'));document.getElementById(id).classList.add('active');}
function escH(s){return String(s).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));}

// ===== HALL =====
function subscribeHall(){
  hallChannel=sb.channel('catch-hall-v2',{config:{broadcast:{self:true}}});
  hallChannel.on('broadcast',{event:'room-info'},({payload})=>{if(payload&&payload.code)hallRooms[payload.code]=payload;});
  hallChannel.on('broadcast',{event:'room-gone'},({payload})=>{if(payload&&payload.code)delete hallRooms[payload.code];});
  hallChannel.subscribe();
}

function announceRoom(){
  if(roomType!=='public')return;
  hallChannel.send({type:'broadcast',event:'room-info',payload:{
    code:roomCode,name:roomName,host:myNick,playerCount:Object.keys(lobbyPlayers).length,mapIdx:selectedMap
  }});
}

function removeAnnounce(){hallChannel.send({type:'broadcast',event:'room-gone',payload:{code:roomCode}});}

function showHall(){
  myNick=document.getElementById('nickname-input').value.trim()||'玩家';
  showScreen('hall-screen');
  refreshHall();
}

function refreshHall(){
  const list=document.getElementById('hall-room-list');
  const rooms=Object.values(hallRooms).filter(r=>r.playerCount<10);
  if(!rooms.length){list.innerHTML='<div class="empty-msg">暂无公开房间，去创建一个吧！</div>';return;}
  list.innerHTML=rooms.map(r=>`
    <div class="room-card">
      <div class="room-info">
        <span class="room-name-text">${escH(r.name)}</span>

      </div>
      <button class="btn btn-small btn-secondary" onclick="joinRoomByCode('${r.code}')">加入</button>
    </div>
  `).join('');
}

function randomJoin(){
  const rooms=Object.values(hallRooms).filter(r=>r.playerCount<10);
  if(!rooms.length){alert('暂无可加入的房间，试试创建一个吧！');return;}
  const r=rooms[Math.floor(Math.random()*rooms.length)];
  joinRoomByCode(r.code);
}

// ===== CREATE ROOM =====
function showCreateRoom(){
  myNick=document.getElementById('nickname-input').value.trim()||'玩家';
  showScreen('create-screen');
  document.getElementById('room-name-input').value=myNick+'的房间';
}

function setRoomType(t){

  document.getElementById('toggle-public').classList.toggle('active',t==='public');
  document.getElementById('toggle-private').classList.toggle('active',t==='private');
}

function doCreateRoom(){

  roomCode=String(Math.floor(1000+Math.random()*9000));
  isHost=true;

// ===== JOIN =====
function showJoinByCode(){

  showScreen('join-screen');
  document.getElementById('room-code-input').value='';
}

function joinByCode(){

// ===== LOBBY =====
function joinChannel(){
  gameState='lobby';
  lobbyPlayers={};lobbyTs={};currentVote=null;
  showScreen('lobby-screen');
  document.getElementById('lobby-room-code').textContent=roomCode;
  document.getElementById('lobby-room-name').textContent='🎮 '+(roomName||'游戏房间');
  document.getElementById('lobby-host-controls').style.display=isHost?'block':'none';
  document.getElementById('lobby-wait-msg').textContent='';
  document.getElementById('vote-modal').classList.remove('active');

  channel=sb.channel(`catch-room-${roomCode}`,{config:{broadcast:{self:true}}});
  channel.on('broadcast',{event:'presence'},({payload})=>onPresence(payload));
  channel.on('broadcast',{event:'game-start'},({payload})=>onGameStart(payload));
  channel.on('broadcast',{event:'game-state'},({payload})=>onGameState(payload));
  channel.on('broadcast',{event:'player-caught'},({payload})=>onPlayerCaught(payload));
  channel.on('broadcast',{event:'food-eaten'},({payload})=>onFoodEaten(payload));
  channel.on('broadcast',{event:'game-end'},({payload})=>onGameEnd(payload));
  channel.on('broadcast',{event:'vote-propose'},({payload})=>onVotePropose(payload));
  channel.on('broadcast',{event:'vote-response'},({payload})=>onVoteResponse(payload));
  channel.on('broadcast',{event:'vote-result'},({payload})=>onVoteResult(payload));
  channel.on('broadcast',{event:'coin-spawn'},({payload})=>onCoinSpawn(payload));
  channel.on('broadcast',{event:'kick'},({payload})=>onKick(payload));
  channel.on('broadcast',{event:'voice-uid'},({payload})=>onVoiceUid(payload));
  channel.on('broadcast',{event:'back-to-lobby'},({payload})=>onBackToLobby(payload));

  channel.subscribe(s=>{
    if(s==='SUBSCRIBED'){
      broadcastPresence();
      if(presenceInterval)clearInterval(presenceInterval);
      presenceInterval=setInterval(()=>{if(gameState==='lobby'){broadcastPresence();if(isHost)announceRoom();}},2000);
      // 加入语音频道（频道名 = catch-voice-房间号）
      joinVoiceChannel('catch-voice-' + roomCode);
    }
  });
}

function leaveRoom(){
  if(channel){channel.unsubscribe();channel=null;}
  if(presenceInterval){clearInterval(presenceInterval);presenceInterval=null;}
  if(isHost)removeAnnounce();
  lobbyPlayers={};gameState='menu';
  document.getElementById('vote-modal').classList.remove('active');
  document.getElementById('result-overlay').classList.remove('active');
  showScreen('menu-screen');
  // 离开语音频道
  leaveVoiceChannel();
}

function broadcastPresence(){
  if(!channel)return;
  channel.send({type:'broadcast',event:'presence',payload:{id:myId,nickname:myNick,charIdx:myCharIdx,isHost}});
  // 同时广播语音 uid 映射
  if(voiceJoined){
    channel.send({type:'broadcast',event:'voice-uid',payload:{id:myId,voiceUid:voiceUid,nickname:myNick,charIdx:myCharIdx}});
  }
}

function onPresence(p){
  if(gameState!=='lobby')return;
  lobbyPlayers[p.id]=p;
  lobbyTs[p.id]=Date.now();
  // 如果新玩家和自己头像冲突，自动换一个
  if(p.id!==myId&&p.charIdx===myCharIdx){
    pickUniqueChar();
    buildCharGrid();
    if(channel)broadcastPresence();
  }
  // Stale cleanup
  Object.keys(lobbyPlayers).forEach(k=>{if(lobbyTs[k]&&Date.now()-lobbyTs[k]>7000)delete lobbyPlayers[k];});
  updateLobbyUI();
}

function updateLobbyUI(){
  const list=document.getElementById('player-list');
  const entries=Object.entries(lobbyPlayers);
  list.innerHTML=entries.map(([id,p])=>{
    const c=CHARS[p.charIdx]||CHARS[0];
    const kickHtml=(isHost&&id!==myId)?`<button class="kick-btn" onclick="kickPlayer('${id}')">踢出</button>`:'';
    const voiceIcon=isPlayerInVoice(id)?'🎤':'';
    return `<li><span class="dot" style="background:${c.color}"></span>${c.emoji} ${escH(p.nickname)}${p.isHost?' 👑':''}${voiceIcon?` <span style="font-size:0.8em">${voiceIcon}</span>`:''}${kickHtml}</li>`;
  }).join('');
  document.getElementById('lobby-player-count').textContent=`${entries.length} / 10 玩家`;
}

// 检查玩家是否在语音中
function isPlayerInVoice(playerId){
  for(const[vUid,pId]of Object.entries(voiceUidToPlayerId)){
    if(pId===playerId)return true;
  }
  if(playerId===myId&&voiceJoined)return true;
  return false;
}

// ===== KICK =====
function kickPlayer(targetId){
  if(!isHost)return;
  channel.send({type:'broadcast',event:'kick',payload:{targetId}});
}

function onKick({targetId}){
  if(targetId===myId){
    alert('你被队长踢出了房间！');
    leaveRoom();
  } else {
    delete lobbyPlayers[targetId];
    updateLobbyUI();
  }
}

// ===== VOTE SYSTEM =====
function proposeStart(){
  const count=Object.keys(lobbyPlayers).length;
  if(count<2){alert('至少需要2个玩家！');return;}
  channel.send({type:'broadcast',event:'vote-propose',payload:{proposer:myId,proposerName:myNick}});
}

function onVotePropose({proposer,proposerName}){
  if(gameState!=='lobby')return;
  const ids=Object.keys(lobbyPlayers);
  currentVote={proposer,proposerName,votes:{},needed:ids.length};
  // Proposer auto-agrees
  currentVote.votes[proposer]='agree';
  
  if(proposer===myId){
    document.getElementById('lobby-wait-msg').textContent='等待其他玩家投票...';
  } else {
    document.getElementById('vote-msg').textContent=`${escH(proposerName)} 提议开始游戏，是否同意？`;
    document.getElementById('vote-modal').classList.add('active');
  }
}

function voteAgree(){
  document.getElementById('vote-modal').classList.remove('active');
  // 先把自己的票记上（broadcast不会回传给自己）
  if(currentVote) onVoteResponse({id:myId, vote:'agree'});
  channel.send({type:'broadcast',event:'vote-response',payload:{id:myId,vote:'agree'}});
}

function voteWait(){
  document.getElementById('vote-modal').classList.remove('active');
  if(currentVote) onVoteResponse({id:myId, vote:'wait'});
  channel.send({type:'broadcast',event:'vote-response',payload:{id:myId,vote:'wait'}});
}

function onVoteResponse({id,vote}){
  if(!currentVote)return;
  currentVote.votes[id]=vote;
  
  // Check result
  const total=Object.keys(lobbyPlayers).length;
  const agrees=Object.values(currentVote.votes).filter(v=>v==='agree').length;
  const waits=Object.values(currentVote.votes).filter(v=>v==='wait').length;
  
  if(waits>0){
    // Someone declined
    document.getElementById('lobby-wait-msg').textContent='有人选择继续等待，游戏暂不开始';
    currentVote=null;
    setTimeout(()=>{if(gameState==='lobby')document.getElementById('lobby-wait-msg').textContent='';},3000);
  } else if(agrees>=total){
    // All agreed - host starts
    document.getElementById('lobby-wait-msg').textContent='全员同意！即将开始...';
    currentVote=null;
    if(isHost){
      setTimeout(()=>doStartGame(),500);
    } else {
      // 非host：等待host广播game-start，已在监听中
    }
  } else {
    document.getElementById('lobby-wait-msg').textContent=`投票中... ${agrees}/${total} 同意`;
  }
}

function forceStart(){
  const count=Object.keys(lobbyPlayers).length;
  if(count<2){alert('至少需要2个玩家！');return;}
  doStartGame();
}

// ===== GAME START =====
function doStartGame(){
  if(!isHost)return;
  const ids=Object.keys(lobbyPlayers);
  if(ids.length<2)return;
  
  selectedMap=parseInt(document.getElementById('map-select').value);
  const catcherIdx=Math.floor(Math.random()*ids.length);
  const catcherId=ids[catcherIdx];
  
  const foodList=[];
  for(let i=0;i<15;i++){
    let fx,fy,ok;
    do{fx=50+Math.random()*(MAP_W-100);fy=50+Math.random()*(MAP_H-100);ok=true;
      for(const w of MAPS[selectedMap].walls){if(fx>w.x-12&&fx<w.x+w.w+12&&fy>w.y-12&&fy<w.y+w.h+12){ok=false;break;}}
    }while(!ok);
    foodList.push({id:i,x:fx,y:fy,active:true});
  }
  
  const spawns={};
  ids.forEach((id,idx)=>{
    const a=(idx/ids.length)*Math.PI*2;
    spawns[id]={x:MAP_W/2+Math.cos(a)*280,y:MAP_H/2+Math.sin(a)*280};
  });
  
  removeAnnounce();
  channel.send({type:'broadcast',event:'game-start',payload:{
    catcherId,mapIdx:selectedMap,foods:foodList,spawns,players:{...lobbyPlayers}
  }});
}

function onGameStart(payload){
  const{catcherId,mapIdx,foods:fl,spawns,players:ld}=payload;
  selectedMap=mapIdx; foods=fl; gameState='playing'; timeLeft=GAME_DURATION; isCaught=false;
  document.getElementById('vote-modal').classList.remove('active');
  
  players={};
  Object.entries(ld).forEach(([id,d])=>{
    players[id]={x:spawns[id]?spawns[id].x:MAP_W/2,y:spawns[id]?spawns[id].y:MAP_H/2,
      charIdx:d.charIdx,nickname:d.nickname,role:id===catcherId?'catcher':'runner',
      stamina:STAMINA_MAX,caught:false,dx:0,dy:0};
  });
  
  myRole=myId===catcherId?'catcher':'runner';
  showScreen('game-screen');
  document.getElementById('hud-role').textContent=myRole==='catcher'?'👹 抓人者':'🐾 逃跑者';
  document.getElementById('hud-role').style.color=myRole==='catcher'?'#FF6B6B':'#4ECDC4';
  document.getElementById('hud-timer').textContent=formatTime(timeLeft);
  document.getElementById('hud-stamina').textContent='⚡ 100';
  document.getElementById('spectator-banner').style.display='none';
  if(isMobile)document.getElementById('joystick-area').style.display='block';
  resizeCanvas();
  
  if(gameInterval)clearInterval(gameInterval);
  gameInterval=setInterval(gameLoop,1000/60);
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(gameState!=='playing'){clearInterval(timerInterval);return;}
    timeLeft--;
    document.getElementById('hud-timer').textContent=formatTime(timeLeft);
    if(timeLeft<=0){if(isHost)channel.send({type:'broadcast',event:'game-end',payload:{winner:'runners'}});clearInterval(timerInterval);}
  },1000);
}

function formatTime(s){return`${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;}

// ===== GAME LOOP =====
function gameLoop(){
  if(gameState!=='playing')return;
  const me=players[myId];
  if(!me||me.caught){render();return;}
  
  let dx=0,dy=0;
  if(isMobile&&joystickActive){dx=joystickDX;dy=joystickDY;}
  else{if(keys['w']||keys['arrowup'])dy=-1;if(keys['s']||keys['arrowdown'])dy=1;if(keys['a']||keys['arrowleft'])dx=-1;if(keys['d']||keys['arrowright'])dx=1;}
  const len=Math.sqrt(dx*dx+dy*dy);
  if(len>0){dx/=len;dy/=len;}
  
  if(len>0){me.stamina-=STAMINA_MOVE_COST;if(me.stamina<=0){me.stamina=0;dx=0;dy=0;}}
  else{me.stamina=Math.min(STAMINA_MAX,me.stamina+STAMINA_REGEN);}
  
  const spd=me.role==='catcher'?SPEED_CATCHER:SPEED_NORMAL;
  let nx=me.x+dx*spd,ny=me.y+dy*spd;
  const r=resolveCol(me.x,me.y,nx,ny,PLAYER_R,MAPS[selectedMap].walls);
  me.x=Math.max(PLAYER_R,Math.min(MAP_W-PLAYER_R,r.x));
  me.y=Math.max(PLAYER_R,Math.min(MAP_H-PLAYER_R,r.y));
  me.dx=dx;me.dy=dy;
  
  foods.forEach(f=>{
    if(!f.active)return;
    if(Math.hypot(me.x-f.x,me.y-f.y)<PLAYER_R+FOOD_R){
      f.active=false;me.stamina=Math.min(STAMINA_MAX,me.stamina+FOOD_STAMINA);
      channel.send({type:'broadcast',event:'food-eaten',payload:{foodId:f.id}});
    }
  });
  
  tickCoinSpawn();
  if(me.role==='catcher'){
    Object.entries(players).forEach(([id,p])=>{
      if(id===myId||p.caught||p.role==='catcher')return;
      if(Math.hypot(me.x-p.x,me.y-p.y)<CATCH_DIST)
        channel.send({type:'broadcast',event:'player-caught',payload:{caughtId:id}});
    });
  }
  
  document.getElementById('hud-stamina').textContent=`⚡ ${Math.round(me.stamina)}`;
  const now=Date.now();
  if(now-lastBroadcast>BROADCAST_MS){
    lastBroadcast=now;
    channel.send({type:'broadcast',event:'game-state',payload:{id:myId,x:me.x,y:me.y,dx:me.dx,dy:me.dy,stamina:me.stamina}});
  }
  render();
}

function resolveCol(ox,oy,nx,ny,r,walls){
  let x=nx,y=ny;
  for(let iter=0;iter<4;iter++){
    let moved=false;
    for(const w of walls){
      const cx=Math.max(w.x,Math.min(x,w.x+w.w)),cy=Math.max(w.y,Math.min(y,w.y+w.h));
      const ddx=x-cx,ddy=y-cy,d=Math.sqrt(ddx*ddx+ddy*ddy);
      if(d<r){
        moved=true;
        if(d<0.001){x=ox;y=oy;}
        else{const ov=(r-d)+0.5;x+=ddx/d*ov;y+=ddy/d*ov;}
      }
    }
    if(!moved)break;
  }
  x=Math.max(r,Math.min(MAP_W-r,x));
  y=Math.max(r,Math.min(MAP_H-r,y));
  return{x,y};
}

// ===== NETWORK =====
function onGameState(p){if(p.id===myId)return;if(players[p.id]){players[p.id].x=p.x;players[p.id].y=p.y;players[p.id].dx=p.dx;players[p.id].dy=p.dy;players[p.id].stamina=p.stamina;}}

function onPlayerCaught({caughtId}){
  if(players[caughtId])players[caughtId].caught=true;
  if(caughtId===myId){isCaught=true;document.getElementById('spectator-banner').style.display='block';}
  const runners=Object.values(players).filter(p=>p.role==='runner');
  if(runners.every(p=>p.caught)&&isHost)channel.send({type:'broadcast',event:'game-end',payload:{winner:'catcher'}});
}

function onFoodEaten({foodId}){const f=foods.find(x=>x.id===foodId);if(f)f.active=false;}
function onCoinSpawn(coin){if(!foods.find(f=>f.id===coin.id))foods.push(coin);}

let coinSpawnTimer=0,nextCoinId=100;
function tickCoinSpawn(){
  if(!isHost||gameState!=='playing')return;
  coinSpawnTimer++;
  if(coinSpawnTimer<420)return; // 约7秒(60fps)
  coinSpawnTimer=0;
  const map=MAPS[selectedMap];
  let fx,fy,ok,tries=0;
  do{fx=60+Math.random()*(MAP_W-120);fy=60+Math.random()*(MAP_H-120);ok=true;
    for(const w of map.walls){if(fx>w.x-15&&fx<w.x+w.w+15&&fy>w.y-15&&fy<w.y+w.h+15){ok=false;break;}}
    tries++;
  }while(!ok&&tries<30);
  if(ok){
    const c={id:nextCoinId++,x:fx,y:fy,active:true};
    foods.push(c);
    channel.send({type:'broadcast',event:'coin-spawn',payload:c});
  }
}

function onGameEnd({winner}){
  gameState='result';
  if(gameInterval){clearInterval(gameInterval);gameInterval=null;}
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  document.getElementById('spectator-banner').style.display='none';
  if(isMobile)document.getElementById('joystick-area').style.display='none';
  
  // 计算游戏时长
  const elapsed = GAME_DURATION - timeLeft;
  const elapsedStr = `${Math.floor(elapsed/60)}分${elapsed%60}秒`;
  
  // 统计结果
  const allPlayers = Object.values(players);
  const catcher = allPlayers.find(p=>p.role==='catcher');
  const runners = allPlayers.filter(p=>p.role==='runner');
  const caughtCount = runners.filter(p=>p.caught).length;
  const survivedCount = runners.length - caughtCount;
  
  let titleText, msgText, titleEmoji;
  if(winner==='catcher'){
    if(myRole==='catcher'){titleEmoji='🎉';titleText='你赢了！';}
    else{titleEmoji='😅';titleText='被抓住了！';}
    msgText='抓人者抓住了所有逃跑者！';
  }else{
    if(myRole==='runner'&&!isCaught){titleEmoji='🎉';titleText='你赢了！';}
    else{titleEmoji='⏰';titleText='时间到！';}
    msgText='逃跑者成功存活到最后！';
  }
  
  document.getElementById('result-title').textContent=titleEmoji+' '+titleText;
  document.getElementById('result-msg').textContent=msgText;
  
  // 结算详情
  let detailsHtml=`
    <div class="result-stat-row"><span class="result-stat-label">⏱️ 游戏时长</span><span class="result-stat-value">${elapsedStr}</span></div>
    <div class="result-stat-row"><span class="result-stat-label">👹 抓人者</span><span class="result-stat-value">${catcher?escH(catcher.nickname):'?'}</span></div>
    <div class="result-stat-row"><span class="result-stat-label">🐾 逃跑者</span><span class="result-stat-value">${runners.length}人</span></div>
    <div class="result-stat-row"><span class="result-stat-label">✅ 成功逃脱</span><span class="result-stat-value" style="color:#4ECDC4">${survivedCount}人</span></div>
    <div class="result-stat-row"><span class="result-stat-label">❌ 被抓</span><span class="result-stat-value" style="color:#FF6B6B">${caughtCount}人</span></div>
    <div class="result-stat-row"><span class="result-stat-label">🗺️ 地图</span><span class="result-stat-value">${MAPS[selectedMap].name}</span></div>
  `;
  document.getElementById('result-details').innerHTML=detailsHtml;
  
  // 显示结算弹窗（不切换screen，语音保持连接）
  document.getElementById('result-overlay').classList.add('active');
  // 语音面板保持显示
}

function backToMenu(){
  if(channel){channel.unsubscribe();channel=null;}
  if(gameInterval){clearInterval(gameInterval);gameInterval=null;}
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  if(presenceInterval){clearInterval(presenceInterval);presenceInterval=null;}
  players={};lobbyPlayers={};gameState='menu';
  document.getElementById('vote-modal').classList.remove('active');
  document.getElementById('result-overlay').classList.remove('active');
  showScreen('menu-screen');
  // 离开语音频道
  leaveVoiceChannel();
}

// 游戏结束后回到房间（语音保持连接）
function returnToLobby(){
  document.getElementById('result-overlay').classList.remove('active');
  if(gameInterval){clearInterval(gameInterval);gameInterval=null;}
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  players={};foods=[];isCaught=false;
  gameState='lobby';
  currentVote=null;
  
  // 重新订阅频道事件（channel 仍然存在）
  // 重置大厅 UI
  document.getElementById('lobby-room-code').textContent=roomCode;
  document.getElementById('lobby-room-name').textContent='🎮 '+(roomName||'游戏房间');
  document.getElementById('lobby-host-controls').style.display=isHost?'block':'none';
  document.getElementById('lobby-wait-msg').textContent='';
  document.getElementById('vote-modal').classList.remove('active');
  lobbyPlayers={};lobbyTs={};
  
  showScreen('lobby-screen');
  
  // 重新广播 presence，让其他玩家知道自己回来了
  if(channel){
    broadcastPresence();
    if(presenceInterval)clearInterval(presenceInterval);
    presenceInterval=setInterval(()=>{if(gameState==='lobby'){broadcastPresence();if(isHost)announceRoom();}},2000);
  }
  
  // 语音面板保持显示
  if(voiceJoined){
    document.getElementById('voice-panel').classList.add('active');
  }
}

// 收到 back-to-lobby 广播（队长发起再来一局时通知所有人）
function onBackToLobby({initiator}){
  if(gameState==='result'){
    returnToLobby();
  }
}

// 从结算弹窗退出房间
function leaveRoomFromResult(){
  document.getElementById('result-overlay').classList.remove('active');
  leaveRoom();
}

// ===== RENDER =====
function render(){
  const me=players[myId]; if(!me)return;
  cameraX=me.x-canvas.width/2;cameraY=me.y-canvas.height/2;
  cameraX=Math.max(0,Math.min(MAP_W-canvas.width,cameraX));
  cameraY=Math.max(0,Math.min(MAP_H-canvas.height,cameraY));
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();ctx.translate(-cameraX,-cameraY);
  const map=MAPS[selectedMap];
  
  ctx.fillStyle=map.bg;ctx.fillRect(0,0,MAP_W,MAP_H);
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
  for(let x=0;x<=MAP_W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,MAP_H);ctx.stroke();}
  for(let y=0;y<=MAP_H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(MAP_W,y);ctx.stroke();}
  
  ctx.fillStyle=map.wallColor;ctx.shadowColor='rgba(0,0,0,0.25)';ctx.shadowBlur=4;ctx.shadowOffsetY=2;
  map.walls.forEach(w=>ctx.fillRect(w.x,w.y,w.w,w.h));
  ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;
  
  foods.forEach(f=>{if(!f.active)return;ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(f.x,f.y,FOOD_R,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.font=`${FOOD_R}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('⭐',f.x,f.y);});
  
  Object.entries(players).forEach(([id,p])=>{
    if(p.caught&&id!==myId)ctx.globalAlpha=0.3;
    const ch=CHARS[p.charIdx]||CHARS[0];
    const isSpeaking=getPlayerSpeaking(id);
    // 说话时绿色光环
    if(isSpeaking){ctx.shadowColor='#4CAF50';ctx.shadowBlur=15;ctx.beginPath();ctx.arc(p.x,p.y,PLAYER_R+5,0,Math.PI*2);ctx.fillStyle='rgba(76,175,80,0.25)';ctx.fill();ctx.shadowColor='transparent';ctx.shadowBlur=0;}
    ctx.fillStyle='rgba(0,0,0,0.12)';ctx.beginPath();ctx.ellipse(p.x,p.y+PLAYER_R+3,PLAYER_R*0.7,4,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=ch.color;ctx.beginPath();ctx.arc(p.x,p.y,PLAYER_R,0,Math.PI*2);ctx.fill();
    if(p.role==='catcher'){ctx.strokeStyle='#FF0000';ctx.lineWidth=3;ctx.shadowColor='#FF0000';ctx.shadowBlur=8;ctx.stroke();ctx.shadowColor='transparent';ctx.shadowBlur=0;}
    else if(isSpeaking){ctx.strokeStyle='#4CAF50';ctx.lineWidth=3;ctx.shadowColor='#4CAF50';ctx.shadowBlur=10;ctx.stroke();ctx.shadowColor='transparent';ctx.shadowBlur=0;}
    else{ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=2;ctx.stroke();}
    ctx.font=`${PLAYER_R*1.2}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(ch.emoji,p.x,p.y);
    ctx.font='bold 11px sans-serif';ctx.fillStyle='#333';ctx.textBaseline='bottom';ctx.fillText(p.nickname,p.x,p.y-PLAYER_R-8);
    if(isSpeaking){ctx.font='10px sans-serif';ctx.fillStyle='#4CAF50';ctx.fillText('🔊',p.x+PLAYER_R+2,p.y-PLAYER_R-6);}
    if(p.role==='catcher'){ctx.font='13px sans-serif';ctx.fillText('👹',p.x,p.y-PLAYER_R-20);}
    if(id===myId){const bw=36,bh=4;ctx.fillStyle='#333';ctx.fillRect(p.x-bw/2,p.y+PLAYER_R+8,bw,bh);ctx.fillStyle=p.stamina>30?'#4CAF50':'#FF5722';ctx.fillRect(p.x-bw/2,p.y+PLAYER_R+8,bw*(p.stamina/STAMINA_MAX),bh);}
    ctx.globalAlpha=1;
  });
  
  ctx.strokeStyle='#333';ctx.lineWidth=4;ctx.strokeRect(0,0,MAP_W,MAP_H);
  ctx.restore();
}

// ===== JOYSTICK =====
function setupJoystick(){
  const area=document.getElementById('joystick-area'),knob=document.getElementById('joystick-knob');
  const baseR=62,maxD=32;
  function hT(e){e.preventDefault();const t=e.touches[0],rect=area.getBoundingClientRect();const cx=rect.left+baseR,cy=rect.top+baseR;let dx=t.clientX-cx,dy=t.clientY-cy;const d=Math.sqrt(dx*dx+dy*dy);if(d>maxD){dx=dx/d*maxD;dy=dy/d*maxD;}knob.style.left=(baseR-26+dx)+'px';knob.style.top=(baseR-26+dy)+'px';joystickDX=dx/maxD;joystickDY=dy/maxD;joystickActive=true;}
  function hE(){knob.style.left='36px';knob.style.top='36px';joystickDX=0;joystickDY=0;joystickActive=false;}
  area.addEventListener('touchstart',e=>{joystickActive=true;hT(e);});
  area.addEventListener('touchmove',hT);
  area.addEventListener('touchend',hE);
  area.addEventListener('touchcancel',hE);
}

// ===== 声网语音聊天模块 =====
// 使用声网 (Agora/Shengwang) Web SDK 实现同房间实时语音通话
// Token 通过 Supabase Edge Function (agora-token) 生成，App Certificate 不暴露在前端

const AGORA_TOKEN_URL = SUPABASE_URL + '/functions/v1/agora-token';

// 语音状态
let agoraClient = null;
let localAudioTrack = null;
let voiceJoined = false;
let voiceMuted = false;
let voiceUid = 0; // 声网用的 uid（数字）
let speakingUsers = {}; // uid -> {nickname, charIdx, speaking}
let voiceUidToPlayerId = {}; // agora uid -> game myId mapping
let voiceEnabled = true; // 是否启用语音

// 初始化声网客户端
function initAgoraClient() {
  if (!window.AgoraRTC) {
    console.warn('声网 SDK 未加载，语音功能不可用');
    voiceEnabled = false;
    return;
  }
  
  AgoraRTC.setLogLevel(3); // WARNING level，减少控制台输出
  agoraClient = AgoraRTC.createClient({ mode: 'rtc', codec: 'vp8' });
  
  // 监听远端用户发布音频
  agoraClient.on('user-published', async (user, mediaType) => {
    if (mediaType === 'audio') {
      await agoraClient.subscribe(user, mediaType);
      user.audioTrack.play();
      updateSpeakerUI(user.uid, true);
    }
  });
  
  // 监听远端用户取消发布
  agoraClient.on('user-unpublished', (user, mediaType) => {
    if (mediaType === 'audio') {
      updateSpeakerUI(user.uid, false);
    }
  });
  
  // 监听远端用户离开
  agoraClient.on('user-left', (user) => {
    delete speakingUsers[user.uid];
    renderSpeakers();
  });
  
  // 监听音量指示（检测谁在说话）
  agoraClient.enableAudioVolumeIndicator();
  agoraClient.on('volume-indicator', (volumes) => {
    // 重置所有为不说话
    Object.keys(speakingUsers).forEach(uid => {
      speakingUsers[uid].speaking = false;
    });
    
    volumes.forEach(({ uid, level }) => {
      if (level > 5) { // 音量阈值
        if (uid === 0) uid = voiceUid; // 本地用户 uid 为 0
        if (speakingUsers[uid]) {
          speakingUsers[uid].speaking = true;
        }
      }
    });
    renderSpeakers();
  });
}

// 加入语音频道
async function joinVoiceChannel(channelName) {
  if (!voiceEnabled || !agoraClient) return;
  
  try {
    // 生成一个数字 uid（用 myId 的 hash）
    voiceUid = hashStringToUid(myId);
    
    // 从 Supabase Edge Function 获取 Token
    const tokenResp = await fetch(AGORA_TOKEN_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ channelName: channelName, uid: voiceUid })
    });
    
    if (!tokenResp.ok) {
      const err = await tokenResp.json().catch(() => ({}));
      console.error('获取语音 Token 失败:', err.error || tokenResp.status);
      showVoiceStatus('语音连接失败');
      return;
    }
    
    const { token, appId } = await tokenResp.json();
    
    // 加入频道
    await agoraClient.join(appId, channelName, token, voiceUid);
    
    // 创建本地音频轨道
    localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack({
      encoderConfig: 'speech_low_quality' // 语音模式，低延迟
    });
    
    // 发布音频
    await agoraClient.publish([localAudioTrack]);
    
    voiceJoined = true;
    voiceMuted = false;
    
    // 注册自己到说话者列表
    speakingUsers[voiceUid] = { nickname: myNick, charIdx: myCharIdx, speaking: false };
    
    // 广播自己的语音 uid 映射
    if (channel) {
      channel.send({ type: 'broadcast', event: 'voice-uid', payload: { id: myId, voiceUid: voiceUid, nickname: myNick, charIdx: myCharIdx } });
    }
    
    // 显示语音面板
    document.getElementById('voice-panel').classList.add('active');
    updateMicBtn();
    showVoiceStatus('🎙️ 语音已连接');
    setTimeout(() => hideVoiceStatus(), 2000);
    
    renderSpeakers();
  } catch (err) {
    console.error('加入语音频道失败:', err);
    showVoiceStatus('语音连接失败: ' + (err.message || '未知错误'));
  }
}

// 离开语音频道
async function leaveVoiceChannel() {
  if (!voiceJoined) return;
  
  try {
    if (localAudioTrack) {
      localAudioTrack.close();
      localAudioTrack = null;
    }
    await agoraClient.leave();
  } catch (e) {
    console.warn('离开语音频道异常:', e);
  }
  
  voiceJoined = false;
  voiceMuted = false;
  speakingUsers = {};
  voiceUidToPlayerId = {};
  document.getElementById('voice-panel').classList.remove('active');
  document.getElementById('voice-speakers').innerHTML = '';
}

// 切换麦克风静音
function toggleMic() {
  if (!voiceJoined || !localAudioTrack) return;
  
  voiceMuted = !voiceMuted;
  localAudioTrack.setEnabled(!voiceMuted);
  updateMicBtn();
  
  if (voiceMuted) {
    showVoiceStatus('🔇 麦克风已关闭');
  } else {
    showVoiceStatus('🎤 麦克风已开启');
  }
  setTimeout(() => hideVoiceStatus(), 1500);
}

// 更新麦克风按钮样式
function updateMicBtn() {
  const btn = document.getElementById('mic-btn');
  if (voiceMuted) {
    btn.textContent = '🔇';
    btn.classList.add('muted');
    btn.title = '点击开启麦克风';
  } else {
    btn.textContent = '🎤';
    btn.classList.remove('muted');
    btn.title = '点击关闭麦克风';
  }
}

// 更新说话者 UI
function updateSpeakerUI(uid, isPublishing) {
  if (isPublishing) {
    if (!speakingUsers[uid]) {
      // 尝试从映射找到昵称
      const playerId = voiceUidToPlayerId[uid];
      const playerData = playerId ? (lobbyPlayers[playerId] || players[playerId]) : null;
      speakingUsers[uid] = {
        nickname: playerData ? playerData.nickname : `玩家${uid % 1000}`,
        charIdx: playerData ? playerData.charIdx : 0,
        speaking: false
      };
    }
  }
  renderSpeakers();
}

// 渲染说话者列表
function renderSpeakers() {
  const container = document.getElementById('voice-speakers');
  const entries = Object.entries(speakingUsers);
  if (entries.length === 0) {
    container.innerHTML = '';
    return;
  }
  
  container.innerHTML = entries.map(([uid, info]) => {
    const ch = CHARS[info.charIdx] || CHARS[0];
    const speakingClass = info.speaking ? ' speaking' : '';
    const isMe = Number(uid) === voiceUid;
    return `<div class="voice-speaker${speakingClass}">
      <span class="speaker-dot"></span>
      <span>${ch.emoji} ${escH(info.nickname)}${isMe ? '(我)' : ''}</span>
    </div>`;
  }).join('');
}

// 显示/隐藏语音状态
function showVoiceStatus(msg) {
  const el = document.getElementById('voice-status');
  el.textContent = msg;
  el.classList.add('active');
}
function hideVoiceStatus() {
  document.getElementById('voice-status').classList.remove('active');
}

// 字符串 hash 转数字 uid（声网需要 uint32）
function hashStringToUid(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    const char = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash = hash & hash; // Convert to 32bit integer
  }
  return Math.abs(hash) % 100000000 + 1; // 1 ~ 100000000
}

// 处理其他玩家的语音 uid 广播
function onVoiceUid(payload) {
  if (!payload || !payload.id || !payload.voiceUid) return;
  voiceUidToPlayerId[payload.voiceUid] = payload.id;
  if (speakingUsers[payload.voiceUid]) {
    speakingUsers[payload.voiceUid].nickname = payload.nickname;
    speakingUsers[payload.voiceUid].charIdx = payload.charIdx;
  } else {
    speakingUsers[payload.voiceUid] = { nickname: payload.nickname, charIdx: payload.charIdx, speaking: false };
  }
  renderSpeakers();
}

// 在游戏渲染中为正在说话的玩家添加高亮
function getPlayerSpeaking(playerId) {
  // 找到该玩家对应的 voiceUid
  for (const [vUid, pId] of Object.entries(voiceUidToPlayerId)) {
    if (pId === playerId && speakingUsers[vUid] && speakingUsers[vUid].speaking) {
      return true;
    }
  }
  // 检查自己
  if (playerId === myId && speakingUsers[voiceUid] && speakingUsers[voiceUid].speaking) {
    return true;
  }
  return false;
}

// 初始化
window.addEventListener('load', () => {
  initAgoraClient();
});
