<!DOCTYPE html>
<html lang="zh-CN">
<head>
<!--
  ===== 小菜鸟 · 打字挑战赛 =====
  路径: games/typing-challenge/index.html
  
  ===== 需要在 Supabase SQL Editor 执行的建表 SQL =====
  
  -- 1. 打字挑战赛通关记录表（记录每个用户每个等级的通关状态和最佳成绩）
  CREATE TABLE IF NOT EXISTS typing_challenge_records (
    id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
    user_id UUID REFERENCES auth.users(id) ON DELETE CASCADE NOT NULL,
    type TEXT NOT NULL CHECK (type IN ('english', 'chinese')),
    level INT NOT NULL CHECK (level >= 1 AND level <= 10),
    passed_at TIMESTAMPTZ DEFAULT now(),
    best_wpm NUMERIC DEFAULT 0,
    best_cpm NUMERIC DEFAULT 0,
    best_accuracy NUMERIC DEFAULT 0,
    coins_rewarded INT DEFAULT 0,
    updated_at TIMESTAMPTZ DEFAULT now(),
    UNIQUE(user_id, type, level)
  );

  -- 2. 打字成绩流水记录表（每次打字的详细记录）
  CREATE TABLE IF NOT EXISTS typing_records (
    id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
    user_id UUID REFERENCES auth.users(id) ON DELETE CASCADE NOT NULL,
    username TEXT NOT NULL,
    mode TEXT NOT NULL CHECK (mode IN ('challenge', 'rank')),
    lang TEXT NOT NULL CHECK (lang IN ('zh', 'en')),
    level INT,
    speed NUMERIC NOT NULL,
    accuracy NUMERIC NOT NULL,
    passed BOOLEAN DEFAULT false,
    coins_earned INT DEFAULT 0,
    created_at TIMESTAMPTZ DEFAULT now()
  );

  -- 3. 排名赛周榜表
  CREATE TABLE IF NOT EXISTS typing_weekly_rank (
    id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
    user_id UUID REFERENCES auth.users(id) ON DELETE CASCADE NOT NULL,
    username TEXT NOT NULL,
    lang TEXT NOT NULL CHECK (lang IN ('zh', 'en')),
    best_speed NUMERIC NOT NULL,
    accuracy NUMERIC NOT NULL,
    week_start DATE NOT NULL,
    attempts_today INT DEFAULT 1,
    last_attempt_date DATE DEFAULT CURRENT_DATE,
    updated_at TIMESTAMPTZ DEFAULT now(),
    UNIQUE(user_id, lang, week_start)
  );

  -- 4. 排名赛结算记录
  CREATE TABLE IF NOT EXISTS typing_rank_settlements (
    id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
    week_start DATE NOT NULL,
    lang TEXT NOT NULL,
    settled_at TIMESTAMPTZ DEFAULT now(),
    first_user_id UUID,
    first_username TEXT,
    first_coins INT DEFAULT 20,
    second_user_id UUID,
    second_username TEXT,
    second_coins INT DEFAULT 15,
    third_user_id UUID,
    third_username TEXT,
    third_coins INT DEFAULT 10,
    UNIQUE(week_start, lang)
  );

  -- 5. RLS 策略
  ALTER TABLE typing_challenge_records ENABLE ROW LEVEL SECURITY;
  ALTER TABLE typing_records ENABLE ROW LEVEL SECURITY;
  ALTER TABLE typing_weekly_rank ENABLE ROW LEVEL SECURITY;
  ALTER TABLE typing_rank_settlements ENABLE ROW LEVEL SECURITY;

  CREATE POLICY "Users can read own challenge records" ON typing_challenge_records
    FOR SELECT USING (auth.uid() = user_id);
  CREATE POLICY "Users can insert own challenge records" ON typing_challenge_records
    FOR INSERT WITH CHECK (auth.uid() = user_id);
  CREATE POLICY "Users can update own challenge records" ON typing_challenge_records
    FOR UPDATE USING (auth.uid() = user_id);

  CREATE POLICY "Users can insert own typing records" ON typing_records
    FOR INSERT WITH CHECK (auth.uid() = user_id);
  CREATE POLICY "Anyone can read typing records" ON typing_records
    FOR SELECT USING (true);

  CREATE POLICY "Users can insert own weekly rank" ON typing_weekly_rank
    FOR INSERT WITH CHECK (auth.uid() = user_id);
  CREATE POLICY "Users can update own weekly rank" ON typing_weekly_rank
    FOR UPDATE USING (auth.uid() = user_id);
  CREATE POLICY "Anyone can read weekly rank" ON typing_weekly_rank
    FOR SELECT USING (true);

  CREATE POLICY "Anyone can read settlements" ON typing_rank_settlements
    FOR SELECT USING (true);
  CREATE POLICY "Users can insert settlements" ON typing_rank_settlements
    FOR INSERT WITH CHECK (true);

  ===== END SQL =====
-->

// ===== 通关记录 =====
var passedRecords = {};

async function loadPassedRecords() {
  if (!currentUser) return;
  try {
    var { data } = await sb.from('typing_challenge_records').select('*').eq('user_id', currentUser.id);
    if (data) {
      data.forEach(function(r) {
        passedRecords[r.type + '_' + r.level] = r;
      });
    }
  } catch(e) {}
}

// ===== 模式切换 =====
function switchMode(lang) {
  currentLang = lang;
  document.getElementById('modeZh').classList.toggle('active', lang === 'zh');
  document.getElementById('modeEn').classList.toggle('active', lang === 'en');
  if (lang === 'zh') {
    document.getElementById('tipBox').innerHTML = '📝 中文模式：输入古诗词的每个字和标点，打完整首诗即可结算。<br>⏱️ 计时从你第一次按键开始，打得又快又准才能通关！';
  } else {
    document.getElementById('tipBox').innerHTML = '📝 英文模式：输入完整文章（含标点），打完整篇即可结算。<br>⏱️ 计时从你第一次按键开始，打得又快又准才能通关！';
  }

// ===== 等级渲染 =====
function renderLevelGrid() {
  var grid = document.getElementById('levelGrid');
  var html = '';
  for (var i = 0; i < 10; i++) {
    var req = currentLang === 'zh' ? zhLevels[i] : enLevels[i];
    var unit = currentLang === 'zh' ? '字/分' : 'WPM';
    var recordKey = (currentLang === 'zh' ? 'chinese' : 'english') + '_' + (i + 1);
    var isPassed = !!passedRecords[recordKey];
    var cls = '';
    if (isPassed) cls += ' passed';
    if (currentLevel === i + 1) cls += ' active';
    html += '<div class="level-btn' + cls + '" onclick="selectLevel(' + (i+1) + ')">';
    html += '<div class="lv-num">Lv.' + (i+1) + '</div>';
    html += '<div class="lv-req">≥' + req + unit + '</div>';
    html += '<div class="lv-reward">' + (isPassed ? '✅已通关' : '+' + levelRewards[i] + '🪙') + '</div>';
    html += '</div>';
  }
  grid.innerHTML = html;
}

function selectLevel(lv) {
  currentLevel = lv;
  renderLevelGrid();
}

// ===== 防作弊工具 =====
function showCheatWarning(msg) {
  var w = document.getElementById('cheatWarning');
  w.textContent = '⚠️ ' + (msg || '请用键盘打字哦！');
  w.style.display = 'block';
  setTimeout(function() { w.style.display = 'none'; }, 2000);
}

function setupAntiCheat(input) {
  // 禁止粘贴
  input.addEventListener('paste', function(e) {
    e.preventDefault();
    showCheatWarning('不能粘贴哦！');
  });
  // 禁止拖拽输入
  input.addEventListener('drop', function(e) {
    e.preventDefault();
    showCheatWarning('请用键盘打字哦！');
  });
  // 检测语音输入和粘贴（beforeinput 拦截）
  input.addEventListener('beforeinput', function(e) {
    if (e.inputType === 'insertFromPaste' || 
        e.inputType === 'insertFromDrop' ||
        e.inputType === 'insertFromYank' ||
        e.inputType === 'insertFromSpeech' ||
        e.inputType === 'insertReplacementText') {
      e.preventDefault();
      if (e.inputType === 'insertFromPaste' || e.inputType === 'insertFromYank') {
        showCheatWarning('不能粘贴哦！');
      } else {
        showCheatWarning('请用键盘打字哦！');
      }
    }
  });
  // 二次检测：input 事件检查 inputType（部分浏览器 beforeinput 不触发）
  input.addEventListener('input', function(e) {
    if (e.inputType === 'insertFromPaste' || 
        e.inputType === 'insertFromDrop' ||
        e.inputType === 'insertFromSpeech' ||
        e.inputType === 'insertReplacementText') {
      input.value = '';
      if (e.inputType === 'insertFromPaste') {
        showCheatWarning('不能粘贴哦！');
      } else {
        showCheatWarning('请用键盘打字哦！');
      }
    }
  });
}

// ===== 游戏逻辑 =====
function startChallenge() {
  if (!currentUser) { alert('请先登录！'); return; }
  
  // 选择诗/文章
  if (currentLang === 'zh') {
    var levelIndex = Math.min(currentLevel - 1, zhPoems.length - 1);
    var pool = zhPoems[levelIndex];
    currentPoem = pool[Math.floor(Math.random() * pool.length)];
    displayText = currentPoem.lines.join('');
  } else {
    var levelIndex = Math.min(currentLevel - 1, enArticles.length - 1);
    var pool = enArticles[levelIndex];
    currentPoem = pool[Math.floor(Math.random() * pool.length)];
    displayText = currentPoem.lines.join(' ');
  }
  
  // 重置统计
  totalCorrect = 0;
  totalWrong = 0;
  elapsedSeconds = 0;
  startTime = 0;
  
  // 显示倒计时
  document.getElementById('selectPanel').style.display = 'none';
  document.getElementById('resultPanel').style.display = 'none';
  document.getElementById('typingPanel').style.display = 'none';
  var cdPanel = document.getElementById('countdownPanel');
  cdPanel.style.display = 'block';
  
  var count = 3;
  cdPanel.textContent = count;
  var cdTimer = setInterval(function() {
    count--;
    if (count > 0) {
      cdPanel.textContent = count;
    } else {
      clearInterval(cdTimer);
      cdPanel.style.display = 'none';
      beginTyping();
    }
  }, 800);
}

function beginTyping() {
  document.getElementById('typingPanel').style.display = 'block';
  document.getElementById('statSpeedLabel').textContent = currentLang === 'zh' ? '字/分钟' : 'WPM';
  document.getElementById('statCountLabel').textContent = currentLang === 'zh' ? '已打字数' : '已打词数';
  
  renderPoemDisplay();
  
  var input = document.getElementById('typingInput');
  // 移除旧事件监听器
  var newInput = input.cloneNode(true);
  input.parentNode.replaceChild(newInput, input);
  newInput.value = '';
  
  // 设置防作弊
  setupAntiCheat(newInput);
  
  gameActive = true;
  startTime = 0; // 第一次按键时才开始计时
  elapsedSeconds = 0;
  document.getElementById('statTime').textContent = '0';
  document.getElementById('statSpeed').textContent = '0';
  document.getElementById('statAccuracy').textContent = '100%';
  document.getElementById('statCount').textContent = '0';
  
  // 绑定输入事件
  if (currentLang === 'zh') {
    setupChineseInput(newInput);
  } else {
    setupEnglishInput(newInput);
  }
  newInput.focus();
}

function renderPoemDisplay() {
  var container = document.getElementById('textDisplay');
  var html = '';
  
  // 显示标题和作者
  if (currentPoem) {
    if (currentLang === 'zh') {
      html += '<div class="poem-title">《' + currentPoem.title + '》— ' + currentPoem.author + '</div>';
    } else {
      html += '<div class="poem-title">' + currentPoem.title + '</div>';
    }
  }
  
  html += '<div class="poem-lines">';
  
  // 按行展示，每行一句
  var charIndex = 0;
  if (currentLang === 'zh') {
    for (var li = 0; li < currentPoem.lines.length; li++) {
      var line = currentPoem.lines[li];
      for (var ci = 0; ci < line.length; ci++) {
        var cls = 'char';
        if (charIndex === 0) cls += ' current';
        html += '<span class="' + cls + '" data-index="' + charIndex + '">' + escapeHtml(line[ci]) + '</span>';
        charIndex++;
      }
      if (li < currentPoem.lines.length - 1) {
        html += '<span class="line-break"></span>';
      }
    }
  } else {
    // 英文按行展示
    var fullText = displayText;
    var lineStart = 0;
    for (var li = 0; li < currentPoem.lines.length; li++) {
      var line = currentPoem.lines[li];
      var lineInFull = line;
      // 找到这行在 fullText 中的位置
      for (var ci = 0; ci < lineInFull.length; ci++) {
        var cls = 'char';
        if (charIndex === 0) cls += ' current';
        html += '<span class="' + cls + '" data-index="' + charIndex + '">' + escapeHtml(fullText[charIndex]) + '</span>';
        charIndex++;
      }
      // 行间加空格（已包含在 displayText 中）
      if (li < currentPoem.lines.length - 1) {
        // 空格字符
        var cls = 'char';
        if (charIndex === 0) cls += ' current';
        html += '<span class="' + cls + '" data-index="' + charIndex + '">' + escapeHtml(fullText[charIndex]) + '</span>';
        charIndex++;
        html += '<span class="line-break"></span>';
      }
    }
  }
  
  html += '</div>';
  container.innerHTML = html;
  charElements = container.querySelectorAll('.char');
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/ /g, '&nbsp;');
}

// 中文输入处理
function setupChineseInput(input) {
  var composing = false;
  
  input.addEventListener('compositionstart', function() {
    composing = true;
  });
  
  input.addEventListener('compositionend', function(e) {
    composing = false;
    processInput(input.value);
  });
  
  input.addEventListener('input', function(e) {
    if (!composing) {
      processInput(input.value);
    }
  });
}

// 英文输入处理
function setupEnglishInput(input) {
  input.addEventListener('input', function(e) {
    if (!gameActive) return;
    processInput(input.value);
  });
}

function processInput(value) {
  if (!gameActive) return;
  
  // 第一次输入时开始计时
  if (startTime === 0 && value.length > 0) {
    startTime = Date.now();
    gameTimer = setInterval(function() {
      elapsedSeconds = Math.round((Date.now() - startTime) / 1000);
      document.getElementById('statTime').textContent = elapsedSeconds;
      updateStats();
    }, 1000);
  }
  
  totalCorrect = 0;
  totalWrong = 0;
  
  for (var i = 0; i < charElements.length; i++) {
    charElements[i].className = 'char';
    if (i < value.length) {
      if (value[i] === displayText[i]) {
        charElements[i].className = 'char correct';
        totalCorrect++;
      } else {
        charElements[i].className = 'char wrong';
        totalWrong++;
      }
    } else if (i === value.length) {
      charElements[i].className = 'char current';
    }
  }
  
  updateStats();
  
  // 打完整首诗/文章
  if (value.length >= displayText.length) {
    endGame();
  }
}

function updateStats() {
  var elapsed = startTime > 0 ? (Date.now() - startTime) / 1000 / 60 : 0.01;
  if (elapsed < 0.01) elapsed = 0.01;
  
  var speed = 0;
  if (currentLang === 'zh') {
    speed = Math.round(totalCorrect / elapsed);
    document.getElementById('statCount').textContent = totalCorrect;
  } else {
    speed = Math.round((totalCorrect / 5) / elapsed);
    document.getElementById('statCount').textContent = Math.round(totalCorrect / 5);
  }
  
  var totalAll = totalCorrect + totalWrong;
  var accuracy = totalAll > 0 ? Math.round((totalCorrect / totalAll) * 100) : 100;
  
  document.getElementById('statSpeed').textContent = speed;
  document.getElementById('statAccuracy').textContent = accuracy + '%';
}

function endGame() {
  gameActive = false;
  if (gameTimer) clearInterval(gameTimer);
  
  var elapsed = startTime > 0 ? (Date.now() - startTime) / 1000 / 60 : 0.01;
  if (elapsed < 0.01) elapsed = 0.01;
  
  var speed = 0;
  if (currentLang === 'zh') {
    speed = Math.round(totalCorrect / elapsed);
  } else {
    speed = Math.round((totalCorrect / 5) / elapsed);
  }
  
  var totalAll = totalCorrect + totalWrong;
  var accuracy = totalAll > 0 ? Math.round((totalCorrect / totalAll) * 100) : 0;
  
  // 判断是否通过
  var requirement = currentLang === 'zh' ? zhLevels[currentLevel - 1] : enLevels[currentLevel - 1];
  var passed = speed >= requirement;
  
  // 显示结果并保存
  showResult(speed, accuracy, passed, requirement);
}

async function showResult(speed, accuracy, passed, requirement) {
  document.getElementById('typingPanel').style.display = 'none';
  var panel = document.getElementById('resultPanel');
  panel.style.display = 'block';
  
  var unit = currentLang === 'zh' ? '字/分钟' : 'WPM';
  var typeKey = currentLang === 'zh' ? 'chinese' : 'english';
  var recordKey = typeKey + '_' + currentLevel;
  var bestField = currentLang === 'zh' ? 'best_cpm' : 'best_wpm';
  
  var existingRecord = passedRecords[recordKey];
  
  if (passed) {
    document.getElementById('resultIcon').textContent = '🎉';
    document.getElementById('resultTitle').textContent = '挑战成功！';
    document.getElementById('resultDetail').innerHTML = 
      '速度：<b>' + speed + ' ' + unit + '</b>（要求≥' + requirement + '）<br>' +
      '准确率：<b>' + accuracy + '%</b><br>' +
      '用时：<b>' + elapsedSeconds + '秒</b>';
    
    if (!existingRecord) {
      // 首次通关
      var reward = levelRewards[currentLevel - 1];
      document.getElementById('coinsReward').textContent = '🎁 获得 ' + reward + ' 金币！';
      
      // 发放金币
      var newCoins = (currentProfile.coins || 0) + reward;
      await sb.from('profiles').update({ coins: newCoins }).eq('id', currentUser.id);
      currentProfile.coins = newCoins;
      document.getElementById('coinsDisplay').textContent = '🪙 ' + newCoins;
      
      // 保存通关记录
      var insertData = {
        user_id: currentUser.id,
        type: typeKey,
        level: currentLevel,
        coins_rewarded: reward
      };
      insertData[bestField] = speed;
      insertData.best_accuracy = accuracy;
      
      await sb.from('typing_challenge_records').insert(insertData);
      passedRecords[recordKey] = insertData;
      document.getElementById('bestRecord').textContent = '';
    } else {
      // 已通关，检查是否刷新记录
      var oldBest = existingRecord[bestField] || 0;
      if (speed > oldBest) {
        var updateData = { updated_at: new Date().toISOString() };
        updateData[bestField] = speed;
        updateData.best_accuracy = accuracy;
        await sb.from('typing_challenge_records').update(updateData)
          .eq('user_id', currentUser.id)
          .eq('type', typeKey)
          .eq('level', currentLevel);
        existingRecord[bestField] = speed;
        document.getElementById('bestRecord').textContent = '🏅 新纪录！最佳成绩更新为 ' + speed + ' ' + unit;
      } else {
        document.getElementById('bestRecord').textContent = '📊 最佳成绩：' + oldBest + ' ' + unit;
      }
      document.getElementById('coinsReward').textContent = '（该等级已通关，不再发放积分）';
    }
  } else {
    document.getElementById('resultIcon').textContent = '💪';
    document.getElementById('resultTitle').textContent = '继续加油！';
    document.getElementById('resultDetail').innerHTML = 
      '速度：<b>' + speed + ' ' + unit + '</b>（要求≥' + requirement + '）<br>' +
      '准确率：<b>' + accuracy + '%</b><br>' +
      '用时：<b>' + elapsedSeconds + '秒</b><br>' +
      '<span style="color:#ff8c00;">再快一点就能通过啦！加油！</span>';
    document.getElementById('coinsReward').textContent = '';
    document.getElementById('bestRecord').textContent = '';
  }
  
  // 保存流水记录
  try {
    await sb.from('typing_records').insert({
      user_id: currentUser.id,
      username: currentProfile.username || 'player',
      mode: 'challenge',
      lang: currentLang === 'zh' ? 'zh' : 'en',
      level: currentLevel,
      speed: speed,
      accuracy: accuracy,
      passed: passed,
      coins_earned: passed && !existingRecord ? levelRewards[currentLevel - 1] : 0
    });
  } catch(e) {
    console.log('保存记录失败:', e);
  }
  
  // 刷新等级显示
  renderLevelGrid();
}

function retryLevel() {
  document.getElementById('resultPanel').style.display = 'none';
  document.getElementById('bestRecord').textContent = '';
  startChallenge();
}

function backToSelect() {
  document.getElementById('resultPanel').style.display = 'none';
  document.getElementById('typingPanel').style.display = 'none';
  document.getElementById('selectPanel').style.display = 'block';
  document.getElementById('bestRecord').textContent = '';
  renderLevelGrid();
}

// ===== 初始化 =====
(async function() {
  var ok = await checkAuth();
  if (ok) {
    await loadPassedRecords();
    renderLevelGrid();
  }
})();
</script>
<script src="/coin-history.js"></script>
</body>
</html>
