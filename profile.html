<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的主页 - 小菜鸟</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f0f8ff; color: #333; }
    nav { background: #ff6b35; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
    nav .logo { font-size: 1.6rem; font-weight: bold; color: white; text-decoration: none; }
    nav .nav-links a { color: white; text-decoration: none; margin-left: 16px; }
    .container { max-width: 900px; margin: 32px auto; padding: 0 24px; }
    .profile-header { background: white; border-radius: 20px; padding: 32px; display: flex; align-items: center; gap: 24px; margin-bottom: 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .avatar { width: 80px; height: 80px; background: #ffe0cc; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
    .profile-info h1 { font-size: 1.6rem; margin-bottom: 8px; }
    .coin-badge { background: #ffd700; color: #333; padding: 6px 16px; border-radius: 20px; font-weight: bold; display: inline-block; }
    .tabs { display: flex; gap: 12px; margin-bottom: 24px; }
    .tab { padding: 10px 24px; border-radius: 24px; border: 2px solid #ff6b35; color: #ff6b35; cursor: pointer; font-size: 1rem; background: white; }
    .tab.active { background: #ff6b35; color: white; }
    .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
    .game-card { background: white; border-radius: 16px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .game-card .thumb { width: 100%; height: 100px; background: #ffe0cc; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin-bottom: 10px; }
    .game-card h3 { font-size: 0.95rem; }
    .status { font-size: 0.8rem; padding: 3px 10px; border-radius: 10px; display: inline-block; margin-top: 6px; }
    .status.online { background: #d4edda; color: #155724; }
    .status.offline { background: #f8d7da; color: #721c24; }
    footer { background: #333; color: #aaa; text-align: center; padding: 24px; margin-top: 40px; }
  </style>
</head>
<body>
  <nav>
    <a class="logo" href="index.html">🐥 小菜鸟</a>
    <div class="nav-links">
      <a href="index.html">首页</a>
      <a href="editor.html">做游戏</a>
      <a href="profile.html">我的</a>
    </div>
  </nav>
  <div class="container">
    <div class="profile-header">
      <div class="avatar">🐥</div>
      <div class="profile-info">
        <h1>小菜鸟用户</h1>
        <div class="coin-badge">🪙 金币：200</div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active">我发布的游戏</button>
      <button class="tab">我玩过的游戏</button>
      <button class="tab">金币记录</button>
    </div>
    <div class="game-grid">
      <div class="game-card"><div class="thumb">🚀</div><h3>太空冒险</h3><span class="status online">已上线</span></div>
      <div class="game-card"><div class="thumb">🏰</div><h3>守护城堡</h3><span class="status offline">已下线</span></div>
    </div>
  </div>
  <footer>© 2026 小菜鸟 · 小朋友的游戏乐园</footer>
</body>
</html>
