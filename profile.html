<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的 - 小菜鸟</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="login.css">
  <style>
    /* 头像选择弹窗 */
    .avatar-modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }
    .avatar-modal-overlay.show {
      display: flex;
    }
    .avatar-modal {
      background: white;
      border-radius: 24px;
      padding: 32px;
      max-width: 480px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: bounce-in 0.4s ease-out;
    }
    .avatar-modal h2 {
      text-align: center;
      font-size: 1.5rem;
      margin-bottom: 8px;
      font-weight: 900;
      color: #333;
    }
    .avatar-modal p {
      text-align: center;
      color: #888;
      margin-bottom: 20px;
      font-size: 0.95rem;
    }
    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .avatar-option {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 4px solid #eee;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      overflow: hidden;
      object-fit: cover;
    }
    .avatar-option:hover {
      transform: scale(1.1);
      border-color: #ffa726;
      box-shadow: 0 4px 15px rgba(255,107,53,0.3);
    }
    .avatar-option.selected {
      border-color: #ff6b35;
      box-shadow: 0 0 0 4px rgba(255,107,53,0.2), 0 4px 15px rgba(255,107,53,0.4);
      transform: scale(1.08);
    }
    .avatar-modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .avatar-modal-actions button {
      padding: 12px 32px;
      border-radius: 50px;
      border: none;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }
    .avatar-modal-actions .btn-save {
      background: linear-gradient(135deg, #ff6b35, #ffa726);
      color: white;
      box-shadow: 0 4px 12px rgba(255,107,53,0.3);
    }
    .avatar-modal-actions .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255,107,53,0.4);
    }
    .avatar-modal-actions .btn-cancel {
      background: #f0f0f0;
      color: #555;
    }
    .avatar-modal-actions .btn-cancel:hover {
      background: #e0e0e0;
    }
    .avatar-clickable {
      cursor: pointer;
      position: relative;
    }
    .avatar-clickable::after {
      content: '✏️';
      position: absolute;
      bottom: 2px;
      right: 2px;
      font-size: 1.2rem;
      background: white;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @media (max-width: 480px) {
      .avatar-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }
      .avatar-modal {
        padding: 24px 20px;
      }
    }
  </style>
</head>
<body style="opacity:0;transition:opacity 0.15s">
  <nav class="navbar" id="navbar">
    <a href="index.html" class="logo">
      <img src="assets/logo.jpg" alt="小菜鸟" />
      <span>小菜鸟</span>
    </a>
    <div class="nav-links" id="navLinks"></div>
  </nav>

  <div class="container" style="padding-top:32px">
    <div class="profile-header">
      <div class="avatar avatar-clickable" id="profileAvatar" onclick="openAvatarModal()" title="点击更换头像">🐥</div>
      <div class="profile-info">
        <h1 id="profileUsername">加载中...</h1>
        <button onclick="emergencyLogout()" style="margin-top:8px;padding:4px 12px;font-size:12px;background:#eee;border:1px solid #ccc;border-radius:8px;cursor:pointer;color:#666">退出登录</button>
        <div class="coin-badge">🪙 金币：<span id="profileCoins">0</span></div>
        <div class="profile-actions" id="profileActions">
          <!-- 动态渲染 -->
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab(this, 'myGames')">我发布的游戏</button>
      <button class="tab" onclick="switchTab(this, 'playedGames')">我玩过的游戏</button>
    </div>
    <div id="myGames" class="tab-content">
      <div id="myGamesContent" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;padding:8px 0;">加载中...</div>
    </div>
    <div id="playedGames" class="tab-content" style="display:none">
      <div id="playedGamesContent"><div class="empty-tip">加载中...</div></div>
    </div>
  </div>

  <!-- 头像选择弹窗 -->
  <div class="avatar-modal-overlay" id="avatarModal">
    <div class="avatar-modal">
      <h2>🎨 选择你的头像</h2>
      <p>点击选择一个你喜欢的头像吧！</p>
      <div class="avatar-grid" id="avatarGrid"></div>
      <div class="avatar-modal-actions">
        <button class="btn-cancel" onclick="closeAvatarModal()">取消</button>
        <button class="btn-save" onclick="saveAvatar()">确定 ✓</button>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>© 2026 小菜鸟 - 专为小朋友打造的游戏乐园 🐣</p>
  </footer>

  <script src="/assets/js/supabase.min.js"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script>
    // 头像列表
    var AVATAR_LIST = [];
    for (var i = 1; i <= 12; i++) {
      AVATAR_LIST.push('assets/avatars/avatar_' + (i < 10 ? '0' + i : i) + '.png');
    }

    var _selectedAvatar = '';
    var _currentUserId = '';

    function switchTab(btn, tabId) {
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.tab-content').forEach(function(t) { t.style.display = 'none'; });
      btn.classList.add('active');
      document.getElementById(tabId).style.display = 'block';
    }

    async function doLogout() {
      await signOut();
      window.location.href = 'index.html';
    }

    // 头像弹窗
    function openAvatarModal() {
      var grid = document.getElementById('avatarGrid');
      grid.innerHTML = '';
      AVATAR_LIST.forEach(function(src) {
        var img = document.createElement('img');
        img.src = src;
        img.className = 'avatar-option' + (src === _selectedAvatar ? ' selected' : '');
        img.onclick = function() {
          grid.querySelectorAll('.avatar-option').forEach(function(el) { el.classList.remove('selected'); });
          img.classList.add('selected');
          _selectedAvatar = src;
        };
        grid.appendChild(img);
      });
      document.getElementById('avatarModal').classList.add('show');
    }

    function closeAvatarModal() {
      document.getElementById('avatarModal').classList.remove('show');
    }

    async function saveAvatar() {
      if (!_selectedAvatar || !_currentUserId) return;
      var sb = getSupabase();
      if (!sb) return;
      var result = await sb.from('profiles').update({ avatar_url: _selectedAvatar }).eq('id', _currentUserId);
      if (result.error) {
        alert('保存失败：' + result.error.message);
        return;
      }
      // 更新页面显示
      document.getElementById('profileAvatar').innerHTML = '<img src="' + _selectedAvatar + '" alt="头像" style="width:80px;height:80px;border-radius:50%;object-fit:cover;">';
      closeAvatarModal();
    }

    // 关闭弹窗：点击遮罩层
    document.getElementById('avatarModal').addEventListener('click', function(e) {
      if (e.target === this) closeAvatarModal();
    });

    async function loadMyGames(userId) {
      var sb = getSupabase();
      if (!sb) return;
      var result = await sb.from('games').select('*').eq('author_id', userId).order('created_at', { ascending: false });
      var container = document.getElementById('myGamesContent');
      if (!result.data || result.data.length === 0) {
        container.innerHTML = '还没有发布游戏，<a href="upload.html">去上传一个吧！</a>';
        return;
      }
      container.innerHTML = result.data.map(function(g) {
        var title = g.title || g.name || '未命名游戏';
        var desc = g.description || '';
        var category = g.category || '';
        var status = g.status === 'online' ? '<span style="color:#22c55e;font-size:12px;">● 已上线</span>' : '<span style="color:#f59e0b;font-size:12px;">● 待审核</span>';
        var coverStyle = g.cover_url ? '' : 'background:linear-gradient(135deg,#ff6b35,#f7931e);';
        return '<div class="game-card" onclick="location.href=\'game.html?id=' + g.id + '\'" style="cursor:pointer;">' +
          (g.cover_url
            ? '<img src="' + g.cover_url + '" alt="封面" style="width:100%;height:120px;object-fit:cover;border-radius:12px;margin-bottom:10px;display:block;">'
            : '<div style="' + coverStyle + 'border-radius:12px;height:120px;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:10px;">🎮</div>') +
          '<div style="font-weight:700;font-size:15px;margin-bottom:4px;">' + title + '</div>' +
          '<div style="font-size:12px;color:#888;margin-bottom:6px;">' + category + '</div>' +
          '<div style="font-size:12px;color:#666;margin-bottom:6px;">' + desc.slice(0,40) + (desc.length>40?'...':'') + '</div>' +
          status +
          '</div>';
      }).join('');
    }

    async function loadPlayedGames(userId) {
      var sb = getSupabase();
      if (!sb) return;
      var container = document.getElementById('playedGamesContent');
      if (!container) return;
      // 查 game_plays 表，关联 games 表
      var result = await sb.from('game_plays')
        .select('game_id, played_at, games(id, title, cover_url, category, description, status)')
        .eq('user_id', userId)
        .order('played_at', { ascending: false });
      if (!result.data || result.data.length === 0) {
        container.innerHTML = '<div class="empty-tip">还没有玩过游戏，<a href="index.html">去看看吧！</a></div>';
        return;
      }
      container.innerHTML = '<div class="games-grid">' + result.data.map(function(row) {
        var g = row.games;
        if (!g) return '';
        var title = g.title || g.name || '未命名游戏';
        var category = g.category || '';
        var desc = g.description || '';
        return '<div class="game-card" onclick="location.href='game.html?id=' + g.id + ''" style="cursor:pointer;">' +
          (g.cover_url
            ? '<img src="' + g.cover_url + '" alt="封面" style="width:100%;height:120px;object-fit:cover;border-radius:12px;margin-bottom:10px;display:block;">'
            : '<div style="background:linear-gradient(135deg,#ff6b35,#f7931e);border-radius:12px;height:120px;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:10px;">🎮</div>') +
          '<div style="font-weight:700;font-size:15px;margin-bottom:4px;">' + title + '</div>' +
          '<div style="font-size:12px;color:#888;margin-bottom:6px;">' + category + '</div>' +
          '<div style="font-size:12px;color:#666;">' + desc.slice(0,40) + (desc.length>40?'...':'') + '</div>' +
          '</div>';
      }).join('') + '</div>';
    }

    function emergencyLogout() {
      // 清除所有 supabase session 相关的 localStorage
      Object.keys(localStorage).forEach(function(k) {
        if (k.includes('supabase') || k.includes('xiaocainiao')) localStorage.removeItem(k);
      });
      window.location.href = 'login.html';
    }

    async function initProfile() {
      var sb = getSupabase();
      if (!sb) {
        // supabase 还没初始化，等一下再试
        setTimeout(initProfile, 100);
        return;
      }

      // 读本地 session
      var user = null;
      try {
        var sessionResult = await sb.auth.getSession();
        user = sessionResult.data && sessionResult.data.session && sessionResult.data.session.user;
      } catch(e) {}

      // session 没有，再试一次 getUser（走网络）
      if (!user) {
        try {
          var userResult = await sb.auth.getUser();
          user = userResult.data && userResult.data.user;
        } catch(e) {}
      }

      if (!user) {
        window.location.href = 'login.html?redirect=profile.html';
        return;
      }
      _currentUserId = user.id;

      // 立刻显示页面，用 email 作为临时用户名，不等数据库
      var tempName = user.email ? user.email.replace('@xiaocainiao.app','') : '用户';
      document.getElementById('profileUsername').textContent = tempName;
      document.getElementById('profileCoins').textContent = '0';
      document.getElementById('profileActions').innerHTML =
        '<a href="editor.html" class="btn-primary">🎮 做游戏</a>' +
        '<a href="upload.html" class="btn-primary" style="background:linear-gradient(135deg,var(--blue),var(--blue-light))">📤 上传游戏</a>' +
        '<button class="btn-secondary" onclick="doLogout()">退出登录</button>';
      document.body.style.opacity = '1';

      // 再异步查 profiles 表更新真实数据
      try {
        var result = await Promise.race([
          sb.from('profiles').select('*').eq('id', user.id).single(),
          new Promise((_,rej) => setTimeout(()=>rej(new Error('timeout')), 5000))
        ]);
        var profile = result.data;
        if (profile) {
          document.getElementById('profileUsername').textContent = profile.username || tempName;
          document.getElementById('profileCoins').textContent = profile.coins || 0;
          if (profile.avatar_url) {
            _selectedAvatar = profile.avatar_url;
            document.getElementById('profileAvatar').innerHTML = '<img src="' + profile.avatar_url + '" alt="头像" style="width:80px;height:80px;border-radius:50%;object-fit:cover;">';
          }
          if (profile.role === 'admin') {
            document.getElementById('profileActions').innerHTML =
              '<a href="editor.html" class="btn-primary">🎮 做游戏</a>' +
              '<a href="upload.html" class="btn-primary" style="background:linear-gradient(135deg,var(--blue),var(--blue-light))">📤 上传游戏</a>' +
              '<a href="admin.html" class="btn-primary" style="background:linear-gradient(135deg,#7c3aed,#a78bfa)">⚙️ 管理后台</a>' +
              '<button class="btn-secondary" onclick="doLogout()">退出登录</button>';
          }
        }
      } catch(e) {
        console.warn('profiles查询超时或失败，使用基础信息展示', e);
      }

      loadMyGames(user.id);
      loadPlayedGames(user.id);
    }

    // supabase.min.js 是同步 script，加载完后 window.supabase 已就绪，直接初始化
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initProfile);
    } else {
      initProfile();
    }
  </script>
</body>
</html>
